/* ── 무게 기본값(시작 무게 제안) ─────────────────────────────
   기구의 "가장 가벼운 상태"를 시작값으로 제안한다. 무게는 사용자가 직접 올리는 게 맞다.
   - 핀 스택 머신·케이블: 최소 스택 (보통 5kg)
   - 바벨·스미스: 빈 봉 무게 (바벨 20kg, 스미스 봉은 더 가벼움)
   - 덤벨·케틀벨: 남 5 / 여 3
   사용자가 설정에서 카테고리별 기본값을 직접 바꿀 수 있다(state.wDefaults). */
const WCAT=[
  ['machine','머신/케이블','핀 스택 최소 무게'],
  ['barbell','바벨','빈 봉 무게'],
  ['smith','스미스 머신','빈 봉 무게'],
  ['dumbbell','덤벨','한 손 기준 시작 무게'],
  ['kettlebell','케틀벨','시작 무게']
];
function exCat(name,eq){
  eq=eq||[];
  if(eq.includes('dumbbell')) return 'dumbbell';
  if(eq.includes('kettlebell')) return 'kettlebell';
  if(eq.includes('smith')) return 'smith';
  if(eq.includes('barbell')||eq.includes('hack_squat')) return 'barbell';
  return 'machine'; // 핀 스택 머신·케이블 등
}
/* 성별에 따라 값이 갈리는 카테고리(덤벨·케틀벨)의 남/여 시작값 */
function wByGender(base){ const p=state.profile||{}; return (p.gender==='female'||p.gender==='여')?base.f:base.m; } // 저장값은 'female'/'male'(GENDERS). '여'는 레거시 방어
const WBASE={
  machine:5,          // 핀 스택 최소
  barbell:20,         // 올림픽 바 빈 봉
  smith:15,           // 스미스 봉(대체로 가벼움)
  dumbbell:{m:5,f:3},
  kettlebell:{m:4,f:4}   // 케틀벨은 최소 4kg, 4kg 단위
};
/* 카테고리 기본 무게 — 사용자 설정값 우선, 없으면 정책값 */
function baseFor(cat){
  if(state.wDefaults && state.wDefaults[cat]!=null) return state.wDefaults[cat];
  const b=WBASE[cat];
  return (b&&typeof b==='object')?wByGender(b):(b||0);
}
/* 특정 운동·세트의 기본 무게 = 카테고리 기본값(모든 세트 동일, 자동 증량 없음) */
function defaultWeight(ex,k){
  return Math.max(0, baseFor(exCat(ex.name,ex.eq)));
}
/* 기구별 증량 단위(kg) — 실제 헬스장 무게가 올라가는 최소 간격
   덤벨 0.5(조절식 기준) / 바벨·스미스·핵 스쿼트 2.5(원판 1.25 한 쌍) / 케틀벨 4 / 핀 스택 머신·케이블 5 */
function weightStep(eq){
  eq=eq||[];
  if(eq.includes('dumbbell')) return 0.5;
  if(eq.includes('kettlebell')) return 4;
  if(eq.includes('barbell')||eq.includes('smith')||eq.includes('hack_squat')) return 2.5;
  return 5; // 핀 스택 머신·케이블 등
}
/* 빈 칸에서 스텝을 누르면 이전 세트 무게(없으면 지난 기록)를 먼저 채워준다 — 매번 처음부터 안 눌러도 되게 */
function seedWeight(date,oi,k){
  const sv=getLog(date,oi);
  for(let j=k-1;j>=0;j--){ if(typeof sv[j]==='number'&&sv[j]>0) return sv[j]; }
  const last=lastLog(date,oi);
  if(last&&typeof last.w[k]==='number'&&last.w[k]>0) return last.w[k];
  return 0;
}
function adjWeight(btn,date,oi,k,dir,step){
  const inp=btn.parentElement.querySelector('.wt');
  let v=parseFloat(inp.value);
  if(isNaN(v)){ v=seedWeight(date,oi,k); if(dir>0&&v===0) v=step; } // 첫 누름은 이전 무게를 채움
  else { v=v+step*dir; }
  v=Math.max(0,Math.round(v*10)/10);
  inp.value=v; inp.classList.remove('pre'); logWeight(date,oi,k,v);
}
/* 길게 누르면 연속 증가 — 처음엔 천천히, 점점 빠르게(멀리 갈 때 편하게) */
let _wtHold=null;
function wtHold(btn,date,oi,k,dir,step,ev){
  if(ev&&ev.preventDefault) ev.preventDefault();
  adjWeight(btn,date,oi,k,dir,step); // 첫 누름 즉시 1회
  let delay=420;
  const tick=()=>{ adjWeight(btn,date,oi,k,dir,step); delay=Math.max(45,delay*0.6); _wtHold=setTimeout(tick,delay); };
  _wtHold=setTimeout(tick,420);
  const stop=()=>{ if(_wtHold){clearTimeout(_wtHold);_wtHold=null;} window.removeEventListener('pointerup',stop); window.removeEventListener('pointercancel',stop); btn.removeEventListener('pointerleave',stop); };
  window.addEventListener('pointerup',stop); window.addEventListener('pointercancel',stop); btn.addEventListener('pointerleave',stop);
}
/* 무게 한 칸 = [−][ 숫자 kg ][+] (탭 = 1회, 길게 = 연속)
   dv = 기본값 프리필(저장된 기록이 없을 때 흐리게 미리 채움), basis = 브릭 배치 flex 스타일 */
function wtCell(date,oi,k,label,step,dv,basis){
  const sv=getLog(date,oi); const saved=(typeof sv[k]==='number');
  /* 미저장 칸은 이전 세트(없으면 지난 기록) 무게를 우선 프리필 — 없으면 기본값(dv). 매번 처음부터 안 눌러도 되게 */
  const seed = saved ? 0 : seedWeight(date,oi,k);
  const fill = seed>0 ? seed : dv;
  const v = saved ? sv[k] : (fill>0?fill:'');
  const pre = (!saved && fill>0) ? ' pre' : '';
  const a=`this,'${date}','${oi}',${k}`;
  return `<div class="setcell wtc" style="${basis||''}">${label?`<span class="sn">${label}</span>`:''}<div class="wtstep"><button class="wtb" tabindex="-1" aria-label="무게 줄이기" onpointerdown="wtHold(${a},-1,${step},event)">−</button><span class="wtmid"><input class="wt${pre}" type="number" inputmode="decimal" min="0" step="${step}" value="${v}" placeholder="–" aria-label="무게(kg)" oninput="this.classList.remove('pre')" onchange="logWeight('${date}','${oi}',${k},this.value)"></span><button class="wtb" tabindex="-1" aria-label="무게 늘리기" onpointerdown="wtHold(${a},1,${step},event)">+</button></div></div>`;
}
function renderSetLog(slot,r,dateStr,oi,nSets){
  const saved=getLog(dateStr,oi);
  const n=nSets; const cb=cellBasis(n);
  if(r.bw){ // bodyweight/floor move → per-set completion dots
    let dots='';
    for(let k=0;k<n;k++){ dots+=`<button class="setdot ${saved[k]?'on':''}" style="${cb}" onclick="toggleSetDone('${dateStr}','${oi}',${k})">${k+1}</button>`; }
    return `<div class="setlog"><div class="setrow dots" style="justify-content:center">${dots}</div></div>`;
  }
  const bs=setBasis(n);
  if(/측/.test(String(defReps(slot,r)||''))){ // 측면당 → 한 줄 = 한 세트, 열 = 좌/우. (예전: 세트 헤더가 전부 위에 몰리고 좌/우 칸이 접혀 어긋났음 — 되돌리지 말 것)
    const wstep=weightStep(r.eq);
    const head=`<div class="ss-row ss-head"><span class="ss-lab"></span><div class="ss-cells"><span class="ss-num">좌</span><span class="ss-num">우</span></div></div>`;
    let rows='';
    for(let k=0;k<n;k++){ rows+=`<div class="ss-row"><span class="ss-lab">${k+1}세트</span><div class="ss-cells">${wtCell(dateStr, oi+'L', k, '', wstep, defaultWeight(r,k), '')}${wtCell(dateStr, oi+'R', k, '', wstep, defaultWeight(r,k), '')}</div></div>`; }
    return `<div class="setlog">${head}${rows}</div>`;
  }
  const last=lastLog(dateStr,oi);
  let hint='';
  if(last){ const md=last.date.slice(5).replace('-','/'); const parts=last.w.slice(0,n).map(x=>(typeof x==='number'&&x>0)?(''+x):'–'); hint=`<div class="lastw">지난 기록 <b>${md}</b><span class="vdiv"></span>${parts.join(', ')} kg</div>`; }
  const wstep=weightStep(r.eq);
  let cells='';
  for(let k=0;k<n;k++){ cells+=wtCell(dateStr, String(oi), k, (k+1)+'세트', wstep, defaultWeight(r,k), bs); }
  return `<div class="setlog">${hint}<div class="setrow" style="justify-content:center">${cells}</div></div>`;
}

/* 동작별 reps 우선 — 유지형(월 싯 등)은 슬롯의 횟수 대신 자기 시간을 씀 */
function defReps(slot,r){ return (r&&r.reps)||slot.reps; }

/* 사용자가 고른 운동 목표 → 세트/횟수/유산소 비중 가중치.
   목표는 복수 선택이므로 배타 분기가 아니라 곱셈으로 합성한다
   (근육+다이어트를 함께 고르면 자연스럽게 중간값이 됨). */
/* 목표별 효과. 사용자는 1순위·2순위 두 개까지 고르고, 1순위를 더 강하게 반영한다. */
const GOAL_FX={
  '근육 만들기':      {set:1, reps:0.85, cardio:0.85, rest:'60초에서 90초'},
  '다이어트(체중감량)':{set:0, reps:1.2,  cardio:1.3,  rest:'30초에서 60초'},
  '체력 향상':        {set:0, reps:1.0,  cardio:1.4,  rest:'45초에서 75초'},
  '자세교정':         {set:0, reps:1.0,  cardio:1.0,  rest:null, posture:true},
  '현 상태 유지':     {set:0, reps:1.0,  cardio:1.0,  rest:null}
};
const GOAL_W=[1.0, 0.5]; // 1순위, 2순위 가중치
function goalMods(){
  const g=((state.profile&&state.profile.goals)||[]).slice(0,2);
  let repsMul=1, cardioMul=1, rest=null, posture=false, hyper=false, diet=false, endur=false;
  g.forEach((name,i)=>{
    const fx=GOAL_FX[name]; if(!fx) return;
    const w=GOAL_W[i]||0;
    repsMul   *= 1+(fx.reps-1)*w;    // 1순위는 그대로, 2순위는 절반만 반영
    cardioMul *= 1+(fx.cardio-1)*w;
    if(fx.posture) posture=true;
    if(name==='근육 만들기') hyper=true;
    if(name==='다이어트(체중감량)') diet=true;
    if(name==='체력 향상') endur=true;
    if(fx.rest && !rest) rest=fx.rest; // 우선순위 높은 목표의 휴식을 먼저 채택
  });
  return {
    hyper, diet, endur, posture,
    setDelta: g.includes('근육 만들기')?1:0,
    repsMul, cardioMul,
    rest: rest||'60초에서 90초'
  };
}
/* '12회','10회/측' 같은 횟수형만 조정. 유지형(초)·범위형(20–30초)은 건드리지 않음 */
function goalReps(base){
  const m=goalMods().repsMul;
  if(Math.abs(m-1)<0.03) return base;
  return String(base).replace(/^(\d+)회(\/측)?$/, (s,n,side)=>
    Math.max(8,Math.min(20,Math.round(+n*m)))+'회'+(side||''));
}
/* 추천 횟수 = 동작별 기본값에 목표 가중치를 반영한 값 */
function recReps(slot,r){ return goalReps(defReps(slot,r)); }

/* ---- 자세교정 판정: 단일 소스(슬롯 데이터) ----
   role 이름 regex는 폐기(브리틀·죽은 패턴 잔존 위험). 슬롯 데이터로만 판단한다.
   · symptom-gated: opt:'posture:neck|shoulder|back|pelvis' — 해당 증상을 골랐을 때만 노출(slotActive).
   · always-shown : posture:true — 항상 노출하되 자세교정 목표면 세트 +1(근비대 가치가 함께 있는 교정 슬롯).
   둘 다 "자세교정 요소"이므로 목표가 자세교정이면 세트 +1 대상이다. */
function postureSym(sl){ const o=sl.opt||''; return o.indexOf('posture:')===0 ? o.slice(8) : null; }
function isPostureSlot(sl){ return sl.posture===true || postureSym(sl)!=null; }
function effVol(si,oi,slot,r){
  const c=state.slotCustom&&state.slotCustom[si+':'+oi];
  const beginner=state.profile&&state.profile.liftingExp===false;
  const gm=goalMods();
  let base=beginner?Math.max(2,slot.sets-1):slot.sets;
  let delta=gm.setDelta;
  if(gm.posture && isPostureSlot(slot)) delta+=1;
  base=Math.max(2,Math.min(5,base+delta));
  const sets=(c&&c.sets)?c.sets:base;
  const reps=(c&&c.reps!=null&&c.reps!=='')?c.reps:recReps(slot,r);
  return {sets, reps, customized:!!c};
}
function volEditor(si,oi,slot,v,r){
  const dr=recReps(slot,r);
  return `<div class="voledit">
    <button class="stp" onclick="chgSets(${si},${oi},-1,${v.sets})">−</button>
    <span class="volnum">${v.sets}세트</span>
    <button class="stp" onclick="chgSets(${si},${oi},1,${v.sets})">+</button>
    <span class="voltimes">×</span>
    <input class="repin" value="${v.reps}" onchange="setReps(${si},${oi},this.value,'${dr}')" aria-label="세트당 반복">
    ${v.customized?`<button class="volreset" onclick="resetVol(${si},${oi})">추천값으로</button>`:''}
  </div>`;
}

let _openDone={}; /* 완료 카드 펼침 상태(P3) — 세션 메모리만, 저장 안 함 */
function toggleDoneOpen(date,id){ const k=date+':'+id; _openDone[k]=!_openDone[k]; renderToday(); }
function stepShell(figHtml,figCls,kicker,titleHtml,bodyHtml,id,dateStr,active,done,foot){
  const started=state.stepStart&&state.stepStart[dateStr]&&state.stepStart[dateStr][id];
  const elapsed=state.stepMs&&state.stepMs[dateStr]&&state.stepMs[dateStr][id];
  /* 완료 카드는 기본 접힘(P3) — 요약 한 줄, 탭하면 펼침. 긴 세션의 스캔성 확보 */
  if(done && !_openDone[dateStr+':'+id]){

        <span class="step-fold">▾</span>
      </div>
    </div>`;
  }
  let btn;
  if(done){
    btn=`<div class="step-done-row">✓ 완료${elapsed?` <b>${fmtDur(elapsed)}</b> 걸림`:''} <button class="step-reopen" onclick="resetStep('${dateStr}','${id}')">다시 열기</button> <button class="step-reopen" onclick="toggleDoneOpen('${dateStr}','${id}')">접기 ▴</button></div>`;
  } else if(started){
    btn=`<button class="step-done-btn timing" onclick="doneStep('${dateStr}','${id}')">완료 <span class="live-timer" data-start="${started}">0:00</span></button>`;
  } else {
    btn=`<button class="step-done-btn start" onclick="startStep('${dateStr}','${id}')">시작 →</button>`;
  }

        <div class="step-hrow"><div class="step-hmain">${titleHtml}</div><div class="step-kicker">${kicker}</div></div>
      </div>

/* 선택적 슬롯 — 자세교정 세부 유형(opt:'posture:neck|shoulder|back|pelvis')에 맞을 때만 노출.
   유형을 안 골랐으면 상체 3종(neck·shoulder·back)을 기본으로. */
function ptypes(){
  const p=state.profile||{};
  const t=(p.postureTypes||[]).slice();
  if(goalMods().posture && !t.length) return ['neck','shoulder','back'];
  return t;
}
function slotActive(sl){
  const sym=postureSym(sl);
  if(sym) return goalMods().posture && ptypes().includes(sym);
  return true;
}
function sessionExercises(s, si){
  const out=[];
  s.slots.forEach((sl,oi)=>{
    if(!slotActive(sl)) return;
    const cands=slotCands(sl); if(!cands.length) return;
    const eqCands=cands.filter(c=>!c.bw);
    const bwCand=cands.find(c=>c.bw);
    /* pbw = options[0]이 맨몸이면 "맨몸 동작을 항상 노출"(예: 코어 데드버그) + 기구 옵션을 별도로 추가.
       그래서 코어 슬롯의 options[0]=데드버그(mat)는 fb의 데드버그와 이름이 같아도 중복이 아니라 이 트리거다 — 지우지 말 것. */
    const pbw=(sl.options&&sl.options.length>0)&&isBW(sl.options[0].eq||[]);
    if(pbw && bwCand) out.push({sl,oi,id:'ex'+oi+'b',key:oi+'b',r:bwCand,eqCands:[]});
    if(eqCands.length){ const nm=state.slotPick&&state.slotPick[si+':'+oi]; const r=(nm&&eqCands.find(c=>c.name===nm))||eqCands[0]; out.push({sl,oi,id:'ex'+oi,key:oi,r,eqCands}); }
    else if(!pbw && bwCand) out.push({sl,oi,id:'ex'+oi+'b',key:oi+'b',r:bwCand,eqCands:[]});
  });
  return out;
}
function stepIdsFor(dateStr){
  const e=sessionFor(dateStr); if(!e||e.rest) return [];
  const s=SESSIONS[e.session]; const ids=['warm'];
  sessionExercises(s, e.session).forEach(x=>ids.push(x.id));
  ids.push('cardio','cool'); return ids;
}
function cardioMachines(){
  const map=[['treadmill','트레드밀'],['recumbent_bike','리컴번트 바이크'],['spin_bike','스핀바이크'],['elliptical','일립티컬'],['stairmaster','스텝밀'],['rowing','로잉머신']];
  return map.filter(([id])=>state.equipment.includes(id));
}
function pickCardio(id){ state.cardioChoice=(state.cardioChoice===id?null:id); touch(); refresh(); }
function cardioChips(){
  const m=cardioMachines();

let wuP=null, wuTimer=null;

function sessionTimes(s, kept, si){
  const T=Math.max(20, state.sessionMinutes||60);
  let warm=Math.max(5,Math.min(12,Math.round(T*0.15)));
  let cool=Math.max(4,Math.min(8,Math.round(T*0.10)));
  const cf=/유산소/.test(s.title||'');
  let cardio=cf?Math.round(T*0.32):Math.max(4,Math.round(T*0.12));
  /* 목표 반영: 감량/체력이면 유산소↑, 근육 만들기면 유산소↓ (본 운동 시간 확보) */
  cardio=Math.max(3,Math.min(Math.round(T*0.5),Math.round(cardio*goalMods().cardioMul)));
  const cardioTarget=cardio;
  let main=T-warm-cool-cardio;
  const need=kept.length*3;
  if(main<need){ let d=need-main; const a=Math.min(d,cardio-3);cardio-=a;d-=a;main+=a; if(d>0){const b=Math.min(d,warm-4);warm-=b;d-=b;main+=b;} if(d>0){const c=Math.min(d,cool-3);cool-=c;d-=c;main+=c;} }
  const setsArr=kept.map(x=>effVol(si,x.key!=null?x.key:x.oi,x.sl,x.r).sets);
  const tot=setsArr.reduce((a,b)=>a+b,0)||1;
  let ex=setsArr.map(st=>Math.max(3,Math.round(main*st/tot)));
  let sum=warm+cool+cardio+ex.reduce((a,b)=>a+b,0);
  cardio+=(T-sum);
  /* 반올림·최소 3분 보정에 유산소가 먹히지 않게, 목표치까지는 본 운동에서 되돌려 받음 */
  while(ex.length && cardio<cardioTarget){ const mi=ex.indexOf(Math.max(...ex)); if(ex[mi]<=3) break; ex[mi]--; cardio++; }
  if(cardio<3){ let def=3-cardio;cardio=3; while(def>0 && ex.length){const mi=ex.indexOf(Math.max(...ex)); if(ex[mi]<=3)break; ex[mi]--;def--;} }
  const cardioAuto=cardio;
  const ov=state.cardioMin&&state.cardioMin[si];
  if(ov!=null) cardio=Math.max(0,ov);
  const total=warm+cool+cardio+ex.reduce((a,b)=>a+b,0);
  return {warm,cool,cardio,ex,total,cardioAuto};
}

function renderSessionCard(s,dateStr,si){
  const completed=(state.steps&&state.steps[dateStr])||{};

  const activeId=ids.find(id=>!completed[id])||null;
  const kept=sessionExercises(s,si);
  const doneCount=ids.filter(id=>completed[id]).length;
  const tm=sessionTimes(s,kept,si);

    } else {
      body+=`<div class="ex-meta" style="margin-top:6px"><span class="ex-eq">맨몸 운동</span></div>`;
    }
    body+=volEditor(si,x.key,x.sl,v,x.r);
    if(x.r.cue) body+=`<div class="step-cue">${fmtCue(x.r.cue)}</div>`;
    body+=renderSetLog(x.sl,x.r,dateStr,x.key,v.sets);
    html+=stepShell(exFig(x.r,x.sl.role),'', `운동 ${idx+1} / ${kept.length} (약 ${tm.ex[idx]}분)`, title, body, id, dateStr, active, done, howtoLinks(x.r.name));
  });

  // cardio
  html+=stepShell(stepIcon('cardio'),'', `약 ${tm.cardio}분`, `<div class="step-title">${s.cardio.label}</div>`, `${cardioGuide(cardioDetail(s))}${cardioMinCtrl(si,tm.cardio)}${cardioChips()}`, 'cardio', dateStr, activeId==='cardio', !!completed['cardio']);

  // cooldown
  if(wuP && wuP.phase==='cool' && wuP.dateStr===dateStr) html+=wuPlayerCard();
  else html+=wuStepCard('cool', s, dateStr, activeId==='cool', !!completed['cool'], tm.cool);

  return html;
}

/* 역대 최고 연속 기록 — streak()과 같은 규칙(휴식일은 건너뛰고 안 끊김) */
function bestStreak(){
  let run=0, best=0, d=parse(state.startDate); const end=parse(todayStr());

}

  /* 월 요약(S2) — 그 달 운동일 수만큼 칸이 나뉜 세그먼트 바(완료 1일 = 1칸). 운동 탭 진행 레일과 같은 문법 */
  const segs=ms.plan?Array.from({length:ms.plan},(_,i)=>`<i class="${i<ms.done?'on':''}"></i>`).join(''):'<i></i>';
  html+=`<div class="mon-sum"><div class="mon-bar">${segs}</div><span class="ms-t"><b>${ms.done}</b>/${ms.plan}</span></div></div>`;
  html+=`<div class="plan-body ${_planSlide?('anim-'+_planSlide):''}">${(planMode==='list')?planListHTML():planCalHTML()}</div>`;
  _planSlide=null; /* 슬라이드는 모드 전환 직후 1회만 — 월 이동 등 일반 재렌더엔 없음 */
  html+=`<p class="info" style="margin-top:14px;padding:0 4px">오늘 이전은 지난 날이라 고정돼요. 앞으로의 날짜에 <b>쉬는 날</b>을 표시하면<br>이후 일정이 ${programLen()}일 순환에 맞춰 자동으로 다시 배정됩니다.</p>`;
  $('view-plan').innerHTML=html;
  /* 스크롤은 내부 7행 스크롤러(.plist-card) 기준: 목표 행(오늘/탭한 날)이 있으면 가운데로, 없으면 이전 위치 복원 */
  if(planMode==='list'){
    const sc=document.querySelector('.plist-card');
    if(sc){
      /* 높이 fit: 하단 탭바 위 공간에 맞춰 행 단위(n*65+60)로 — 기본 7행, 좁은 화면은 축소(탭바가 하단 흐림을 가리지 않게) */
      const nav=document.querySelector('nav');
      const avail=(nav?nav.getBoundingClientRect().top:window.innerHeight) - sc.getBoundingClientRect().top - 8;
      const rows=Math.max(3, Math.min(7, Math.floor((avail-60)/65)));
      sc.style.height=(rows*65+60)+'px';
      /* 리스트 맨 위/맨 아래에서는 흐림 제거 — 그 너머에 행이 없으므로 */
      const edge=()=>{ const w=sc.parentElement; if(!w) return;
        w.classList.toggle('at-top', sc.scrollTop<=2);
        w.classList.toggle('at-bottom', sc.scrollTop>=sc.scrollHeight-sc.clientHeight-2); };
      sc.addEventListener('scroll', edge, {passive:true});
      edge();
    }
    if(_planScrollTo){ const tgt=_planScrollTo; _planScrollTo=null;
      requestAnimationFrame(()=>{ const el=document.getElementById('day-'+tgt.k);
        if(el&&sc){ const rm=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;
          const top=Math.max(0, el.getBoundingClientRect().top - sc.getBoundingClientRect().top + sc.scrollTop - (sc.clientHeight - el.offsetHeight)/2);
          sc.scrollTo({top, behavior:(tgt.smooth&&!rm)?'smooth':'auto'}); } });
    } else if(keepScroll!=null && sc){ sc.scrollTop=keepScroll; }
  }
  $('hd-title').textContent='일정'; $('hd-cyc').innerHTML='';
}
/* 화면 크기/회전 변경 시 7행 스크롤러 높이 재계산(fit) — 스크롤 위치는 keepScroll이 보존. (테스트 샌드박스의 가짜 window 대비 가드) */

function eqGridHTML(sel, toggleFn){

function showProfile(){

  if(p.birth) rows.push(['생년월일',p.birth]);

  if(p.foreigner!=null) rows.push(['구분',p.foreigner?'외국인':'내국인']);

  if(p.weightKg) rows.push(['현재 체중',p.weightKg+' kg']);
  if(p.targetWeightKg) rows.push(['목표 체중',p.targetWeightKg+' kg']);

  rows.push(['러닝',p.running?('있음'+(p.runPace?(', 1km '+esc(p.runPace)):'')):'없음']);

/* ---------------- Actions ---------------- */
function refresh(){ if(activeTab==='home')renderHome(); else if(activeTab==='plan')renderToday(); else if(activeTab==='schedule')renderPlan(); else if(activeTab==='anal')renderAnal(); else renderSetup(); }

function toggleOpen(k){ openDays[k]=!openDays[k]; renderPlan(); }

function toggleRest(k){
  const t=todayStr();
  if(k<t){ toast('지난 날은 변경할 수 없어요'); return; }
  if(k===t && state.doneDays.includes(t)){ toast('오늘은 이미 완료해서 쉴 수 없어요'); return; }
  if(isRestDow(parse(k))){ toast('이 요일은 휴식일로 설정돼 있어요. 운동 요일은 설정에서 바꿀 수 있어요'); return; }
  const i=state.restDays.indexOf(k);
  if(i>=0){ state.restDays.splice(i,1); toast('운동일로 되돌렸어요'); }
  else { state.restDays.push(k); toast('쉬는 날로 설정, 이후 일정 재조정됨'); }
  touch(); refresh();
}


function toggleEquip(id){
  const i=state.equipment.indexOf(id);
  if(i>=0) state.equipment.splice(i,1); else state.equipment.push(id);
  /* 기구를 모두 해제하면 맨몸 운동을 자동으로 켬 — 안 그러면 플랜이 빈다 */
  if(!state.equipment.length && !state.includeBodyweight){
    state.includeBodyweight=true;
    toast('기구가 없어서 맨몸 운동을 자동으로 켰어요');
  }
  touch(); renderSetup();
}

function toggleBodyweight(){
  if(state.includeBodyweight && !state.equipment.length){
    toast('기구가 하나도 없으면 맨몸 운동은 끌 수 없어요');
    return;
  }
  state.includeBodyweight=!state.includeBodyweight;
  touch(); renderSetup();
  toast(state.includeBodyweight?'맨몸 운동을 플랜에 포함했어요':'맨몸 운동을 플랜에서 뺐어요');
}
function toggleFloor(){
  state.includeFloor=!state.includeFloor;
  touch(); renderSetup();
  toast(state.includeFloor?'바닥 운동을 포함했어요':'바닥에서 하는 동작을 제외했어요');
}

function logWeight(date,oi,k,val){
  const v=parseFloat(val);
  if(!state.log) state.log={};
  if(!state.log[date]) state.log[date]={};
  if(!state.log[date][oi]) state.log[date][oi]=[];
  state.log[date][oi][k]=isNaN(v)?null:v;
  touch(); // no re-render: keep input focus while typing across sets
}
function toggleSetDone(date,oi,k){
  if(!state.log) state.log={};
  if(!state.log[date]) state.log[date]={};
  if(!state.log[date][oi]) state.log[date][oi]=[];
  state.log[date][oi][k]=!state.log[date][oi][k];
  touch(); renderToday();
}

function chgSets(si,oi,d,defSets){
  if(!state.slotCustom) state.slotCustom={};
  const key=si+':'+oi;
  const cur=(state.slotCustom[key]&&state.slotCustom[key].sets)||defSets;
  const n=Math.max(1,Math.min(8,cur+d));
  state.slotCustom[key]=Object.assign({}, state.slotCustom[key], {sets:n});
  touch(); renderToday();
}
function setReps(si,oi,val,defReps){
  if(!state.slotCustom) state.slotCustom={};
  const key=si+':'+oi;
  const v=(val||'').trim();
  state.slotCustom[key]=Object.assign({}, state.slotCustom[key], {reps:v||defReps});
  touch(); // no re-render: keep input focus
}
function resetVol(si,oi){
  if(state.slotCustom) delete state.slotCustom[si+':'+oi];
  touch(); renderToday();
}

function resetSchedule(){
  state.restDays=[]; state.doneDays=[]; state.startDate=todayStr(); openDays={};
  touch(); toast('휴식/완료 기록을 초기화했어요'); refresh();
}
/* 카테고리 기본 무게 조절 — 카테고리의 증량 단위만큼 증감 */
const _WDEF_STEP={machine:5, barbell:2.5, smith:2.5, dumbbell:0.5, kettlebell:4};
function setWDefault(cat,dir){
  if(!state.wDefaults) state.wDefaults={};
  const cur=(state.wDefaults[cat]!=null)?state.wDefaults[cat]:baseFor(cat);
  const step=_WDEF_STEP[cat]||5;
  state.wDefaults[cat]=Math.max(0, Math.round((cur+dir*step)*10)/10);
  touch(); renderSetup();
}
async function resetAll(){
  if(typeof Sync!=='undefined' && Sync.isConnected()){ try{ await Sync.signOut(); }catch(e){} } // 로그아웃 먼저 — 빈 state가 클라우드를 덮거나 세션 잔존으로 게이트 우회하는 것 방지
  if(wuTimer){ clearInterval(wuTimer); wuTimer=null; } wuP=null; // 웜업 타이머 정리 — 초기화된 state에 stray 완료 기록 방지
  state=freshState();
  openDays={}; persist(); toast('전체 초기화 완료'); if(typeof Auth!=='undefined') Auth.show(); refresh();
}

/* ---------------- 분석 탭 (Analytics MVP) ----------------
   원칙: 전부 로컬 데이터로 계산(서버·라이브러리 없음), 칼로리는 MET 추정치임을 명시,
   부정 프레임 금지(부족/실패 표현 대신 누적·달성). 기획: MATE_분석탭_기획.md */
/* 기구 카테고리 → 그래프 문법: 머신=무게판 스택, 바벨/스미스=눕힌 원판 스택, 덤벨/케틀벨=크기 성장(실물 문법) */
function anChartKind(cat){ return cat==='dumbbell'?'d' : cat==='kettlebell'?'k' : (cat==='barbell'||cat==='smith')?'b' : 'm'; }

/* 운동별 무게 시계열: log의 날짜를 그 날짜 세션 슬롯으로 해석해 (세션:슬롯)별 그날 최고 무게를 모은다.
   운동명·기구는 현재 픽 기준 근사(lastLog와 동일한 한계) */
function anExSeries(){
  const map={};
  Object.keys(state.log||{}).sort().forEach(dt=>{
    const e=sessionFor(dt); if(!e||e.rest) return;
    const s=SESSIONS[e.session]; if(!s) return;
    const rec=state.log[dt];
    sessionExercises(s, e.session).forEach(x=>{
      if(typeof x.key!=='number') return; /* 기구 슬롯만(맨몸 'Nb' 키 제외) */
      const vals=[].concat(rec[x.key]||[], rec[x.key+'L']||[], rec[x.key+'R']||[]).filter(v=>typeof v==='number'&&v>0);
      if(!vals.length) return;
      const id=e.session+':'+x.key;
      if(!map[id]) map[id]={name:x.r.name, cat:exCat(x.r.name,x.r.eq||[]), reps:recReps(x.sl,x.r), pts:[]};
      map[id].pts.push({d:dt, w:Math.max(...vals)});
    });
  });
  return Object.values(map).sort((a,b)=>(b.pts.length-a.pts.length)||(b.pts[b.pts.length-1].w-a.pts[a.pts.length-1].w));
}

/* 기구별 그래프 스케일(운영자 확정 2026-07-16): 아이콘 = 실물 문법, 표현 상한 고정.
   머신 판 1개=10kg(상한 120kg=12판) · 바벨/스미스 원판 1장=20kg(상한 200kg=10장) · 덤벨 상한 40kg · 케틀벨 상한 32kg(크기 비례).
   상한 초과 무게는 상한 모양으로 캡 — 실제 값은 열 위 숫자 라벨이 말해준다 */
const AN_SCALE={m:{unit:10,max:120}, b:{unit:20,max:200}, d:{max:40}, k:{max:32}};
/* 기구 아이콘 그래프: 최근 7일(열=날짜), 각 열 위 "숫자kg" 라벨, 빈 날은 점 */
function anChart(kind, days){
  const W=322, H=78, top=13, bot=12, IH=H-top-bot;
  const cw=W/days.length, sc=AN_SCALE[kind];
  let out='';
  days.forEach((dy,ci)=>{
    const cx=cw*ci+cw/2;
    out+=`<text x="${cx}" y="${H-2}" text-anchor="middle" font-size="9" fill="var(--faint)" font-family="inherit">${dy.lb}</text>`;
    if(dy.w==null){ out+=`<circle cx="${cx}" cy="${H-bot-3}" r="1.6" fill="var(--line)"/>`; return; }
    const wv=dy.w; let topY=H-bot; /* 그린 모양의 최상단 — 무게 라벨을 바로 위에 붙이기 위함 */
    if(kind==='m'||kind==='b'){
      const maxN=Math.round(sc.max/sc.unit);
      const n=Math.max(1, Math.min(maxN, Math.round(wv/sc.unit)));
      const eh=IH/maxN, ew=kind==='m'?15:17, x=cx-ew/2;
      for(let i=0;i<n;i++){ const y=H-bot-(i+1)*eh, ph=eh*0.8;
        out+= kind==='m'
          ? `<rect x="${x}" y="${y}" width="${ew}" height="${ph}" rx="1.3" fill="var(--accent)"/><rect x="${cx-1.5}" y="${y+ph*0.3}" width="3" height="${ph*0.36}" rx=".6" fill="var(--surface)"/>`
          : `<rect x="${x}" y="${y}" width="${ew}" height="${ph}" rx="${ph/2}" fill="var(--accent)"/>${i===n-1?`<rect x="${cx-1.9}" y="${y-1}" width="3.8" height="${ph+2}" rx="1.3" fill="var(--accent-ink)"/>`:''}`; }
      topY=H-bot-n*eh;
    } else {
      /* 덤벨·케틀벨: 무거울수록 커짐(실물처럼 더 큰 것으로 바꿔 듦) — 고정 스케일, 바닥 정렬 */
      const h=10+Math.min(1, wv/sc.max)*(IH-10);
      if(kind==='k'){ const r=h*0.34, cy=H-bot-r, hw=r*0.72;
        out+=`<path d="M ${cx-hw} ${cy-r*0.55} a ${hw} ${h*0.30} 0 0 1 ${hw*2} 0" stroke="var(--accent)" stroke-width="${Math.max(1.6,h*0.13)}" fill="none" stroke-linecap="round"/><circle cx="${cx}" cy="${cy}" r="${r}" fill="var(--accent)"/>`;
      } else { const bw2=h*0.30, bh=h*0.92, barw=h*0.55, y=H-bot-bh;
        out+=`<rect x="${cx-barw/2-bw2}" y="${y}" width="${bw2}" height="${bh}" rx="${bw2*0.32}" fill="var(--accent)"/><rect x="${cx+barw/2}" y="${y}" width="${bw2}" height="${bh}" rx="${bw2*0.32}" fill="var(--accent)"/><rect x="${cx-barw/2}" y="${H-bot-bh/2-h*0.13}" width="${barw}" height="${h*0.26}" rx="${h*0.13}" fill="var(--accent)"/>`; }
      topY=H-bot-h;
    }
    out+=`<text x="${cx}" y="${Math.max(9.5, topY-4)}" text-anchor="middle" font-size="9.5" font-weight="700" fill="var(--muted)" font-family="inherit">${wv%1?wv.toFixed(1):wv}kg</text>`;
  });
  return `<svg width="100%" viewBox="0 0 ${W} ${H}" style="display:block" aria-hidden="true">${out}</svg>`;
}

/* MET 추정 칼로리(웨어러블 연동 전 근사) — stepMs(실측 시간) 기반, 없으면 완료일은 세션 계획 분으로 근사 */
const AN_MET={warm:2.8, cool:2.5, cardio:6.0, ex:4.5};
function anKcalFor(dt){
  const bw=(state.profile&&state.profile.weightKg)||70;
  const ms=state.stepMs&&state.stepMs[dt];
  let kcal=0;
  if(ms) Object.keys(ms).forEach(id=>{ const met=AN_MET[id]!=null?AN_MET[id]:AN_MET.ex; kcal+=met*bw*(ms[id]/3600000); });
  if(kcal<10 && state.doneDays.includes(dt)) kcal=4.6*bw*((state.sessionMinutes||60)/60);
  return Math.round(kcal);
}
function anWeekKcal(){ const ws=weekStartStr(todayStr()); return Array.from({length:7},(_,i)=>anKcalFor(fmt(addDays(parse(ws),i)))); }
function anMonthKcal(){ const t=parse(todayStr()); let sum=0; for(let i=1;i<=t.getDate();i++) sum+=anKcalFor(fmt(new Date(t.getFullYear(),t.getMonth(),i))); return sum; }

/* 누적 합계: 세션·세트·볼륨(무게×해당 슬롯 권장 횟수 근사)·운동 시간 */
function anTotals(){
  let sets=0, vol=0;
  Object.keys(state.log||{}).forEach(dt=>{
    const e=sessionFor(dt); if(!e||e.rest) return;
    const s=SESSIONS[e.session]; if(!s) return;
    const rec=state.log[dt];
    sessionExercises(s, e.session).forEach(x=>{
      const reps=parseInt(recReps(x.sl,x.r))||10;
      [x.key, x.key+'L', x.key+'R'].forEach(k=>{ (rec[k]||[]).forEach(v=>{
        if(typeof v==='number'&&v>0){ sets++; vol+=v*reps; }
        else if(v===true) sets++; }); });
    });
  });
  const ms=Object.values(state.stepMs||{}).reduce((a,o)=>a+Object.values(o).reduce((x,y)=>x+(+y||0),0),0);
  return {sessions:state.doneDays.length, sets, vol:Math.round(vol), ms};
}

function anHeatHTML(){
  const t=todayStr(); const start=addDays(parse(weekStartStr(t)),-77); /* 11주 전 월요일부터 12주 */
  let cells='';
  for(let i=0;i<84;i++){ const k=fmt(addDays(start,i));
    let cls='';
    if(k>t) cls='f';
    else if(state.doneDays.includes(k)) cls='l3';
    else if(state.steps&&state.steps[k]&&Object.values(state.steps[k]).some(Boolean)) cls='l1';
    cells+=`<i class="${cls}"></i>`;
  }
  return `<div class="an-heat">${cells}</div><div class="an-heat-cap"><span>12주 전</span><span>이번 주</span></div>`;
}

function josaGa(w){ if(!w) return '가'; const c=w.charCodeAt(w.length-1); if(c>=0xAC00&&c<=0xD7A3) return ((c-0xAC00)%28)===0?'가':'이'; return '가'; }
function anInsight(series){
  let best=null;
  series.forEach(o=>{ const p=o.pts.slice(-6);
    if(p.length>=2){ const dw=p[p.length-1].w-p[0].w; if(dw>0&&(!best||dw>best.dw)) best={name:o.name,dw}; } });
  if(best) return `🏋️ ${esc(best.name)}${josaGa(best.name)} 최근 <b>+${best.dw%1?best.dw.toFixed(1):best.dw}kg</b> 무거워졌어요`;
  const cur=streak();
  if(cur>=2) return `🔥 <b>${cur}일 연속</b> 운동 중이에요, 이 흐름 그대로!`;
  if(state.doneDays.length>0) return `💪 지금까지 <b>${state.doneDays.length}세션</b> 완주 — 무게를 기록하면 발전 그래프가 생겨요`;
  return '';
}

function renderAnal(){
  const t=todayStr();
  const hasData=state.doneDays.length>0 || Object.keys(state.log||{}).length>0;
  let html='';
  if(!hasData){
    html=`<div class="an-score"><div class="n">아직 비어 있어요</div><div class="s">첫 세션을 완료하면 나의 발전이 여기에 쌓여요</div></div>
      <div class="card an-empty" style="margin-top:14px"><div class="ae-t">완료하면 이렇게 보여드려요</div>
      <div class="ae-s">주간 완료 스코어와 지난주 비교<br>운동별 무게 발전 그래프 (기구 아이콘이 쌓여요)<br>12주 운동 캘린더와 연속 기록<br>소모 칼로리 추정과 누적 마일스톤</div></div>`;
  } else {
    /* 주간 스코어 */
    const planned=weekPlanned(), done=weekDone();
    const ws=weekStartStr(t);
    const lastWs=fmt(addDays(parse(ws),-7)), lastWe=fmt(addDays(parse(ws),-1));
    const lastDone=state.doneDays.filter(k=>k>=lastWs&&k<=lastWe).length;
    const diff=done-lastDone;
    const sub= done===0? '이번 주 첫 세션이 제일 중요해요'
      : diff>0? `지난주보다 ${diff}회 더 했어요` : diff===0? '지난주와 같은 페이스예요' : '이번 주도 차근차근 이어가요';
    const segs=Array.from({length:Math.max(planned,done,1)},(_,i)=>`<i class="${i<done?'on':''}"></i>`).join('');
    html+=`<div class="an-score"><div class="n">이번 주 <b>${done}</b>회 완료</div><div class="s">${sub}</div><div class="an-wkbar">${segs}</div></div>`;
    /* 인사이트 */
    const series=anExSeries();
    const ins=anInsight(series);
    if(ins) html+=`<div class="an-insight">${ins}</div>`;
    /* 운동 발전 — 최근 7일(열=날짜, 스택 위 무게 라벨). 7일 내 기록이 있는 운동만 */
    html+=`<div class="sec-label">운동 발전</div>`;
    const td=parse(t), from=fmt(addDays(td,-6));
    const recent=series.filter(o=>o.pts.some(p=>p.d>=from))
      .sort((a,b)=>b.pts[b.pts.length-1].d.localeCompare(a.pts[a.pts.length-1].d));
    if(recent.length){
      html+=`<div class="card an-card" style="padding:4px 16px">`;
      recent.slice(0,4).forEach(o=>{
        const days=Array.from({length:7},(_,i)=>{ const d=addDays(td,i-6), k=fmt(d);
          const pt=o.pts.find(p=>p.d===k); return {lb:WD[d.getDay()], w:pt?pt.w:null}; });
        const have=days.filter(dy=>dy.w!=null).map(dy=>dy.w);
        const dw=have.length>=2? Math.round((have[have.length-1]-have[0])*10)/10 : 0;
        const badge= dw>0? `<span class="an-delta">+${dw}kg</span>` : `<span class="an-delta flat">유지</span>`;
        html+=`<div class="an-ex2"><div class="x-hd"><b>${esc(o.name)}</b><span class="x-cat">${esc(String(o.reps))}</span>${badge}</div>${anChart(anChartKind(o.cat),days)}</div>`; });
      html+=`</div>`;
    } else {
      html+=`<div class="card an-empty"><div class="ae-s">${series.length?'최근 7일에 무게 기록이 없어요.<br>다음 세션에서 기록하면 여기 다시 쌓여요':'운동 중 무게를 기록하면<br>기구가 차곡차곡 쌓이는 발전 그래프가 생겨요'}</div></div>`;
    }
    /* 꾸준함 */
    const cur=streak(), best=bestStreak();
    const md=parse(t); let pPlan=0,pDone=0;
    for(let i=1;i<=md.getDate();i++){ const k=fmt(new Date(md.getFullYear(),md.getMonth(),i)); const e=sessionFor(k);
      if(e&&!e.rest){ pPlan++; if(state.doneDays.includes(k)) pDone++; } }
    const adhere=pPlan?Math.round(pDone/pPlan*100):null;
    html+=`<div class="sec-label">꾸준함</div><div class="card an-card">${anHeatHTML()}</div>
      <div class="an-row2">
        <div class="card an-card an-kpi"><div class="v">🔥 ${cur}<small>일 연속</small></div><div class="c">최고 기록 ${best}일</div></div>
        <div class="card an-card an-kpi"><div class="v">${adhere==null?'–':adhere+'<small>%</small>'}</div><div class="c">이번 달 계획 준수율</div></div>
      </div>`;
    /* 칼로리 */
    const wk=anWeekKcal(), wkSum=wk.reduce((a,b)=>a+b,0), mo=anMonthKcal();
    const mx=Math.max(...wk,1);
    const bars=wk.map((v,i)=>`<div class="b${v?'':' z'}"><i style="height:${Math.max(4,Math.round(v/mx*46))}px"></i><span>${'월화수목금토일'[i]}</span></div>`).join('');
    const chick=mo/1600;
    html+=`<div class="sec-label">칼로리</div><div class="card an-card">
      <div class="an-kpi"><div class="v">${wkSum.toLocaleString()} <small>kcal</small></div><div class="c">이번 주 소모 (추정)</div></div>
      <div class="an-kcal-bars">${bars}</div>
      ${mo>0?`<div class="an-fun">이번 달 누적 <b>${mo.toLocaleString()}kcal</b>${chick>=0.3?` = 치킨 ${chick.toFixed(1)}마리 🍗`:''}</div>`:''}
      <div class="an-note">체중과 운동 시간 기반 MET 추정치예요. 워치 연동 시 실측으로 바뀌어요.</div>
    </div>`;
    /* 마일스톤 */
    const tot=anTotals();
    const volTxt= tot.vol>=1000? `${(tot.vol/1000).toFixed(1)}<small>톤</small>` : `${tot.vol.toLocaleString()}<small>kg</small>`;
    const eleph=tot.vol/6000;
    const hrs=Math.floor(tot.ms/3600000), mins=Math.round(tot.ms%3600000/60000);
    const timeTxt= hrs>0? `${hrs}<small>시간 ${mins}분</small>` : `${mins}<small>분</small>`;
    html+=`<div class="sec-label">마일스톤</div><div class="an-row2" style="margin-top:0">
      <div class="card an-card an-kpi"><div class="v">${volTxt}</div><div class="c">누적 들어올린 무게${eleph>=0.5?`<br>아프리카 코끼리 ${eleph.toFixed(1)}마리 🐘`:''}</div></div>
      <div class="card an-card an-kpi"><div class="v">${timeTxt}</div><div class="c">누적 운동 시간<br>총 ${tot.sessions}세션, ${tot.sets}세트</div></div>
    </div>`;
  }
  $('view-anal').innerHTML=html;
  $('hd-title').textContent='분석'; $('hd-cyc').innerHTML='';
}

/* ---------------- Cloud sync (Firebase + Google 로그인) ---------------- */
const CFG_KEY='workoutPlanner:fbcfg';
function parseFirebaseConfig(str){
  let s=(str||'').trim();
  const idx=s.indexOf('firebaseConfig');
  if(idx>=0){ s=s.slice(idx).replace(/^firebaseConfig\s*=\s*/,''); }
  s=s.replace(/^\s*(const|let|var)\s+[\w$]+\s*=\s*/,'').trim();
  const a=s.indexOf('{');
  if(a<0) throw new Error('no object');
  let depth=0,b=-1;
  for(let i=a;i<s.length;i++){const ch=s[i]; if(ch==='{')depth++; else if(ch==='}'){depth--; if(depth===0){b=i;break;}}}
  if(b<0) b=s.lastIndexOf('}');
  s=s.slice(a,b+1);
  try{ return JSON.parse(s); }catch(e){}
  const t=s
    .replace(/^\s*\/\/.*$/gm,'')                              // strip full-line // comments only
    .replace(/([{,]\s*)([A-Za-z_$][\w$]*)\s*:/g,'$1"$2":')    // quote bare keys
    .replace(/'/g,'"')                                         // single → double quotes
    .replace(/,\s*([}\]])/g,'$1');                             // remove trailing commas
  return JSON.parse(t);
}
const Sync=(()=>{
  let db=null, auth=null, ref=null, user=null, ready=false, lastPushed=0, onAuth=null;
  function setOnAuth(cb){ onAuth=cb; }
  function loadSDK(){return new Promise((res,rej)=>{
    if(window.firebase&&firebase.auth&&firebase.database)return res();
    const base='https://www.gstatic.com/firebasejs/10.12.0/';
    const files=['firebase-app-compat.js','firebase-auth-compat.js','firebase-database-compat.js'];
    let i=0;
    (function next(){ if(i>=files.length)return res();
      const s=document.createElement('script'); s.src=base+files[i++];
      s.onload=next; s.onerror=()=>rej(new Error('네트워크에서 Firebase를 불러오지 못했어요.'));
      document.head.appendChild(s);
    })();
  });}
  function applyRemote(r){
    try{
      const d=JSON.parse(r.data);
      const merged={...state,...d};
      /* 날짜 키 기반 append-only 필드는 로컬·원격을 병합 — 두 기기가 다른 날짜를 편집해도 서로를 통째로 덮지 않게(문서 LWW 완화). 같은 날짜는 원격이 우선. */
      ['log','steps','stepStart','stepMs'].forEach(f=>{ merged[f]={...(state[f]||{}),...(d[f]||{})}; });
      state=merged; state._ts=r.updatedAt||Date.now(); clampStartDate(); persist(); refresh();
    }catch(e){}
  }
  async function attach(){
    if(!user){ if(ref){ref.off();ref=null;} return; }
    ref=db.ref('users/'+user.uid);
    /* ⚠️ 여기서 state._ts를 now로 찍지 말 것 — 실데이터 없는 새 기기(_ts=0)가 원격보다 최신으로 보여 빈 state로 클라우드를 덮어씀(기록 소실). _ts=0이면 원격이 항상 우선(다운로드). */
    try{
      const snap=await ref.once('value');
      const remote=snap.exists()?snap.val():null;
      if(remote&&remote.data&&(remote.updatedAt||0)>=(state._ts||0)) applyRemote(remote);
      else await push();
    }catch(e){ console.warn('initial sync failed',e); }
    ref.on('value',s=>{
      const r=s.exists()?s.val():null; if(!r||!r.data)return;
      if((r.updatedAt||0)===lastPushed)return;
      if((r.updatedAt||0)>(state._ts||0)) applyRemote(r);
    });
  }
  async function push(){
    if(!ref)return;
    const ts=state._ts||nowTs(); lastPushed=ts;
    try{await ref.set({data:JSON.stringify(state),updatedAt:ts});}catch(e){console.warn('sync push failed',e);}
  }
  async function init(cfgStr){
    let cfg;try{cfg=parseFirebaseConfig(cfgStr);}catch(e){throw new Error('Firebase 설정을 읽지 못했어요. firebaseConfig의 { … } 부분을 통째로 붙여넣어 주세요.');}
    if(!cfg.apiKey||!cfg.authDomain)throw new Error('설정에 apiKey / authDomain 이 필요해요. 웹 앱 설정을 통째로 붙여넣어 주세요.');
    if(!cfg.databaseURL)throw new Error('설정에 databaseURL이 없어요. Realtime Database를 먼저 만들어야 합니다.');
    await loadSDK();
    const app=(firebase.apps&&firebase.apps.length)?firebase.app():firebase.initializeApp(cfg);
    auth=firebase.auth(app); db=firebase.database(app);

  const norm=(o)=>JSON.stringify(o, (k,v)=> v===''?null:v);
  function readCurrent(){ if(curStep===1)readStep1(); else if(curStep===2)readStep2(); }
  function isDirty(){ readCurrent(); return obInit!=null && norm(ob)!==norm(obInit); }

      injuries:{has:ob.injHas===true, list:ob.injHas===true?ob.injList.slice():[], other:(ob.injHas===true&&ob.injEtc)?(ob.injOther||''):''},
      conditions:{has:ob.condHas===true, list:ob.condHas===true?ob.condList.slice():[], other:(ob.condHas===true&&ob.condEtc)?(ob.condOther||''):''},

    return true;
  }
  /* 이전 단계로. STEP 1에서는 이전 단계가 없으므로 편집을 종료하고 설정으로 나간다. */
  function goPrev(){

    goPrev();

  function renderBirthCal(){
    const m=document.getElementById('ympick'); const WDh=['일','월','화','수','목','금','토']; let inner;
    if(bdStep==='year'){
      const now=new Date().getFullYear(); let cells='';

    toggleDay:(i)=>{ const j=ob.workoutDays.indexOf(i); if(j>=0)ob.workoutDays.splice(j,1); else ob.workoutDays.push(i); render(3); },
    setMin:(m)=>{ ob.sessionMinutes=m; render(3); },
    obBwT:()=>{ if(ob.obBw && !ob.equipment.length){ toast('기구가 하나도 없으면 맨몸 운동은 끌 수 없어요'); return; } ob.obBw=!ob.obBw; render(3); },
    obFloorT:()=>{ ob.obFloor=!ob.obFloor; render(3); },
    finish:()=>{
      if(!ob.heightCm||!ob.weightKg||ob.lifting===null||ob.running===null){ toast('이전 단계 정보를 확인해 주세요'); render(2); return; }
      if(!ob.workoutDays||ob.workoutDays.length===0){ toast('운동할 요일을 최소 1개 선택해 주세요'); return; }
      const wasEditing=editing;
      commit();
      hide(); if(done)done();
      if(typeof switchTab==='function') switchTab('home');
      toast(wasEditing?'변경 사항을 저장했어요':'플랜이 준비됐어요! 아래에서 확인해 보세요');
    },
    isEditing:()=>editing,
    /* 편집 저장 후 다음 단계로. obInit 기준선을 갱신해 이후 [취소]가 이 단계 변경을 '변경 없음'으로 본다. */
    saveNext:(step)=>{
      readCurrent();
      if(!validateStep(step)) return;
      commit(); obInit=snap();
      render(step+1); box().scrollTop=0; toast('저장했어요');
    },
    /* 뒤로: 편집 중 변경 사항이 있으면 저장 여부를 묻는다. 확인=저장 후 뒤로, 저장하지 않음=그대로 뒤로.
       온보딩(비편집)에서는 입력만 유지하고 바로 이전 단계로 이동. */
    backStep:()=>{
      if(editing && isDirty()){
        openDialog('변경 사항을 저장하시겠습니까?', [
          {label:'저장하지 않음', kind:'ghost', act:()=>doBack(false)},
          {label:'확인', kind:'primary', act:()=>doBack(true)}
        ]);
        return;
      }
      readCurrent(); goPrev();
    },
    /* 편집 종료(취소/네비 이동). 변경 사항이 있으면 확인을 받는다. targetTab 기본값은 설정 탭. */
    exitEdit:(targetTab)=>{
      const t=(typeof targetTab==='string')?targetTab:'setup';
      const go=()=>{ hide(); if(done)done(); if(typeof switchTab==='function') switchTab(t); };
      if(isDirty()) openDialog('변경 사항을 저장하지 않고 나가시겠습니까?', [
        {label:'취소', kind:'ghost', act:null},
        {label:'확인', kind:'primary', act:go}
      ]);
      else go();
    }
  };
})();

/* live timers tick */
setInterval(()=>{ document.querySelectorAll('.live-timer').forEach(el=>{ const st=+el.dataset.start; if(st){ const s=Math.floor((Date.now()-st)/1000); el.textContent=Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); } }); },1000);

/* ---------------- Init ---------------- */
(async function(){
  await load();
  // state._ts는 여기서 찍지 않는다 — 실데이터 없는 새 기기는 _ts=0이어야 첫 동기화에서 원격을 다운로드(빈 state로 덮어쓰기 방지). 실제 편집 시 touch()가 stamp함.
  clampStartDate();
  renderHome();
  Sync.setOnAuth(u=>{ Auth.onSignedIn(u); });
  if(!state.authPassed) Auth.show(); else Auth.hide();
  // re-init sync if configured before; Google login session restores automatically
  const cfg=await Store.get(CFG_KEY);
  if(cfg){ Sync.init(cfg).then(()=>{ if(activeTab==='setup')renderSetup(); }).catch(()=>{}); }
})();
</script>
