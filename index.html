<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#2E5E56">
<!-- 홈 화면에 추가하면 앱처럼 전체화면으로 열리도록 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="운동 플랜">
<meta name="application-name" content="운동 플랜">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%232E5E56'/%3E%3Cpath d='M28 50h44M34 40v20M66 40v20M24 45v10M76 45v10' stroke='white' stroke-width='7' stroke-linecap='round'/%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%232E5E56'/%3E%3Cpath d='M28 50h44M34 40v20M66 40v20M24 45v10M76 45v10' stroke='white' stroke-width='7' stroke-linecap='round'/%3E%3C/svg%3E">
<title>운동 플랜</title>
<style>
  /* Pretendard — 토스·애플 계열의 깔끔한 한글 UI 서체 (SIL OFL, 상업용 무료) */
  @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.css");
  :root{
    --bg:#F5F4EF; --surface:#FFFFFF; --surface-2:#FBFAF6;
    --ink:#1D211E; --muted:#71766F; --faint:#A6ABA3;
    --line:#D8D3C6; --line-2:#E3DFD3;
    /* 팬톤 기반 브랜드 컬러 — 액센트는 62x 계열(같은 색상군 밝기 램프) */
    /* 626 C / 627 C / 626 C 12% 틴트 */
    --accent:#285C4D; --accent-ink:#13322B; --accent-soft:#E5EBEA;
    /* 액센트 배경 위 글자색 */
    --on-accent:#FFFFFF;
    /* 7556 C / 7556 C 16% 틴트 */
    --sand:#B78B20; --sand-soft:#F3ECDB;
    /* 7599 C */
    --danger:#B33D26;
    --radius:16px; --radius-sm:11px;
    --shadow:0 1px 2px rgba(29,33,30,.04), 0 8px 24px -18px rgba(29,33,30,.35);
    --nav-h:64px;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#121417; --surface:#1A1D21; --surface-2:#20242A;
      --ink:#ECEDE9; --muted:#9AA09A; --faint:#6C7269;
      --line:#3A3F47; --line-2:#31363D;
      /* 624 C / 623 C / 626 C를 다크 배경에 얹은 틴트 */
      --accent:#789F90; --accent-ink:#9AB9AD; --accent-soft:#192D2A;
      /* 밝은 액센트 위에는 627 C 글자 — 흰 글자는 대비 미달(2.9:1) */
      --on-accent:#13322B;
      /* 7407 C / 7407 C 다크 틴트 */
      --sand:#CBA052; --sand-soft:#28251E;
      /* 7416 C */
      --danger:#E56A54;
      --shadow:0 1px 2px rgba(0,0,0,.3), 0 10px 30px -20px rgba(0,0,0,.7);
    }
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg); color:var(--ink); min-height:100dvh;
    font-family:"Pretendard Variable","Pretendard",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",Roboto,"Malgun Gothic","Noto Sans KR",sans-serif;
    letter-spacing:-.005em; word-break:keep-all; overflow-wrap:break-word;
    font-size:16px; line-height:1.5; -webkit-font-smoothing:antialiased;
    font-feature-settings:"tnum" 1;
  }
  .wrap{max-width:430px; margin:0 auto; padding:0 18px calc(var(--nav-h) + 24px);}
  .num{font-variant-numeric:tabular-nums;}

  /* Header */
  header{padding:14px 0 12px; display:flex; align-items:center; gap:6px; border-bottom:1px solid var(--line-2); margin-bottom:4px;}
  .ho-yt{vertical-align:-3px; margin-right:1px;}
  .brand{flex:1; min-width:0; display:flex; flex-direction:column; gap:1px;}
  .brand .eyebrow{font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--accent); font-weight:700;}
  .brand h1{font-size:22px; letter-spacing:-.02em; margin:0; font-weight:750;}
  .cyc{font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--faint); line-height:1.4;}
  .hbtn{flex:none; width:40px; height:40px; border:none; background:none; color:var(--ink); cursor:pointer; font-family:inherit; display:flex; align-items:center; justify-content:center; border-radius:10px;}
  .hbtn:active{background:var(--surface-2);}
  .hbtn svg{width:24px; height:24px;}

  /* Cards */
  .card{background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow);}
  .pad{padding:18px;}

  /* Today hero */
  .hero{overflow:hidden; margin-top:2px;}
  .hero-top{padding:18px 18px 16px; border-bottom:1px solid var(--line-2); position:relative;}
  .hero-top.nodiv{border-bottom:none; padding-bottom:18px;}
  .hero-top.rest{background:var(--sand-soft); border-bottom-color:transparent;}
  .hero-card{margin-bottom:14px;}
  .rest-mini{position:absolute; top:15px; right:16px; font-size:11.5px; font-weight:700; padding:5px 11px; border:1px solid var(--line); border-radius:999px; background:var(--surface); color:var(--muted); cursor:pointer; font-family:inherit;}
  .rest-mini:active{background:var(--surface-2);}
  .rest-mini.done{color:var(--accent-ink); border-color:var(--accent-soft); background:var(--accent-soft);}
  .hero-date{color:var(--muted); font-size:13px; letter-spacing:.02em;}
  .vdiv{display:inline-block; width:1px; height:0.82em; background:var(--line); margin:0 9px; vertical-align:middle;}
  .hero-date b{color:var(--ink); font-weight:650;}
  .hero-title{font-size:26px; font-weight:760; letter-spacing:-.02em; margin:8px 0 2px;}
  .hero-est{font-size:13px; color:var(--muted);}
  .tags{display:flex; flex-wrap:wrap; gap:6px; margin-top:11px;}
  .tag{font-size:11.5px; font-weight:650; padding:4px 9px; border-radius:999px; background:var(--accent-soft); color:var(--accent-ink); letter-spacing:.01em;}
  .pill{font-size:11px; font-weight:750; letter-spacing:.1em; text-transform:uppercase; padding:5px 10px; border-radius:999px;}
  .pill.rest{background:var(--sand); color:#fff;}
  .pill.rest-fixed{background:transparent; color:var(--sand); border:1px solid var(--sand);}

  /* section label */
  .sec-label{font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--faint); font-weight:700; margin:22px 4px 9px;}

  /* exercise rows */
  .ex{padding:14px 18px; border-top:1px solid var(--line-2); display:flex; gap:13px;}
  .ex:first-child{border-top:none;}
  .ex-idx{flex:none; width:22px; height:22px; margin-top:1px; border-radius:7px; background:var(--surface-2); border:1px solid var(--line); color:var(--muted); font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center;}
  .ex-idx.role{background:var(--accent-soft); color:var(--accent-ink); border-color:transparent;}
  .ex-body{flex:1; min-width:0;}
  .ex-name{font-weight:650; font-size:15.5px; letter-spacing:-.01em;}
  .ex-meta{display:flex; flex-wrap:wrap; gap:6px 10px; margin-top:4px; align-items:center;}
  .ex-vol{font-size:13px; font-weight:700; color:var(--accent-ink); font-variant-numeric:tabular-nums;}
  .ex-eq{font-size:12px; color:var(--muted); background:var(--surface-2); border:1px solid var(--line-2); padding:1px 7px; border-radius:6px;}
  .ex-cue{font-size:12.5px; color:var(--muted); margin-top:6px; line-height:1.45;}
  .ex-role{font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--faint); font-weight:700; margin-bottom:3px;}

  .note{padding:13px 18px; border-top:1px solid var(--line-2); font-size:13px; color:var(--muted); line-height:1.5;}
  .note b{color:var(--ink); font-weight:650;}
  .note.warm{background:var(--surface-2);}

  /* buttons */
  .btn{appearance:none; border:1px solid var(--line); background:var(--surface); color:var(--ink); font-family:inherit; font-size:14px; font-weight:650; padding:12px 16px; border-radius:var(--radius-sm); cursor:pointer; transition:.15s; width:100%; letter-spacing:-.01em;}
  .btn:hover{border-color:var(--accent);}
  .btn:active{transform:scale(.99);}
  .btn.primary{background:var(--accent); color:var(--on-accent); border-color:var(--accent);}
  .btn.primary:hover{filter:brightness(1.05);}
  .btn.done{background:var(--accent-soft); color:var(--accent-ink); border-color:transparent;}
  .btn.ghost{background:transparent;}
  .btn.sm{width:auto; padding:8px 13px; font-size:13px;}
  .btn-row{display:flex; gap:9px; padding:14px 18px; border-top:1px solid var(--line-2);}

  /* schedule list */
  .day{display:flex; align-items:stretch; gap:0; border-bottom:1px solid var(--line-2);}
  .day:last-child{border-bottom:none;}
  .day-rail{flex:none; width:56px; padding:15px 0 15px 4px; text-align:center; border-right:1px solid var(--line-2);}
  .day-wd{font-size:12px; font-weight:700; color:var(--muted);}
  .day-dt{font-size:19px; font-weight:750; letter-spacing:-.02em; margin-top:1px; font-variant-numeric:tabular-nums;}
  .day-main{flex:1; min-width:0; padding:13px 15px; display:flex; align-items:center; gap:10px; cursor:pointer;}
  .day-main.static{cursor:default;}
  .day-info{flex:1; min-width:0;}
  .day-ttl{font-weight:650; font-size:15px; letter-spacing:-.01em; display:flex; align-items:center; gap:7px;}
  .day-focus{font-size:12px; color:var(--muted); margin-top:2px; letter-spacing:-.01em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .day-focus .vdiv{margin:0 5px;}
  .plist-card{overflow:hidden;}
  .day.past, .day.before{background:var(--line-2); border-bottom-color:var(--line);}
  .day.past .day-rail, .day.before .day-rail{border-right-color:var(--line);}
  .day.today{background:var(--accent-soft);}
  .day.today .day-dt{color:var(--accent-ink);}
  .chev{flex:none; color:var(--faint); font-size:13px; transition:.2s;}
  .day.open .chev{transform:rotate(90deg);}
  .badge{font-size:10px; font-weight:750; letter-spacing:.06em; text-transform:uppercase; padding:2px 7px; border-radius:999px; flex:none;}
  .badge.today{background:var(--accent); color:var(--on-accent);}
  .badge.done{background:var(--accent-soft); color:var(--accent-ink);}
  .rest-tag{font-size:12.5px; font-weight:650; color:var(--sand);}
  .day-expand{background:var(--surface-2); border-top:1px solid var(--line-2);}
  .mini-ex{padding:8px 15px 8px 15px; border-top:1px solid var(--line-2); font-size:13.5px; display:flex; align-items:center; gap:10px;}
  .mini-ex:first-child{border-top:none;}
  .mini-ex .mv{color:var(--accent-ink); font-weight:700; flex:none; font-variant-numeric:tabular-nums; font-size:12.5px;}
  .mini-ex.done{background:var(--accent-soft);}
  .mini-ex.done .mn{color:var(--accent-ink); font-weight:700;}
  .mini-ex .mini-done{flex:none; color:var(--accent); font-weight:800; font-size:13px;}
  .mini-ex .mn{color:var(--ink); flex:1; min-width:0;}
  .day-tools{padding:11px 15px 11px 60px; display:flex; gap:8px; flex-wrap:wrap;}

  .lock{font-size:11.5px; color:var(--faint); padding:11px 15px 11px 60px;}

  /* equipment chips */
  .grp{margin-top:18px;}
  .grp-h{font-size:12px; font-weight:700; color:var(--muted); letter-spacing:.02em; margin:0 4px 9px;}
  .chips{display:flex; flex-wrap:wrap; gap:8px;}
  .chip{font-size:13px; font-weight:600; padding:8px 13px; border-radius:999px; border:1px solid var(--line); background:var(--surface); color:var(--muted); cursor:pointer; transition:.14s; user-select:none;}
  .chip.on{background:var(--accent); border-color:var(--accent); color:var(--on-accent);}
  .chip.caution.on{background:var(--sand); border-color:var(--sand);}

  /* equipment tiles with illustration */
  .eq-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:9px;}
  @media (max-width:400px){ .eq-grid{grid-template-columns:repeat(2,1fr);} }
  .eq-tile{border:1px solid var(--line); border-radius:var(--radius-sm); background:var(--surface); padding:11px 8px 9px; text-align:center; cursor:pointer; transition:.14s; user-select:none; position:relative; display:flex; flex-direction:column; align-items:center; gap:6px;}
  .eq-tile:hover{border-color:var(--accent);}
  .eq-tile .ill{width:100%; height:52px; color:var(--faint); transition:.14s;}
  .eq-tile .ill svg{width:100%; height:100%;}
  .eq-tile .lbl{font-size:12px; font-weight:600; color:var(--muted); line-height:1.25;}
  .eq-tile .tk{position:absolute; top:7px; right:7px; width:18px; height:18px; border-radius:50%; border:1.5px solid var(--line); display:flex; align-items:center; justify-content:center; font-size:11px; color:transparent;}
  .eq-tile.on{border-color:var(--accent); background:var(--accent-soft);}
  .eq-tile.on .ill{color:var(--accent);}
  .eq-tile.on .lbl{color:var(--accent-ink);}
  .eq-tile.on .tk{background:var(--accent); border-color:var(--accent); color:var(--on-accent);}
  .eq-tile.caution.on{border-color:var(--sand); background:var(--sand-soft);}
  .eq-tile.caution.on .ill{color:var(--sand);}
  .eq-tile.caution.on .tk{background:var(--sand); border-color:var(--sand);}

  /* big toggle row (bodyweight) */
  .toggle-row{display:flex; align-items:center; gap:12px; padding:15px 16px; border:1px solid var(--line); border-radius:var(--radius); background:var(--surface); cursor:pointer; user-select:none;}
  .toggle-row .tr-ill{flex:none; width:40px; height:40px; color:var(--faint);}
  .toggle-row .tr-body{flex:1; min-width:0;}
  .toggle-row .tr-t{font-weight:700; font-size:15px;}
  .toggle-row .tr-s{font-size:12.5px; color:var(--muted); margin-top:2px;}
  .switch{flex:none; width:46px; height:28px; border-radius:999px; background:var(--line); position:relative; transition:.18s;}
  .switch::after{content:""; position:absolute; top:3px; left:3px; width:22px; height:22px; border-radius:50%; background:#fff; box-shadow:0 1px 3px rgba(0,0,0,.25); transition:.18s;}
  .toggle-row.on{border-color:var(--accent); background:var(--accent-soft);}
  .toggle-row.on .tr-ill{color:var(--accent);}
  .toggle-row.on .switch{background:var(--accent);}
  .toggle-row.on .switch::after{left:21px;}

  /* exercise form figure in plan */
  .ex-fig{flex:none; width:46px; height:46px; border-radius:10px; background:var(--surface-2); border:1px solid var(--line-2); color:var(--accent); display:flex; align-items:center; justify-content:center; margin-top:1px;}
  .ex-fig svg{width:38px; height:38px;}
  .mini-fig{flex:none; width:30px; height:30px; color:var(--accent); opacity:.85;}
  .mini-fig svg{width:100%; height:100%;}

  /* per-set weight logging */
  .setlog{margin-top:10px;}
  .lastw{font-size:11.5px; color:var(--faint); margin:0 0 7px; font-variant-numeric:tabular-nums;}
  .lastw b{color:var(--muted); font-weight:700;}
  .setrow{display:flex; flex-wrap:wrap; gap:7px;}
  .setcell{display:flex; flex-direction:column; gap:3px;}
  .setrow:not(.dots){flex-wrap:wrap;}
  .setrow:not(.dots) .setcell{flex:1 1 0; min-width:0;}
  .setrow:not(.dots).q4 .setcell{flex:0 0 calc((100% - 21px)/4);}
  .setcell .sn{font-size:10.5px; color:var(--muted); font-weight:600; text-align:center;}
  .wtwrap{display:flex; align-items:center; border:1px solid var(--line); border-radius:9px; background:var(--surface-2); padding-right:7px;}
  .wtwrap:focus-within{border-color:var(--accent);}
  .wt{flex:1 1 0; width:0; min-width:0; border:none; background:none; color:var(--ink); font-family:inherit; font-size:14px; font-weight:700; text-align:right; padding:7px 2px 7px 8px; font-variant-numeric:tabular-nums; outline:none; -moz-appearance:textfield;}
  .wt::-webkit-outer-spin-button,.wt::-webkit-inner-spin-button{-webkit-appearance:none; margin:0;}
  .unit{font-size:11px; color:var(--faint); font-weight:600;}
  .setrow.dots{gap:7px;}
  /* 측면당(좌/우) 무게 입력 */
  .ss-row{display:flex; align-items:center; gap:8px; margin-top:6px;}
  .ss-lab{flex:none; width:20px; text-align:center; font-size:12.5px; font-weight:800; color:var(--muted);}
  .ss-cells{flex:1; min-width:0; display:flex; flex-wrap:wrap; gap:7px;}
  .ss-cells .setcell{flex:1 1 0; min-width:0;}
  .ss-cells.q4 .setcell{flex:0 0 calc((100% - 21px)/4);}
  .ss-head{margin-top:8px;}
  .ss-head .ss-num{flex:1 1 0; min-width:0; text-align:center; font-size:10.5px; font-weight:600; color:var(--muted);}
  .setrow.dots .setdot{flex:1 1 0; min-width:0;}
  .setrow.dots.q4 .setdot{flex:0 0 calc((100% - 21px)/4);}
  .setdot{width:36px; height:34px; border-radius:9px; border:1px solid var(--line); background:var(--surface-2); color:var(--muted); font-weight:700; font-size:12px; cursor:pointer; font-family:inherit;}
  .setdot.on{background:var(--accent); border-color:var(--accent); color:var(--on-accent);}

  /* guided step flow */
  .step{border:1px solid var(--line); border-radius:var(--radius); background:var(--surface); padding:14px 15px; margin-bottom:10px; transition:.16s;}
  .step.active{border-color:var(--accent); background:var(--accent-soft); box-shadow:0 0 0 2px var(--accent-soft);}
  .step.done{opacity:.62;}
  .step.done .step-name, .step.done .step-title{color:var(--muted);}
  .step-head{display:flex; align-items:flex-start; gap:11px;}
  .step-fig{flex:none; width:44px; height:44px; border-radius:10px; background:var(--surface-2); border:1px solid var(--line-2); color:var(--accent); display:flex; align-items:center; justify-content:center;}
  .step.active .step-fig{background:#fff;}
  .step-fig svg{width:36px; height:36px;}
  .step-fig.badge{font-size:12px; font-weight:800; color:var(--accent-ink); background:#fff;}
  .step-main{flex:1; min-width:0;}
  .step-body{margin-top:11px;}
  .step-hrow{display:flex; align-items:flex-start; gap:8px;}
  .step-hmain{flex:1; min-width:0;}
  .step-kicker{flex:none; font-size:11px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:var(--faint); white-space:nowrap; padding-top:2px;}
  .step-title{font-weight:700; font-size:15px;}
  .step-name{font-weight:800; font-size:16px; color:var(--accent-ink); margin-top:1px;}
  .step-list{margin:9px 0 2px; padding:0; list-style:none;}
  .step-list li{position:relative; padding:5px 0 5px 20px; font-size:13.5px; color:var(--ink); border-top:1px dashed var(--line-2);}
  .step-list li:first-child{border-top:none;}
  .step-list li::before{content:""; position:absolute; left:4px; top:11px; width:6px; height:6px; border-radius:50%; background:var(--accent); opacity:.5;}
  .step-cue{font-size:12.5px; color:var(--muted); line-height:1.55; margin-top:6px;}
  .step-cue .wu-desc:first-child{margin-top:0;}
  .step-list li.wu-item{padding-top:7px; padding-bottom:7px;}
  .step-list li.nodot::before{display:none;}
  .wu-name{font-weight:600; font-size:13.5px; color:var(--ink);}
  .wu-desc{font-size:12.5px; color:var(--muted); margin-top:3px; line-height:1.5; display:flex; gap:.3em; word-break:keep-all;}
  .wu-desc .wu-dash{flex:none;}
  .wu-desc .wu-dtx{flex:1; min-width:0;}
  .wu-desc .wu-seg{white-space:nowrap;}
  .cardio-chips{display:flex; flex-wrap:wrap; gap:7px; margin-top:7px;}
  .cardio-chips .cardio-chip{flex:1 1 0; min-width:0;}
  .cardio-chips.q4 .cardio-chip{flex:0 0 calc((100% - 21px)/4);}
  .cardio-chips{align-items:stretch;}
  .cardio-chip{padding:7px 8px; border-radius:9px; border:1px solid var(--line); background:var(--surface-2); color:var(--muted); font-family:inherit; font-size:12.5px; font-weight:700; cursor:pointer; text-align:center; white-space:normal; word-break:keep-all; line-height:1.3; display:flex; align-items:center; justify-content:center;}
  /* 본운동 기구 선택 버튼 — 시작 버튼 너비에 맞춰 균등 채움(최대 3) */
  .eqsel{display:flex; flex-wrap:wrap; gap:7px; margin-top:9px; align-items:stretch;}
  .eqsel .eqbtn{flex:1 1 0; min-width:0; padding:9px 8px; border-radius:10px; border:1px solid var(--line); background:var(--surface-2); color:var(--muted); font-family:inherit; font-size:12.5px; font-weight:700; cursor:pointer; text-align:center; white-space:normal; word-break:keep-all; line-height:1.3;}
  .eqsel .eqbtn.on{background:var(--accent); border-color:var(--accent); color:var(--on-accent);}
  .eqsel .eqbtn, .cardio-chips .cardio-chip{display:flex; align-items:center; justify-content:center; gap:4px; white-space:nowrap; padding-left:4px; padding-right:4px;}
  .eq-ic{flex:none; width:16px; height:16px; display:inline-flex; align-items:center; justify-content:center; color:inherit;}
  .eq-ic svg{width:16px; height:16px;}
  .eq-tx{min-width:0; font-size:10.5px; letter-spacing:-.02em; white-space:nowrap;}
  .cardio-chip.on{background:var(--accent); border-color:var(--accent); color:var(--on-accent);}
  .safety{margin-top:14px; padding:16px;}
  .safety-h{font-size:14px; font-weight:800; color:var(--accent-ink); margin-bottom:10px;}
  .safety-list{margin:0; padding:0; list-style:none;}
  .safety-list li{display:flex; gap:7px; align-items:flex-start; padding:5px 0; font-size:13px; color:var(--ink); line-height:1.55;}
  .safety-list .sl-tx{flex:1; min-width:0;}
  .warn-tri{flex:none; margin-top:3px; color:var(--sand);}
  .safety-note{margin-top:12px; background:var(--surface-2); border-radius:10px; padding:11px 12px; font-size:12px; color:var(--muted); line-height:1.6;}
  .safety-note .sn-line{display:flex; gap:6px; align-items:flex-start;}
  .safety-note .sn-line + .sn-line{margin-top:6px;}
  .safety-note .sn-dot{flex:none; font-weight:800; color:var(--accent);}
  .safety-note .sl-tx{flex:1; min-width:0;}
  .step-done-btn{width:100%; margin-top:12px; border:1px solid var(--accent); background:transparent; color:var(--accent-ink); font-weight:700; font-size:14px; padding:10px; border-radius:11px; cursor:pointer; font-family:inherit; transition:.14s;}
  .step.active .step-done-btn{background:var(--accent); color:var(--on-accent); border-color:var(--accent);}
  .step-done-btn.is-done{background:transparent; color:var(--muted); border-color:var(--line); border-style:dashed;}
  .step-done-btn.start{background:var(--accent); color:var(--on-accent); border-color:var(--accent);}
  .step-done-btn.timing{background:var(--sand-soft); color:var(--sand); border-color:var(--sand); font-variant-numeric:tabular-nums;}
  .step.timing{box-shadow:0 0 0 2px var(--sand) inset; border-radius:14px;}
  .step-done-row{width:100%; margin-top:12px; padding:10px; border-radius:11px; background:var(--accent-soft); color:var(--accent-ink); font-weight:700; font-size:13.5px; text-align:center;}
  .step-done-row b{font-variant-numeric:tabular-nums;}
  .step-reopen{margin-left:8px; border:none; background:none; color:var(--muted); font-size:12px; text-decoration:underline; cursor:pointer; font-family:inherit;}
  .wu-player{text-align:center; padding:20px 16px;}
  .wup-head{font-size:12.5px; font-weight:700; color:var(--muted); margin-bottom:8px;}
  .wup-head b{color:var(--accent-ink);}
  .wup-name{font-size:21px; font-weight:800; color:var(--ink); letter-spacing:-.02em; margin-bottom:6px;}
  .wup-desc{font-size:13px; color:var(--muted); line-height:1.5; margin-bottom:14px;}
  .wup-clock{font-size:40px; font-weight:800; color:var(--accent-ink); font-variant-numeric:tabular-nums; line-height:1;}
  .wup-dur{font-size:18px; font-weight:700; color:var(--faint);}
  .wup-reps{margin-top:8px; font-size:16px; font-weight:800; color:var(--ink); font-variant-numeric:tabular-nums;}
  .wup-reps .wup-sub{font-size:13px; font-weight:600; color:var(--muted);}
  .wup-bar{margin-top:14px; height:8px; border-radius:99px; background:var(--line-2); overflow:hidden;}
  .wup-fill{height:100%; width:0%; background:var(--accent); border-radius:99px; transition:width .2s linear;}
  .wup-dots{display:flex; gap:5px; justify-content:center; margin-top:12px; flex-wrap:wrap;}
  .wup-dot{width:8px; height:8px; border-radius:50%; background:var(--line);}
  .wup-dot.done{background:var(--accent);}
  .wup-dot.cur{background:var(--accent); box-shadow:0 0 0 3px var(--accent-soft);}
  .wup-btns{display:flex; gap:8px; margin-top:18px;}
  .wup-next{flex:1; height:46px; border:1px solid var(--line); background:var(--surface-2); color:var(--ink); font-family:inherit; font-size:14px; font-weight:700; border-radius:11px; cursor:pointer;}
  .wup-fin{flex:1; height:46px; border:none; background:var(--accent); color:var(--on-accent); font-family:inherit; font-size:14px; font-weight:800; border-radius:11px; cursor:pointer;}
  /* 카운트다운(시작 전 5초 / 다음 동작 3초) */
  .wu-cd{cursor:pointer;}
  .wu-fig{display:flex; align-items:center; justify-content:center; height:150px; margin:8px auto 2px; color:var(--accent);}
  .wu-fig-svg{width:132px; height:150px;}
  .wup-cd-num{font-size:74px; font-weight:800; color:var(--accent-ink); line-height:1; font-variant-numeric:tabular-nums; margin:4px 0 10px; animation:cdpop .5s cubic-bezier(.2,.85,.3,1);}
  .wup-cd-say{font-size:16px; font-weight:600; color:var(--muted); line-height:1.55;}
  .wup-cd-say b{color:var(--ink); font-weight:800;}
  .wu-cd-skip{margin-top:14px; font-size:12px; color:var(--faint); font-weight:600;}
  @keyframes cdpop{0%{transform:scale(.35); opacity:0;} 55%{transform:scale(1.14); opacity:1;} 100%{transform:scale(1);}}

  /* volume editor */
  .voledit{display:flex; align-items:center; justify-content:center; gap:6px; flex-wrap:wrap; margin-top:9px;}
  .voledit .stp{width:28px; height:28px; border-radius:8px; border:1px solid var(--line); background:var(--surface-2); color:var(--accent-ink); font-size:17px; font-weight:700; line-height:1; cursor:pointer; font-family:inherit;}
  .voledit .volnum{font-weight:800; font-size:14px; min-width:44px; text-align:center; font-variant-numeric:tabular-nums;}
  .voledit .voltimes{color:var(--faint); font-weight:700;}
  .cardiomin{margin-top:2px; margin-bottom:10px;}
  .cardiomin .cm-label{font-size:12.5px; font-weight:700; color:var(--muted); margin-right:4px;}
  .repin{width:74px; border:1px solid var(--line); border-radius:8px; background:var(--surface-2); color:var(--ink); font-family:inherit; font-size:13px; font-weight:700; text-align:center; padding:6px 4px; outline:none;}
  .repin:focus{border-color:var(--accent);}
  .volreset{margin-left:2px; border:none; background:none; color:var(--accent-ink); font-size:12px; font-weight:700; cursor:pointer; font-family:inherit; text-decoration:underline;}
  .vol-tag{font-size:10.5px; font-weight:700; color:var(--accent-ink); background:var(--accent-soft); border-radius:6px; padding:2px 6px;}

  /* how-to links */
  .howto{margin-top:11px; border:1px solid var(--line-2); border-radius:10px; background:var(--surface-2); overflow:hidden;}
  .howto>summary{list-style:none; cursor:pointer; padding:10px 12px; font-size:13px; font-weight:700; color:var(--accent-ink); display:flex; align-items:center; gap:7px;}
  .howto>summary.howto-sm{font-size:11.5px;}
  .howto>summary.howto-xs{font-size:10.5px;}
  .howto>summary .hs-txt{flex:1 1 auto; min-width:0;}
  .howto>summary::-webkit-details-marker{display:none;}
  .howto>summary .chev{flex:none; margin-left:6px; transition:.18s; color:var(--faint);}
  .howto[open]>summary .chev{transform:rotate(180deg);}
  .howto-body{padding:2px 12px 12px; display:flex; flex-direction:column; gap:8px;}
  .howto-body a{display:flex; align-items:center; gap:9px; padding:10px 12px; border:1px solid var(--line); border-radius:9px; background:var(--surface); color:var(--ink); text-decoration:none; font-size:13.5px; font-weight:600;}
  .howto-body a:hover{border-color:var(--accent);}
  .howto-body a .ho-ic{flex:none; width:22px; height:22px; display:flex; align-items:center; justify-content:center; border-radius:6px; font-size:12px;}
  .howto-body a .yt{background:#ff000018; color:#d40000;}
  .howto-body a .bl{background:var(--accent-soft); color:var(--accent-ink);}
  .howto-body a .go{margin-left:auto; color:var(--faint); font-size:15px;}
  .howto-note{font-size:11px; color:var(--faint); padding:0 2px;}
  .stepprog{font-size:12px; font-weight:700; color:var(--muted); text-align:center; margin:2px 0 12px;}
  /* 심박존 배지 — 팬톤: Z1 7723C, Z2 2277C, Z3 143C, Z4 1495C, Z5 179C (그린→레드) */
  .cz{display:flex; align-items:center; gap:9px; flex-wrap:wrap;}
  .cz-badge{display:inline-flex; align-items:center; gap:4px; color:#fff; font-weight:800; font-size:12px; padding:3px 10px; border-radius:8px; letter-spacing:.03em;}
  .cz-i{opacity:.9;}
  .cz-hr{font-size:12.5px; font-weight:700; color:var(--ink); font-variant-numeric:tabular-nums;}
  .cz-heart{color:#E1607A;}
  .cz-note{font-size:12.5px; font-weight:600; color:var(--muted);}
  .cz .vdiv{margin:0;}
  /* 심박존 — 팬톤 334 C / 7489 C / 142 C / 7577 C / 7619 C */
  .cz1{background:#009775;} .cz2{background:#74AA50;} .cz3{background:#F1BE48;} .cz4{background:#E07E3C;} .cz5{background:#C04C36;}
  .cz-tap{border:none; font-family:inherit; cursor:pointer;}
  .zi-title{font-size:17px; font-weight:800; color:var(--ink);}
  .zi-sub{font-size:12px; color:var(--muted); margin:5px 0 14px; line-height:1.5;}
  .zi-bar{display:flex; height:12px; border-radius:6px; overflow:hidden;}
  .zi-bar span{flex:1;}
  .zi-barlab{display:flex; justify-content:space-between; font-size:11px; color:var(--faint); margin:5px 0 16px;}
  .zi-list{display:flex; flex-direction:column; gap:11px;}
  .zi-foot{margin-top:16px; padding-top:12px; border-top:1px solid var(--line-2);}
  .zi-formula{font-size:12.5px; color:var(--ink); margin-bottom:6px;}
  .zi-warn{font-size:12px; color:var(--muted); line-height:1.6; word-break:keep-all;}
  .zi-src{margin-top:8px; font-size:11px; color:var(--faint); line-height:1.6; word-break:keep-all;}
  .src-link{color:var(--muted); text-decoration:underline;}
  .zi-row{display:flex; align-items:center; gap:9px;}
  .zi-row .cz-badge{flex:none;}
  .zi-hr{flex:none; min-width:64px; font-size:12px; font-weight:700; color:var(--ink); font-variant-numeric:tabular-nums;}
  .zi-d{flex:1; min-width:0; font-size:12px; color:var(--muted); line-height:1.5;}
  .zi-talk{font-size:11px; color:var(--faint);}

  /* ---- auth gate / consent overlay ---- */
  .gate{position:fixed; inset:0; z-index:200; background:var(--bg); display:flex; flex-direction:column; overflow-y:auto;}
  .gate.hidden{display:none;}
  .gate-inner{max-width:440px; width:100%; margin:auto; padding:32px 24px calc(32px + env(safe-area-inset-bottom));}
  .gate-brand{text-align:center; margin:14px 0 30px;}
  .gate-logo{width:66px; height:66px; border-radius:20px; background:var(--accent); color:var(--on-accent); display:flex; align-items:center; justify-content:center; margin:0 auto 16px;}
  .gate-logo svg{width:38px; height:38px;}
  .gate-brand h1{font-size:24px; font-weight:800; letter-spacing:-.02em; margin-bottom:6px;}
  .gate-brand p{font-size:14px; color:var(--muted);}
  .lbtn{display:flex; align-items:center; justify-content:center; gap:10px; width:100%; height:52px; border-radius:14px; font-family:inherit; font-size:15px; font-weight:700; cursor:pointer; border:1px solid transparent; margin-bottom:11px; transition:.14s;}
  .lbtn svg,.lbtn .em{width:20px; height:20px; flex:none;}
  .lbtn:active{transform:scale(.99);}
  .lbtn.kakao{background:#FEE500; color:#191600;}
  .lbtn.google{background:#fff; color:#1f1f1f; border-color:var(--line);}
  .lbtn.apple{background:#000; color:#fff;}
  .lbtn.email{background:var(--accent); color:var(--on-accent);}
  .gate-guest{display:block; width:100%; text-align:center; margin-top:8px; padding:12px; background:none; border:none; color:var(--muted); font-family:inherit; font-size:14px; font-weight:600; cursor:pointer; text-decoration:underline; text-underline-offset:3px;}
  .gate-legal{text-align:center; font-size:11.5px; color:var(--faint); margin-top:20px; line-height:1.6;}
  .gate-back{background:none; border:none; color:var(--muted); font-family:inherit; font-size:14px; font-weight:600; cursor:pointer; padding:6px 0; margin-bottom:6px;}
  .field{margin-bottom:12px;}
  .field label{display:block; font-size:12.5px; font-weight:700; color:var(--muted); margin-bottom:6px;}
  .field input{width:100%; height:48px; padding:0 14px; border:1px solid var(--line); border-radius:12px; background:var(--surface-2); color:var(--ink); font-family:inherit; font-size:15px; box-sizing:border-box; outline:none;}
  .field input:focus{border-color:var(--accent);}
  .seg{display:flex; gap:8px; margin-bottom:18px;}
  .seg button{flex:1; height:44px; border:1px solid var(--line); background:var(--surface-2); border-radius:11px; font-family:inherit; font-size:14px; font-weight:700; color:var(--muted); cursor:pointer;}
  .seg button.on{background:var(--accent); border-color:var(--accent); color:var(--on-accent);}

  /* consent */
  .cons-h{font-size:20px; font-weight:800; letter-spacing:-.02em; margin:6px 0 4px;}
  .cons-sub{font-size:13.5px; color:var(--muted); margin-bottom:20px;}
  .cons-all{display:flex; align-items:center; gap:12px; padding:16px; border:1.5px solid var(--accent); border-radius:14px; background:var(--accent-soft); cursor:pointer; user-select:none; margin-bottom:8px;}
  .cons-all .cbx{border-color:var(--accent);}
  .cons-all .ct{font-weight:800; font-size:15.5px;}
  .cons-item{display:flex; align-items:center; gap:12px; padding:13px 8px; cursor:pointer; user-select:none; border-top:1px solid var(--line-2);}
  .cons-item .ct{flex:1; font-size:14px; font-weight:600;}
  .cons-item .tag{font-size:11px; font-weight:800; padding:2px 6px; border-radius:5px;}
  .cons-item .tag.req{background:var(--accent-soft); color:var(--accent-ink);}
  .cons-item .tag.opt{background:var(--line); color:var(--muted);}
  .cons-item .viewbtn{background:none; border:none; color:var(--faint); font-size:12px; font-family:inherit; cursor:pointer; text-decoration:underline; flex:none;}
  .cbx{flex:none; width:24px; height:24px; border-radius:50%; border:2px solid var(--line); display:flex; align-items:center; justify-content:center; color:transparent; font-size:14px; transition:.12s;}
  .cbx.on{background:var(--accent); border-color:var(--accent); color:var(--on-accent);}
  .cons-text{font-size:12px; color:var(--muted); line-height:1.6; background:var(--surface-2); border:1px solid var(--line-2); border-radius:10px; padding:12px; margin:2px 8px 4px; max-height:150px; overflow-y:auto;}
  .cons-next{width:100%; height:52px; border-radius:14px; border:none; background:var(--accent); color:var(--on-accent); font-family:inherit; font-size:15px; font-weight:800; cursor:pointer; margin-top:20px;}
  .cons-next:disabled{background:var(--line); color:var(--faint); cursor:not-allowed;}

  /* profile banner */
  .pbanner-h{font-size:13px; font-weight:800; color:var(--accent-ink); margin-bottom:9px;}
  .pbanner-chips{display:flex; flex-wrap:wrap; gap:7px; margin-bottom:2px;}
  .pbanner-chips .pchip{flex:1 1 auto; min-width:0; text-align:center;}
  .pchip{font-size:12px; font-weight:700; color:var(--accent-ink); background:var(--accent-soft); border-radius:8px; padding:6px 10px;}
  .note.warn{background:var(--sand-soft); border:1px solid var(--sand); color:var(--ink); border-radius:10px; padding:10px 12px; margin-top:9px; font-size:12.5px; line-height:1.55;}
  .note.warn .note-t{display:block; margin-bottom:3px;}

  /* home dashboard */
  .home-hi{font-size:16.5px; font-weight:700; letter-spacing:-.01em; color:var(--accent-ink); margin:16px 0 15px;}
  .home-date{font-size:13px; color:var(--muted); margin-bottom:16px;}
  .hero-pad{padding:18px;}
  .home-prog{height:8px; border-radius:99px; background:rgba(46,94,86,.14); overflow:hidden; margin-top:12px;}
  .home-prog-bar{height:100%; background:var(--accent); border-radius:99px; transition:width .3s;}
  .home-stats{display:flex; gap:10px;}
  .home-stats .stat{flex:1; background:var(--surface); border:1px solid var(--line); border-radius:var(--radius-sm); padding:14px 8px; text-align:center;}
  .stat-n{font-size:24px; font-weight:800; color:var(--accent-ink); font-variant-numeric:tabular-nums; line-height:1;}
  .stat-u{font-size:12.5px; font-weight:700; color:var(--muted);}
  .stat-l{font-size:11.5px; color:var(--muted); font-weight:600; margin-top:6px;}
  .sched-card{overflow:hidden; padding:0;}
  .home-day{display:flex; align-items:center; gap:0; padding:12px; border-top:1px solid var(--line-2);}
  .home-day:first-child{border-top:none;}
  .home-day.today{background:var(--accent-soft); border-top:none;}
  .home-day .hd-date{font-size:12.5px; font-weight:700; color:var(--muted); flex:none; font-variant-numeric:tabular-nums; white-space:nowrap;}
  .home-day .hd-date .wd{color:var(--faint); margin-left:2px;}
  .home-day .hd-sep{width:1px; height:15px; background:var(--faint); flex:none; margin:0 11px;}
  .home-day .hd-label{flex:1; min-width:0; font-size:14px; font-weight:600;}
  .home-day .hd-label.rest{color:var(--faint); font-weight:500;}
  .home-day .hd-done{font-size:12px; font-weight:800; color:var(--accent-ink); flex:none; margin-left:8px;}
  .home-day .hd-badge{font-size:11px; font-weight:800; color:var(--on-accent); background:var(--accent); border-radius:6px; padding:2px 8px; flex:none; margin-left:8px;}

  /* schedule controls + calendar */
  .plan-ctrl{display:flex; align-items:center; justify-content:space-between; gap:10px; margin:2px 0 14px;}
  .ym{display:flex; align-items:center; gap:6px;}
  .ymbtn{width:34px; height:34px; border-radius:9px; border:1px solid var(--line); background:var(--surface); color:var(--ink); font-size:18px; cursor:pointer; font-family:inherit;}
  .ymbtn:active{background:var(--surface-2);}
  .ymlabel{font-size:16px; font-weight:800; min-width:118px; text-align:center; font-variant-numeric:tabular-nums; background:none; border:none; font-family:inherit; color:var(--ink); cursor:pointer; padding:6px 4px; border-radius:8px;}
  .ymlabel:active{background:var(--surface-2);}
  .modeseg{display:flex; gap:8px;}
  .modeseg button{border:1px solid var(--line); background:var(--surface-2); border-radius:10px; font-family:inherit; font-size:13px; font-weight:700; color:var(--muted); cursor:pointer; padding:8px 15px;}
  .modeseg button.on{background:var(--accent); border-color:var(--accent); color:var(--on-accent);}
  .ymp-title{font-size:15px; font-weight:800; margin-bottom:14px; display:flex; align-items:center; gap:8px;}
  .ymp-back{border:none; background:var(--surface-2); border-radius:8px; width:28px; height:28px; font-size:16px; cursor:pointer; font-family:inherit; color:var(--ink);}
  .ym-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px;}
  .ym-cell{padding:12px 6px; border:1px solid var(--line); border-radius:10px; background:var(--surface); font-family:inherit; font-size:14px; font-weight:700; color:var(--ink); cursor:pointer; font-variant-numeric:tabular-nums;}
  .ym-cell:active{background:var(--surface-2);}
  .ym-cell.on{background:var(--accent); border-color:var(--accent); color:var(--on-accent);}
  .ym-grid-day{grid-template-columns:repeat(7,1fr); gap:6px;}
  .ym-grid-day .ym-cell{padding:10px 0; font-size:13px;}
  .ym-grid-year{max-height:264px; overflow-y:auto; padding:2px;}
  .cal-head{display:grid; grid-template-columns:repeat(7,1fr); margin-bottom:4px;}
  .cal-wd{text-align:center; font-size:11.5px; font-weight:700; color:var(--muted); padding:4px 0;}
  .cal-wd.sun{color:#c0563f;} .cal-wd.sat{color:#3f6bc0;}
  .cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:4px;}
  .cal-cell{height:46px; border:1px solid var(--line-2); border-radius:9px; background:var(--surface); display:flex; flex-direction:column; align-items:center; justify-content:center; padding:3px 2px; cursor:pointer; gap:2px;}
  .cal-cell.empty{border:none; background:none; cursor:default; height:46px;}
  .cal-cell.rest{background:var(--surface-2);}
  .cal-cell.past{background:var(--line-2);}
  .cal-cell.today{border-color:var(--accent); box-shadow:0 0 0 1.5px var(--accent);}
  .cal-cell .cal-n{font-size:12.5px; font-weight:700; font-variant-numeric:tabular-nums; line-height:1;}
  .cal-cell.sun .cal-n{color:#c0563f;} .cal-cell.sat .cal-n{color:#3f6bc0;}
  .cal-dot{width:6px; height:6px; border-radius:50%; background:var(--accent); display:inline-block;}
  .cal-dot.rest{background:var(--line);}
  .cal-chk{font-size:10px; font-weight:800; color:var(--on-accent); background:var(--accent); width:14px; height:14px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; line-height:1;}
  .cal-legend{display:flex; gap:16px; justify-content:center; margin-top:12px; font-size:12px; color:var(--muted);}
  .cal-legend span{display:inline-flex; align-items:center; gap:5px;}
  .cal-legend i{font-style:normal;}

  /* onboarding */
  .ob-prog{font-size:12px; font-weight:800; color:var(--accent-ink); letter-spacing:.03em; margin-bottom:6px;}
  .ob-title{font-size:21px; font-weight:800; letter-spacing:-.02em; margin-bottom:4px;}
  .ob-sub{font-size:13px; color:var(--muted); margin-bottom:6px;}
  .ob-sec{font-size:13px; font-weight:800; color:var(--ink); margin:20px 0 9px;}
  .ob-sec .opt{font-size:11px; font-weight:700; color:var(--faint); margin-left:6px;}
  .obchips{display:flex; flex-wrap:wrap; gap:8px;}
  .obchips:not(.seg) .chip{flex:1 1 0; min-width:0; text-align:center; padding-left:4px; padding-right:4px;}
  .obchip{padding:9px 14px; border-radius:11px; border:1px solid var(--line); background:var(--surface-2); color:var(--muted); font-weight:600; font-size:14px; cursor:pointer; user-select:none;}
  .obchip.on{background:var(--accent); border-color:var(--accent); color:var(--on-accent);}
  .ob-half{display:flex; gap:10px;} .ob-half>.field{flex:1;}
  .pace{display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
  .pace select,.ob-select{height:46px; border:1px solid var(--line); border-radius:11px; background:var(--surface-2); color:var(--ink); font-family:inherit; font-size:15px; padding:0 10px; outline:none;}
  .pace select:focus,.ob-select:focus{border-color:var(--accent);}
  .pace .u{font-size:13px; color:var(--muted); font-weight:600;}
  .ob-verify{display:flex; gap:8px; margin-top:8px;}
  .ob-verify .vbtn{flex:1; height:46px; border:1px solid var(--accent); border-radius:11px; background:var(--accent-soft); color:var(--accent-ink); font-weight:700; font-size:14px; cursor:pointer; font-family:inherit;}
  .ob-hint{font-size:11.5px; color:var(--faint); margin-top:6px; line-height:1.5;}
  .ob-freq{margin-top:11px; font-size:15px; color:var(--ink); text-align:center; background:var(--accent-soft); border-radius:10px; padding:11px;}
  .ob-freq b{color:var(--accent-ink); font-weight:800;}
  .ob-inline{margin-top:10px;}
  .ob-inline input{width:100%; height:46px; padding:0 13px; border:1px solid var(--line); border-radius:11px; background:var(--surface); color:var(--ink); font-family:inherit; font-size:15px; box-sizing:border-box; outline:none;}
  .ob-inline input:focus{border-color:var(--accent);}
  .obchips.seg{flex-wrap:nowrap; gap:8px; background:none; border:none; padding:0; margin-bottom:0;}
  .obchips.seg .obchip{flex:1 1 0; text-align:center; padding:12px 4px;}
  .field input[type=date]{color:var(--ink);}
  .field input[type=date]::-webkit-calendar-picker-indicator{opacity:.5; cursor:pointer;}
  .ob-next{width:100%; margin-top:22px; height:52px; border:none; border-radius:13px; background:var(--accent); color:var(--on-accent); font-family:inherit; font-size:16px; font-weight:800; letter-spacing:-.01em; cursor:pointer; box-shadow:0 8px 20px rgba(46,94,86,.26); transition:.15s;}
  .ob-next:active{transform:translateY(1px); box-shadow:0 4px 12px rgba(46,94,86,.22);}
  .ob-datebtn{width:100%; height:48px; padding:0 14px; border:1px solid var(--line); border-radius:12px; background:var(--surface-2); color:var(--ink); font-family:inherit; font-size:15px; text-align:left; cursor:pointer; box-sizing:border-box; display:flex; align-items:center; justify-content:space-between;}
  .ob-datebtn.ph{color:var(--faint);}
  .ob-datebtn .dbi{color:var(--muted); font-size:13px;}
  .obgrid{display:grid; grid-template-columns:repeat(2,1fr); gap:8px;}
  .obgrid .obchip{text-align:center; padding:11px 6px;}
  .ob-textin{width:100%; height:46px; margin-top:8px; padding:0 13px; border:1px solid var(--line); border-radius:11px; background:var(--surface); color:var(--ink); font-family:inherit; font-size:15px; box-sizing:border-box; outline:none;}
  .ob-textin:focus{border-color:var(--accent);}
  .bcal-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;}
  .bcal-title{border:none; background:none; font-family:inherit; font-size:15px; font-weight:800; color:var(--ink); cursor:pointer; padding:6px 8px; border-radius:8px;}
  .bcal-title:active{background:var(--surface-2);}
  .bcal-wd{display:grid; grid-template-columns:repeat(7,1fr); margin-bottom:6px;}
  .bcal-wd span{text-align:center; font-size:11.5px; font-weight:700; color:var(--muted);}
  .bcal-wd .sun{color:#c0563f;} .bcal-wd .sat{color:#3f6bc0;}
  .bcal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:3px;}
  .bcal-cell{aspect-ratio:1/1; border:none; background:none; border-radius:9px; font-family:inherit; font-size:14px; font-weight:600; color:var(--ink); cursor:pointer; font-variant-numeric:tabular-nums;}
  .bcal-cell:active{background:var(--surface-2);}
  .bcal-cell.on{background:var(--accent); color:var(--on-accent);}
  .bcal-cell.sun{color:#c0563f;} .bcal-cell.sat{color:#3f6bc0;}
  .bcal-cell.on.sun,.bcal-cell.on.sat{color:#fff;}
  .bcal-foot{display:flex; justify-content:space-between; margin-top:12px; padding-top:10px; border-top:1px solid var(--line-2);}
  .bcal-foot button{border:none; background:none; font-family:inherit; font-size:13.5px; font-weight:700; color:var(--accent-ink); cursor:pointer;}

  /* equipment help + sub toggle + modal */
  .toggle-row.sub{margin-top:8px; margin-left:16px; border-style:dashed;}
  .eq-help{position:absolute; top:6px; left:6px; width:19px; height:19px; border-radius:50%; border:1.5px solid var(--line); background:var(--surface); color:var(--muted); font-size:11px; font-weight:800; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center; padding:0; font-family:inherit; z-index:2;}
  .eq-help:hover{border-color:var(--accent); color:var(--accent-ink);}
  .eqmodal{position:fixed; inset:0; z-index:300; background:rgba(20,20,18,.45); display:flex; align-items:center; justify-content:center; padding:24px;}
  .eqmodal.hidden{display:none;}
  .eqmodal-card{background:var(--surface); border-radius:18px; max-width:360px; width:100%; padding:22px 20px 20px; position:relative; box-shadow:0 20px 60px rgba(0,0,0,.3);}
  .eqmodal-x{position:absolute; top:12px; right:12px; width:30px; height:30px; border-radius:50%; border:none; background:var(--surface-2); color:var(--muted); font-size:15px; cursor:pointer; font-family:inherit;}
  .eqmodal-ill{width:76px; height:76px; margin:2px auto 12px; color:var(--accent);}
  .eqmodal-ill svg{width:100%; height:100%;}

  /* 기구 아이콘 — PNG 알파를 CSS mask로 써서 currentColor로 색이 바뀜 */
  .ic-msk{display:block; width:100%; height:100%; background-color:currentColor;
    -webkit-mask-repeat:no-repeat; mask-repeat:no-repeat;
    -webkit-mask-position:center; mask-position:center;
    -webkit-mask-size:contain; mask-size:contain;}
  .step-fig .ic-msk{width:36px; height:36px;}
  .ex-fig .ic-msk{width:38px; height:38px;}
  .eq-ic .ic-msk{width:16px; height:16px;}

  .eqmodal-name{font-size:18px; font-weight:800; text-align:center; margin-bottom:3px;}
  .eqmodal-alias{font-size:12.5px; font-weight:700; color:var(--accent-ink); text-align:center; margin-bottom:12px;}
  .eqmodal-desc{font-size:14px; color:var(--ink); line-height:1.65; text-align:center;}

  /* side drawer menu */
  .drawer{position:fixed; inset:0; z-index:150;}
  .drawer.hidden{display:none;}
  .drawer-backdrop{position:absolute; inset:0; background:rgba(20,20,18,.4);}
  .drawer-panel{position:absolute; top:0; right:0; bottom:0; width:80%; max-width:320px; background:var(--surface); box-shadow:-10px 0 40px rgba(0,0,0,.25); padding:12px 16px calc(20px + env(safe-area-inset-bottom)); overflow-y:auto; display:flex; flex-direction:column;}
  .drawer-head{display:flex; margin-bottom:2px;}
  .drawer-profile{display:flex; align-items:center; gap:12px; width:100%; text-align:left; background:var(--accent-soft); border:none; border-radius:14px; padding:14px; cursor:pointer; font-family:inherit; margin-bottom:14px;}
  .dp-av{width:44px; height:44px; border-radius:50%; background:var(--accent); color:var(--on-accent); font-size:19px; font-weight:800; display:flex; align-items:center; justify-content:center; flex:none;}
  .dp-info{flex:1; min-width:0;}
  .dp-name{font-weight:800; font-size:16px; color:var(--accent-ink);}
  .dp-sub{font-size:12px; color:var(--muted); margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .dp-arrow{color:var(--accent-ink); font-size:20px; flex:none;}
  .drawer-sec{font-size:11px; font-weight:800; letter-spacing:.08em; color:var(--faint); text-transform:uppercase; margin:8px 6px 4px;}
  .drawer-item{display:flex; align-items:center; gap:12px; width:100%; text-align:left; background:none; border:none; border-radius:11px; padding:12px 10px; font-family:inherit; font-size:15px; font-weight:600; color:var(--ink); cursor:pointer;}
  .drawer-item:active{background:var(--surface-2);}
  .drawer-item.on{background:var(--accent-soft); color:var(--accent-ink);}
  .drawer-item.danger{color:#b23b3b;}
  .drawer-item .di-ic{width:22px; text-align:center; flex:none; font-size:16px;}
  .drawer-ver{margin-top:auto; padding-top:16px; font-size:11px; color:var(--faint); text-align:center;}
  .prow{display:flex; justify-content:space-between; gap:14px; padding:9px 0; border-top:1px solid var(--line-2); font-size:13.5px;}
  .prow:first-of-type{border-top:none;}
  .prow .pk{color:var(--muted); font-weight:600; flex:none;}
  .prow .pv{color:var(--ink); font-weight:600; text-align:right;}

  .info{font-size:13px; color:var(--muted); line-height:1.6;}
  .info b{color:var(--ink); font-weight:650;}
  .divider{height:1px; background:var(--line-2); margin:18px 0;}

  /* bottom nav */
  nav{position:fixed; left:0; right:0; bottom:0; height:calc(var(--nav-h) + env(safe-area-inset-bottom)); padding-bottom:env(safe-area-inset-bottom); background:color-mix(in srgb, var(--surface) 88%, transparent); backdrop-filter:saturate(1.4) blur(14px); border-top:1px solid var(--line); z-index:40;}
  .nav-inner{max-width:430px; margin:0 auto; height:var(--nav-h); display:flex;}
  .nav-btn{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; background:none; border:none; color:var(--muted); font-family:inherit; font-size:11px; font-weight:650; cursor:pointer; letter-spacing:.02em;}
  .nav-ic{width:23px; height:23px; flex:none; background-color:currentColor;
    -webkit-mask-repeat:no-repeat; mask-repeat:no-repeat;
    -webkit-mask-position:center; mask-position:center;

<script>
/* ---------------- Storage (window.storage → localStorage → memory) ---------------- */
const Store=(()=>{
  const hasWS = typeof window!=='undefined' && window.storage && typeof window.storage.get==='function';
  const mem={};
  return {
    async get(k){
      if(hasWS){ try{ const r=await window.storage.get(k); return r?r.value:null; }catch(e){} }
      try{ return localStorage.getItem(k); }catch(e){ return (k in mem)?mem[k]:null; }
    },
    async set(k,v){
      if(hasWS){ try{ await window.storage.set(k,v); return; }catch(e){} }
      try{ localStorage.setItem(k,v); return; }catch(e){ mem[k]=v; }
    }
  };
})();
const KEY='workoutPlanner:v1';

/* ---------------- Date helpers (local) ---------------- */
const WD=['일','월','화','수','목','금','토'];
function fmt(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function parse(s){const [y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x;}
function todayStr(){return fmt(new Date());}
function isMon(d){return d.getDay()===1;}
function wDays(){ return (state.workoutDays && state.workoutDays.length) ? state.workoutDays : [0,2,3,4,5,6]; } // weekday indices (0=Sun); default = all but Monday
function isRestDow(d){ return !wDays().includes(d.getDay()); } // recurring weekly rest if this weekday isn't a workout day
function human(s){const d=parse(s);return `${d.getMonth()+1}월 ${d.getDate()}일 (${WD[d.getDay()]})`;}

function buildSchedule(fromStr,toStr){
  const rest=new Set(state.restDays);
  const map={}; let rot=0; let d=parse(state.startDate); const to=parse(toStr);
  const from=parse(fromStr);
  while(d<=to){
    const k=fmt(d);
    const isRest = isRestDow(d) || rest.has(k);
    let entry;
    if(isRest){ entry={rest:true, fixed:isRestDow(d)}; }
    else { entry={session:rot%6}; rot++; }
    if(d>=from) map[k]=entry;
    d=addDays(d,1);
  }

}
function sessionFor(dateStr){
  // compute rotation index up to dateStr from startDate
  const rest=new Set(state.restDays);
  let rot=0; let d=parse(state.startDate); const target=parse(dateStr);
  if(target<d) return null;
  while(d<target){ if(!(isRestDow(d)||rest.has(fmt(d)))) rot++; d=addDays(d,1); }

}

function slotCands(slot){

  const all=[...slot.options, {name:slot.fb.name, eq:(slot.fb.eq||[]), cue:slot.fb.cue, reps:slot.fb.reps}, ...(slot.alts||[])];

  for(let k=0;k<n;k++){ const v=(typeof saved[k]==='number')?saved[k]:''; cells+=`<label class="setcell" style="${cb}"><span class="sn">${k+1}세트</span><span class="wtwrap"><input class="wt" type="number" inputmode="decimal" min="0" step="0.5" value="${v}" placeholder="–" onchange="logWeight('${dateStr}',${oi},${k},this.value)"><span class="unit">kg</span></span></label>`; }
  return `<div class="setlog">${hint}<div class="setrow" style="justify-content:center">${cells}</div></div>`;
}

/* 동작별 reps 우선 — 유지형(월 싯 등)은 슬롯의 횟수 대신 자기 시간을 씀 */
function defReps(slot,r){ return (r&&r.reps)||slot.reps; }

/* 사용자가 고른 운동 목표 → 세트/횟수/유산소 비중 가중치.
   목표는 복수 선택이므로 배타 분기가 아니라 곱셈으로 합성한다
   (근육+다이어트를 함께 고르면 자연스럽게 중간값이 됨). */
function goalMods(){
  const g=(state.profile&&state.profile.goals)||[];
  const hyper=g.includes('근육 만들기');        // 근비대 — 세트↑ 반복↓ 유산소↓
  const diet=g.includes('다이어트(체중감량)');   // 대사 소모 — 반복↑ 휴식↓ 유산소↑
  const endur=g.includes('체력 향상');           // 심폐 지구력 — 유산소↑↑ (반복·휴식은 보통)
  const posture=g.includes('자세교정');          // 교정 계열 슬롯만 세트↑
  /* 유산소는 감량·체력이 겹쳐도 합산하지 않고 더 큰 쪽을 쓴다 (1.3×1.4=1.82는 과함) */
  const burnCardio=Math.max(diet?1.3:1, endur?1.4:1);
  const rest = hyper ? '60초에서 90초'
             : diet  ? '30초에서 60초'
             : endur ? '45초에서 75초'
             : '60초에서 90초';
  return {
    hyper, diet, endur, posture,
    setDelta: hyper?1:0,
    repsMul: (hyper?0.85:1)*(diet?1.2:1),
    cardioMul:(hyper?0.85:1)*burnCardio,
    rest
  };
}
/* '12회','10회/측' 같은 횟수형만 조정. 유지형(초)·범위형(20–30초)은 건드리지 않음 */
function goalReps(base){
  const m=goalMods().repsMul;
  if(Math.abs(m-1)<0.03) return base;
  return String(base).replace(/^(\d+)회(\/측)?$/, (s,n,side)=>
    Math.max(8,Math.min(20,Math.round(+n*m)))+'회'+(side||''));
}
/* 추천 횟수 = 동작별 기본값에 목표 가중치를 반영한 값 */
function recReps(slot,r){ return goalReps(defReps(slot,r)); }

/* 자세교정이 목표면 교정 계열 슬롯의 세트를 1 늘림 */
const _POSTURE_ROLE=/자세교정|거북목|흉추|페이스 풀|후면 삼각/;
function effVol(si,oi,slot,r){
  const c=state.slotCustom&&state.slotCustom[si+':'+oi];
  const beginner=state.profile&&state.profile.liftingExp===false;
  const gm=goalMods();
  let base=beginner?Math.max(2,slot.sets-1):slot.sets;
  let delta=gm.setDelta;
  if(gm.posture && _POSTURE_ROLE.test(slot.role)) delta+=1;
  base=Math.max(2,Math.min(5,base+delta));
  const sets=(c&&c.sets)?c.sets:base;
  const reps=(c&&c.reps!=null&&c.reps!=='')?c.reps:recReps(slot,r);
  return {sets, reps, customized:!!c};
}
function volEditor(si,oi,slot,v,r){

/* 선택적 슬롯 — 해당 목표를 고르지 않은 사용자에겐 빼서 그날 구성을 목표에 맞춘다.
   지금은 opt:'posture'(거북목 교정·흉추 신전·자세교정 종합)만 존재. */
function slotActive(sl){

}
function sessionExercises(s, si){
  const out=[];

    if(pbw && bwCand) out.push({sl,oi,id:'ex'+oi+'b',key:oi+'b',r:bwCand,eqCands:[]});
    if(eqCands.length){ const nm=state.slotPick&&state.slotPick[si+':'+oi]; const r=(nm&&eqCands.find(c=>c.name===nm))||eqCands[0]; out.push({sl,oi,id:'ex'+oi,key:oi,r,eqCands}); }
    else if(!pbw && bwCand) out.push({sl,oi,id:'ex'+oi+'b',key:oi+'b',r:bwCand,eqCands:[]});
  });

}
function stepIdsFor(dateStr){

function wuResolve(arr){
  const okEq=e=>!e||e.every(x=>state.equipment.includes(x));
  const okFloor=fl=>!fl||state.includeFloor;
  return (arr||[]).map(it=>{
    if(typeof it==='string') return {n:it};
    if(it.cardio) return {cardio:true};
    if(okEq(it.eq)&&okFloor(it.floor)) return {n:it.n,a:it.a,d:it.d};
    const alt=it.alt;
    if(alt && okEq(alt.eq)&&okFloor(alt.floor)) return {n:alt.n,a:alt.a,d:alt.d};
    return null;
  }).filter(Boolean);
}
function wuDesc(t){ t=String(t).replace(/\s*·\s*/g,', '); const inner=t.indexOf('|')>=0?t.split('|').map(p=>`<span class="wu-seg">${p}</span>`).join(' '):t; return `<div class="wu-desc"><span class="wu-dash">-</span><span class="wu-dtx">${inner}</span></div>`; }
/* 스마트 줄바꿈: (1)마침표(. ) 뒤 문장 분리 (2)문장이 한 줄(cap)을 넘칠 때만, 그리고 쉼표 앞부분이 한 줄에 들어갈 때만 그 쉼표에서 줄바꿈. cap = 한 줄에 들어가는 대략 글자 수 */
function smartBreak(t, cap){
  cap=cap||26; t=String(t).replace(/\s*·\s*/g,', ');
  const sents=[]; let buf='';
  for(let i=0;i<t.length;i++){ buf+=t[i]; if(t[i]==='.'&&t[i+1]===' '){ sents.push(buf); buf=''; i++; } }
  if(buf) sents.push(buf);
  return sents.map(s=>{
    if(s.length<=cap) return s; // 한 줄에 들어가면 그대로
    const mid=s.length*0.5, minPos=s.length*0.40; let best=-1, bestD=1e9;
    for(let i=0;i<s.length;i++){ if(s[i]===',' && i>=minPos && (i+1)<=cap){ const d=Math.abs(i-mid); if(d<bestD){ bestD=d; best=i; } } }
    if(best>=0) return s.slice(0,best+1)+'<br>'+s.slice(best+1).replace(/^\s+/,'');
    return s;
  }).join('<br>');
}
function periodLines(t){ return smartBreak(t, 34); }
/* 절 안에서 쉼표/마침표 뒤를 끊음 — 짧은 조각만 nowrap로 묶어 그 지점에서만 줄바꿈, 긴 조각은 keep-all로 안전 줄바꿈 */
function segify(t){
  t=String(t); const parts=[]; let buf='';
  for(let i=0;i<t.length;i++){ buf+=t[i]; if((t[i]===','||t[i]==='.') && t[i+1]===' '){ parts.push(buf); buf=''; i++; } }
  if(buf) parts.push(buf);
  return parts.map(p=> p.length<=20 ? `<span class="wu-seg">${p}</span>` : p).join(' ');
}
/* 운동 큐: " · "(공백 있는 가운뎃점)를 절 구분으로 보고 "- " 불릿 + 행잉인덴트로 렌더 */
function fmtCue(cue){ if(!cue) return ''; return String(cue).split(/ (?:·|—|–) /).map(c=>c.trim()).filter(Boolean).map(c=>`<div class="wu-desc"><span class="wu-dash">-</span><span class="wu-dtx">${smartBreak(c,28)}</span></div>`).join(''); }
/* 제목의 " · "를 회색 세로선으로, 날짜 상대 라벨(오늘/N일 후/N일 전), 유산소 상세의 총 시간(분) 제거 */
function sessTitle(t){ return String(t).split(' · ').join('<span class="vdiv"></span>'); }

function cardioDetail(d){ return String(d).replace(/\s\d+(?:[–-]\d+)?분(?=\s*—)/,''); }
/* 심박존: 나이→최대심박(220-나이), 존별 %범위 → 심박수. 색상은 팬톤(존1 그린 → 존5 레드) */
function userAge(){ const b=state.profile&&state.profile.birth; if(!b) return null; const by=+String(b).slice(0,4); if(!by) return null; const a=parse(todayStr()).getFullYear()-by; return (a>0&&a<120)?a:null; }
/* ────────────────────────────────────────────────────────────────
   근거 출처(SRC) — 앱이 사용자에게 제시하는 수치·권고의 1차 출처.

   근거가 없는 수치는 "일반 정보"임을 화면에 밝힐 것.
   ──────────────────────────────────────────────────────────────── */
const SRC={
  hrmax:{
    label:'Tanaka 외, 2001 (J Am Coll Cardiol)',
    note:'최대심박 추정식 208 − 0.7 × 나이. 351개 연구 메타분석.',

function srcLine(key){ const s=SRC[key]; return s?`<a class="src-link" href="${s.url}" target="_blank" rel="noopener">${s.label}</a>`:''; }

/* 존 경계는 ACSM 강도 분류에서 유도한다.
   ACSM: 중강도 = 65~75 %HRmax, 고강도 = 76~96 %HRmax.

const ZONE_PCT={1:[50,64],2:[65,75],3:[76,85],4:[86,96],5:[96,100]};

const ZONE_INFO={
  1:{acsm:'저강도', talk:'노래도 부를 수 있어요',   rpe:'1~2'},
  2:{acsm:'중강도', talk:'대화가 편하게 이어져요',  rpe:'3~4'},
  3:{acsm:'고강도', talk:'몇 마디만 겨우 해요',     rpe:'5~6'},

/* 최대심박 추정: 208 − 0.7 × 나이 (Tanaka 2001).

function zoneTxt(s){ return String(s).replace(/존\s*([1-5])\s*강도?/g,'Zone $1'); }

function sessionTimes(s, kept, si){
  const T=Math.max(20, state.sessionMinutes||60);
  let warm=Math.max(5,Math.min(12,Math.round(T*0.15)));
  let cool=Math.max(4,Math.min(8,Math.round(T*0.10)));
  const cf=/유산소/.test(s.title||'');

  cardio=Math.max(3,Math.min(Math.round(T*0.5),Math.round(cardio*goalMods().cardioMul)));

  if(main<need){ let d=need-main; const a=Math.min(d,cardio-3);cardio-=a;d-=a;main+=a; if(d>0){const b=Math.min(d,warm-4);warm-=b;d-=b;main+=b;} if(d>0){const c=Math.min(d,cool-3);cool-=c;d-=c;main+=c;} }

  const tot=setsArr.reduce((a,b)=>a+b,0)||1;
  let ex=setsArr.map(st=>Math.max(3,Math.round(main*st/tot)));
  let sum=warm+cool+cardio+ex.reduce((a,b)=>a+b,0);
  cardio+=(T-sum);

  while(cardio<cardioTarget){ const mi=ex.indexOf(Math.max(...ex)); if(ex[mi]<=3) break; ex[mi]--; cardio++; }
  if(cardio<3){ let def=3-cardio;cardio=3; while(def>0){const mi=ex.indexOf(Math.max(...ex)); if(ex[mi]<=3)break; ex[mi]--;def--;} }

  return {warm,cool,cardio,ex,total,cardioAuto};
}

/* 부상 때문에 실제로 플랜에서 빠진 동작들 (보유 장비로 할 수 있었던 것만) */
function excludedByInjury(){
  const avoid=avoidJoints();
  if(!avoid.size) return [];
  const out=[], seen=new Set();
  SESSIONS.forEach(s=>s.slots.forEach(sl=>{
    if(!slotActive(sl)) return; // 애초에 플랜에 없는 슬롯은 "제외됨" 안내에서 빼기
    [...sl.options, sl.fb, ...(sl.alts||[])].forEach(o=>{
      if(!o||!o.name||seen.has(o.name)) return;
      const c=CONTRA_EX[o.name]||[];
      if(!c.some(j=>avoid.has(j))) return;
      const eq=o.eq||[];
      if(!(isBW(eq)?state.includeBodyweight:has(eq))) return; // 애초에 못 하던 운동은 제외 안내에서 뺌
      seen.add(o.name); out.push(o.name);
    });
  }));
  return out;
}

const _RACKED=['바벨 백 스쿼트','바벨 벤치 프레스','바벨 오버헤드 프레스']; // 눌릴 위험 → 안전바/보조자
const _HINGE=['컨벤셔널 데드리프트','바벨 루마니안 데드리프트','바벨 벤트오버 로우']; // 허리 말림 주의
function compoundsInPlan(){
  const all=_RACKED.concat(_HINGE), found=new Set();
  SESSIONS.forEach(s=>s.slots.forEach(sl=>{ if(!slotActive(sl)) return; const c=slotCands(sl);
    if(c.length && all.includes(c[0].name)) found.add(c[0].name); }));
  return [...found];
}

      else if(/당뇨/.test(x)) rules.push('당뇨가 있으니 저혈당에 주의하고, 필요하면 간단한 당분을 미리 준비해주세요.');
      else if(/천식/.test(x)) rules.push('천식이 있으니 흡입기를 가까이 두고, 호흡이 가빠지면 강도를 낮춰주세요.');

/* plan tab date navigation + picker (year → month → day) */
let planDate=null, pdStep='year', pdYear=null, pdMonth=null;
function planDateCtrl(t,isToday){
  return `<div class="plan-ctrl">

function planDayShift(n){ let ds=fmt(addDays(parse(planDate||todayStr()),n)); planDate=(ds===todayStr())?null:ds; renderToday(); }
function planToday(){ planDate=null; renderToday(); }
function openPD(){ const d=parse(planDate||todayStr()); pdStep='year'; pdYear=d.getFullYear(); pdMonth=d.getMonth(); renderPD(); document.getElementById('ympick').classList.remove('hidden'); }
function pdPickYear(y){ pdYear=y; pdStep='month'; renderPD(); }
function pdPickMonth(mo){ pdMonth=mo; pdStep='day'; renderPD(); }
function pdBack(step){ pdStep=step; renderPD(); }
function pdPickDay(day){ const ds=fmt(new Date(pdYear,pdMonth,day)); planDate=(ds===todayStr())?null:ds; closeYM(); renderToday(); }
function renderPD(){
  const m=document.getElementById('ympick'); let inner;
  if(pdStep==='year'){
    const base=pdYear-6; let cells='';
    for(let i=0;i<12;i++){ const y=base+i; cells+=`<button class="ym-cell ${y===pdYear?'on':''}" onclick="pdPickYear(${y})">${y}</button>`; }

  } else if(pdStep==='month'){

    inner=`<div class="ymp-title"><button class="ymp-back" onclick="pdBack('year')">‹</button><span>${pdYear}년 월 선택</span></div><div class="ym-grid">${cells}</div>`;
  } else {

  }
  m.innerHTML=`<div class="eqmodal-card" style="max-width:340px"><button class="eqmodal-x" onclick="closeYM()">✕</button>${inner}</div>`;
}
function planDayRow(k,t){
  const e=sessionFor(k); const d=parse(k); const wd=WD[d.getDay()];
  if(!e){ // date before program start — just gray, no label
    return `<div class="day before"><div class="day-rail"><div class="day-wd">${wd}</div><div class="day-dt num">${d.getDate()}</div></div><div style="flex:1;min-width:0"><div class="day-main static"><div class="day-info"><div class="day-focus">&nbsp;</div></div></div></div></div>`;
  }
  const isToday=k===t; const isPast=k<t; const done=state.doneDays.includes(k); const open=!!openDays[k];
  let cls='day'; if(isPast)cls+=' past'; if(isToday)cls+=' today'; if(open)cls+=' open';
  let main;
  if(e.rest){
    main=`<div class="day-main static"><div class="day-info"><div class="day-ttl"><span class="rest-tag">휴식일</span></div><div class="day-focus">${e.fixed?'정기 휴식':'쉬는 날'}</div></div></div>`;
  } else {
    const s=SESSIONS[e.session];
    main=`<div class="day-main" onclick="toggleOpen('${k}')">
      <div class="day-info"><div class="day-ttl">${sessTitle(s.title)}${isToday?'<span class="badge today">오늘</span>':''}</div>
        <div class="day-focus">${s.focus.join('<span class="vdiv"></span>')} (약 ${state.sessionMinutes||60}분)</div></div>
      ${done?'<span class="badge done">✓ 완료</span>':''}
      <span class="chev">▶</span></div>`;
  }
  let html=`<div class="${cls}"><div class="day-rail"><div class="day-wd">${wd}</div><div class="day-dt num">${d.getDate()}</div></div><div style="flex:1;min-width:0">${main}</div></div>`;
  if(open && !e.rest){
    const s=SESSIONS[e.session]; const steps=(state.steps&&state.steps[k])||{}; let ex='';
    sessionExercises(s, e.session).forEach(x=>{ const exDone=!!steps[x.id];
      ex+=`<div class="mini-ex ${exDone?'done':''}"><span class="mini-fig">${exFig(x.r,x.sl.role)}</span><span class="mn">${x.r.name}</span>${exDone?'<span class="mini-done">✓</span>':''}<span class="mv">${x.sl.sets}×${recReps(x.sl,x.r)}</span></div>`; });
    ex+=`<div class="mini-ex ${steps['cardio']?'done':''}"><span class="mn">${s.cardio.label}</span>${steps['cardio']?'<span class="mini-done">✓</span>':''}<span class="mv">${zoneTxt(cardioDetail(s.cardio.detail).replace(s.cardio.label,'').trim())}</span></div>`;
    html+=`<div class="day-expand">${ex}`;
    let tools='';
    if(!isPast && !(isToday && done)) tools+=`<button class="btn sm ghost" onclick="toggleRest('${k}')">이 날 쉬기</button>`;
    if(tools) html+=`<div class="day-tools">${tools}</div>`;
    html+=`</div>`;
  } else if(e.rest && !e.fixed && !isPast){
    html+=`<div class="day-tools" style="padding-left:60px"><button class="btn sm ghost" onclick="toggleRest('${k}')">운동일로 되돌리기</button></div>`;
  }
  return html;
}
function planListHTML(){
  const t=todayStr(); const last=new Date(planYear,planMonth+1,0).getDate();
  let html=`<div class="card plist-card">`;
  for(let i=1;i<=last;i++){ html+=planDayRow(fmt(new Date(planYear,planMonth,i)),t); }
  html+=`</div>`; return html;
}
function planCalHTML(){
  const t=todayStr(); const first=new Date(planYear,planMonth,1); const offset=first.getDay(); const last=new Date(planYear,planMonth+1,0).getDate();
  const WDh=['일','월','화','수','목','금','토'];
  let cells='';
  for(let i=0;i<offset;i++) cells+=`<div class="cal-cell empty"></div>`;
  for(let day=1;day<=last;day++){
    const k=fmt(new Date(planYear,planMonth,day)); const e=sessionFor(k); const isToday=k===t; const done=state.doneDays.includes(k); const dow=(offset+day-1)%7;
    let cls='cal-cell'; if(isToday)cls+=' today'; if(e&&e.rest)cls+=' rest'; if(k<t)cls+=' past'; if(dow===0)cls+=' sun'; if(dow===6)cls+=' sat';
    const mark = !e ? '' : (done?'<span class="cal-chk">✓</span>':(e.rest?'<span class="cal-dot rest"></span>':'<span class="cal-dot"></span>'));
    cells+=`<div class="${cls}" onclick="planCalTap('${k}')"><span class="cal-n">${day}</span>${mark}</div>`;
  }
  return `<div class="cal-head">${WDh.map((w,i)=>`<div class="cal-wd ${i===0?'sun':''} ${i===6?'sat':''}">${w}</div>`).join('')}</div>
    <div class="cal-grid">${cells}</div>
    <div class="cal-legend"><span><i class="cal-dot"></i>운동</span><span><i class="cal-dot rest"></i>휴식</span><span><i class="cal-chk">✓</i>완료</span></div>`;
}
function renderPlan(){

}

function showProfile(){

  if(!p){ m.innerHTML=`<div class="eqmodal-card"><button class="eqmodal-x" onclick="closeEqInfo()">✕</button><div class="eqmodal-name">내 프로필</div><div class="eqmodal-desc">아직 프로필이 없어요.<br>회원가입 시 입력한 정보가 여기 표시돼요.</div></div>`; m.classList.remove('hidden'); return; }
  const G={male:'남성',female:'여성',other:'기타'};
  const rows=[['이름',p.name||'-']];
  if(p.birth) rows.push(['생년월일',p.birth]);
  rows.push(['성별',G[p.gender]||'-']);
  if(p.foreigner!=null) rows.push(['구분',p.foreigner?'외국인':'내국인']);
  if(p.heightCm) rows.push(['키',p.heightCm+' cm']);
  if(p.weightKg) rows.push(['현재 체중',p.weightKg+' kg']);
  if(p.targetWeightKg) rows.push(['목표 체중',p.targetWeightKg+' kg']);
  rows.push(['근력 경험',p.liftingExp?'있음':'없음']);
  rows.push(['러닝',p.running?('있음'+(p.runPace?(', 1km '+p.runPace):'')):'없음']);
  if(p.goals&&p.goals.length) rows.push(['운동 목표',p.goals.join(', ')+(p.goalOther?(', '+p.goalOther):'')]);
  if(p.injuries&&p.injuries.has) rows.push(['부상/수술',(p.injuries.list||[]).concat(p.injuries.other?[p.injuries.other]:[]).join(', ')||'있음']);
  if(p.conditions&&p.conditions.has) rows.push(['지병',(p.conditions.list||[]).concat(p.conditions.other?[p.conditions.other]:[]).join(', ')||'있음']);
  const body=rows.map(([k,v])=>`<div class="prow"><span class="pk">${k}</span><span class="pv">${v}</span></div>`).join('');
  m.innerHTML=`<div class="eqmodal-card" style="text-align:left;max-width:380px"><button class="eqmodal-x" onclick="closeEqInfo()">✕</button><div class="eqmodal-name" style="text-align:left;margin-bottom:12px">내 프로필</div>${body}<p class="ob-hint" style="margin-top:14px">프로필 편집 기능은 곧 추가될 예정이에요.</p></div>`;

const Drawer=(()=>{
  const el=()=>document.getElementById('drawer');
  function mi(tab,ic,label){ return `<button class="drawer-item ${activeTab===tab?'on':''}" onclick="Drawer.go('${tab}')"><span class="di-ic">${ic}</span>${label}</button>`; }
  function render(){
    const p=state.profile; const ui=(typeof Sync!=='undefined'&&Sync.userInfo)?Sync.userInfo():null;
    const name=(p&&(p.nickname||p.name))?(p.nickname||p.name):(ui&&ui.name?ui.name:'게스트');
    const sub=state.authProvider==='guest'?'둘러보기 모드':(ui&&ui.email?ui.email:'내 프로필 보기');
    const av=(name&&name[0])?name[0]:'👤';
    const loggedIn=state.authProvider&&state.authProvider!=='guest';
    el().querySelector('.drawer-panel').innerHTML=`
      <div class="drawer-head"><button class="hbtn" style="margin-left:auto" onclick="Drawer.close()" aria-label="닫기"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button></div>
      <button class="drawer-profile" onclick="Drawer.profile()"><div class="dp-av">${av}</div><div class="dp-info"><div class="dp-name">${name}</div><div class="dp-sub">${sub}</div></div><span class="dp-arrow">›</span></button>
      <div class="drawer-sec">메뉴</div>
      ${mi('home','🏠','홈')}${mi('plan','🏋️','운동')}${mi('schedule','📅','일정')}${mi('setup','⚙️','설정')}
      <div class="drawer-sec">더보기</div>
      <button class="drawer-item" onclick="Drawer.help()"><span class="di-ic">💬</span>도움말/문의</button>
      <button class="drawer-item" onclick="Drawer.about()"><span class="di-ic">ℹ️</span>앱 정보</button>
      ${loggedIn?`<button class="drawer-item danger" onclick="Drawer.logout()"><span class="di-ic">↩</span>로그아웃</button>`:`<button class="drawer-item" onclick="Drawer.login()"><span class="di-ic">→</span>로그인 / 회원가입</button>`}
      <div class="drawer-ver">MATE — My AI Training Expert<br>v0.9 (beta)</div>`;
  }
  return {
    open:()=>{ render(); el().classList.remove('hidden'); document.body.style.overflow='hidden'; },
    close:()=>{ el().classList.add('hidden'); document.body.style.overflow=''; },
    go:(tab)=>{ Drawer.close(); goTab(tab); },
    profile:()=>{ Drawer.close(); showProfile(); },
    help:()=>{ Drawer.close(); toast('도움말/문의는 준비 중이에요.'); },
    about:()=>{ Drawer.close(); toast('MATE — My AI Training Expert, v0.9 (beta)'); },
    logout:()=>{ Drawer.close(); googleSignOut(); },
    login:()=>{ Drawer.close(); Auth.show(); },
  };
})();
