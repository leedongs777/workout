const CONSENT_VERSION='1.0';
const CONSENT_TEXT={
  tos:'제1조(목적) 본 약관은 서비스 이용 조건 및 절차, 이용자와 서비스의 권리·의무를 규정합니다. 제2조(이용) 이용자는 관련 법령과 본 약관을 준수해야 합니다. 제3조(면책) 본 서비스가 제공하는 운동 정보는 일반적 참고용이며 의학적 조언이 아닙니다. (※ 예시 문구입니다 — 실제 배포 전 정식 약관으로 교체하세요.)',
  privacy:'수집 항목: 이메일 주소, 로그인 식별자(UID), 운동 기록 데이터. 이용 목적: 계정 식별, 기기 간 기록 동기화. 보유·이용 기간: 회원 탈퇴 시 또는 동의 철회 시까지. 제3자 제공: 클라우드 저장을 위해 Google Firebase를 이용합니다. 이용자는 동의를 거부할 권리가 있으나, 거부 시 로그인 기반 기능 이용이 제한됩니다. (※ 예시 문구 — 실제 배포 전 교체 필요.)',
  age:'본 서비스는 만 14세 이상만 회원가입할 수 있습니다. 본인은 만 14세 이상임을 확인합니다.',
  marketing:'앱 소식, 운동 팁, 이벤트 정보를 이메일 또는 푸시 알림으로 받아보는 것에 동의합니다. 본 동의는 선택 사항이며, 동의하지 않아도 서비스 이용에 제한이 없습니다. 동의 후에도 설정에서 언제든 철회할 수 있습니다.',
};
const Auth=(()=>{
  let pending=null, emailMode='login', openText=null, _interactive=false;
  let cons={tos:false,privacy:false,age:false,marketing:false};
  const gate=()=>document.getElementById('gate');
  const brand=`<div class="gate-brand"><div class="gate-logo">${STEP_SVG?STEP_SVG.warmup:svgWrap(PAT_ICON.stretch)}</div><h1>MATE</h1><p>My AI Training Expert · AI가 짜주는 나만의 운동 플랜</p></div>`;
  const gG=`<svg class="em" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.1H24v8h11.3C33.7 32.8 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.2 7.9 3l5.7-5.7C34 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.6-.4-3.9z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15.1 19 12 24 12c3.1 0 5.8 1.2 7.9 3l5.7-5.7C34 6.1 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 35.1 26.7 36 24 36c-5.2 0-9.6-3.3-11.3-7.9l-6.5 5C9.5 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.1H24v8h11.3c-.8 2.2-2.2 4.2-4.1 5.6l6.2 5.2C36.9 39.2 44 34 44 24c0-1.3-.1-2.6-.4-3.9z"/></svg>`;
  const kK=`<svg class="em" viewBox="0 0 24 24" fill="#191600"><path d="M12 3C6.5 3 2 6.5 2 10.8c0 2.7 1.8 5.1 4.6 6.5-.2.7-.7 2.6-.8 3-.1.5.2.5.4.4.1-.1 2.6-1.8 3.7-2.5.7.1 1.4.1 2.1.1 5.5 0 10-3.5 10-7.8S17.5 3 12 3z"/></svg>`;
  const aA=`<svg class="em" viewBox="0 0 24 24" fill="currentColor"><path d="M16.4 1.4c0 1.1-.4 2.2-1.1 3-.8 1-2.2 1.7-3.3 1.6-.1-1.1.4-2.3 1.1-3 .8-.9 2.2-1.6 3.3-1.6zM20.9 17c-.6 1.4-.9 2-1.7 3.3-1.1 1.8-2.7 3.9-4.6 4-1.7 0-2.2-1.1-4.5-1.1s-2.8 1.1-4.5 1.1c-1.9 0-3.4-2-4.5-3.7C-1.5 17-.9 10.2 2.1 6.9c1.1-1.4 2.9-2.4 4.6-2.4 1.7 0 2.8 1.1 4.2 1.1 1.4 0 2.2-1.1 4.2-1.1 1.5 0 3 .8 4.2 2.2-3.7 2-3.1 7.2.6 8.3z"/></svg>`;

  function allReq(){ return cons.tos&&cons.privacy&&cons.age; }
  function render(screen){
    const g=gate();
    if(screen==='login'){ g.innerHTML=`<div class="gate-inner">${brand}
      <button class="lbtn kakao" onclick="Auth.kakao()">${kK} 카카오톡으로 로그인</button>
      <button class="lbtn google" onclick="Auth.google()">${gG} 구글로 로그인</button>
      <button class="lbtn apple" onclick="Auth.apple()">${aA} Apple로 로그인</button>
      <button class="lbtn email" onclick="Auth.emailScreen()"><span class="em">✉️</span> 이메일로 로그인</button>
      <button class="gate-guest" onclick="Auth.guest()">로그인 없이 둘러보기 →</button>
      <div class="gate-legal">로그인 시 서비스 이용약관과 개인정보 처리방침에 동의하게 됩니다.</div></div>`;
    } else if(screen==='email'){ g.innerHTML=`<div class="gate-inner">
      <button class="gate-back" onclick="Auth.back()">← 뒤로</button>${brand}
      <div class="seg"><button class="${emailMode==='login'?'on':''}" onclick="Auth.setMode('login')">로그인</button><button class="${emailMode==='signup'?'on':''}" onclick="Auth.setMode('signup')">회원가입</button></div>
      <div class="field"><label>이메일</label><input id="au-email" type="email" inputmode="email" autocapitalize="off" autocorrect="off" placeholder="you@example.com"></div>
      <div class="field"><label>비밀번호</label><input id="au-pw" type="password" placeholder="6자 이상"></div>
      <button class="lbtn email" style="margin-top:6px" onclick="Auth.emailSubmit()">${emailMode==='login'?'로그인':'다음 · 약관 동의'}</button></div>`;
    } else if(screen==='consent'){
      const allOn=cons.tos&&cons.privacy&&cons.age&&cons.marketing;
      g.innerHTML=`<div class="gate-inner">
        <button class="gate-back" onclick="Auth.back()">← 뒤로</button>
        <div class="cons-h">약관에 동의해 주세요</div>
        <div class="cons-sub">서비스 이용을 위해 아래 항목에 동의가 필요해요.</div>
        <div class="cons-all" onclick="Auth.toggleAll()"><span class="cbx ${allOn?'on':''}">✓</span><span class="ct">전체 동의</span></div>
        ${item('tos','서비스 이용약관','req')}
        ${item('privacy','개인정보 수집·이용','req')}
        ${item('age','만 14세 이상입니다','req')}
        ${item('marketing','마케팅 정보 수신','opt')}
        <button class="cons-next" ${allReq()?'':'disabled'} onclick="Auth.consentDone()">동의하고 시작하기</button></div>`;
    }
  }
  function item(key,label,kind){
    const open=openText===key;
    return `<div><div class="cons-item"><span class="cbx ${cons[key]?'on':''}" onclick="Auth.toggle('${key}')">✓</span><span class="ct" onclick="Auth.toggle('${key}')">[${kind==='req'?'필수':'선택'}] ${label}</span><button class="viewbtn" onclick="Auth.viewText('${key}')">보기</button></div>${open?`<div class="cons-text">${CONSENT_TEXT[key]}</div>`:''}</div>`;
  }
  function show(){ cons={tos:false,privacy:false,age:false,marketing:false}; pending=null; emailMode='login'; openText=null; render('login'); gate().classList.remove('hidden'); document.body.style.overflow='hidden'; }
  function hide(){ gate().classList.add('hidden'); document.body.style.overflow=''; }
  function completeAuth(provider){ state.authProvider=provider; state.authPassed=true; touch(); hide(); refresh(); toast('시작합니다 💪'); }
  function emailErr(e){ const c=e&&e.code||''; if(c.includes('email-already-in-use'))return '이미 가입된 이메일이에요. 로그인해 주세요.'; if(c.includes('wrong-password')||c.includes('invalid-credential'))return '비밀번호가 올바르지 않아요.'; if(c.includes('user-not-found'))return '가입되지 않은 이메일이에요. 회원가입을 눌러주세요.'; if(c.includes('weak-password'))return '비밀번호는 6자 이상이어야 해요.'; if(c.includes('invalid-email'))return '이메일 형식이 올바르지 않아요.'; return (e&&e.message)||'처리 중 오류가 발생했어요.'; }
  return {
    show, hide,
    onSignedIn:(u)=>{ if(!u)return; if(_interactive)return; if(!state.authPassed){ state.authProvider=state.authProvider||'google'; state.authPassed=true; persist(); } hide(); },
    kakao:()=>toast('카카오 로그인은 준비 중이에요 — 카카오 개발자 연동 후 활성화됩니다.'),
    apple:()=>toast('Apple 로그인은 준비 중이에요 — Apple 개발자 계정 연결 후 활성화됩니다.'),
    google:async()=>{
      if(!Sync.hasConfig()){ toast('구글 로그인은 클라우드 연결이 필요해요. 지금은 "둘러보기"로 이용하거나, 설정에서 연결하세요.'); return; }
      _interactive=true;
      try{ const r=await Sync.signIn(); _interactive=false; if(r&&r.redirect)return; if(r&&r.isNewUser){ pending={type:'google'}; render('consent'); } else completeAuth('google'); }
      catch(e){ _interactive=false; toast(e.message||'로그인에 실패했어요'); }
    },
    emailScreen:()=>{ emailMode='login'; render('email'); },
    setMode:(m)=>{ emailMode=m; render('email'); },
    back:()=>{ pending=null; render('login'); },
    emailSubmit:async()=>{
      const em=(document.getElementById('au-email')||{}).value||''; const pw=(document.getElementById('au-pw')||{}).value||'';
      if(!em.includes('@')||pw.length<6){ toast('이메일과 6자 이상 비밀번호를 입력해 주세요'); return; }
      if(!Sync.hasConfig()){ toast('이메일 로그인은 클라우드 연결이 필요해요. 설정에서 Firebase를 연결하세요.'); return; }
      if(emailMode==='signup'){ pending={type:'email',email:em,pw}; render('consent'); }
      else { _interactive=true; try{ await Sync.emailSignIn(em,pw); _interactive=false; completeAuth('email'); }catch(e){ _interactive=false; toast(emailErr(e)); } }
    },
    guest:()=>{ state.authProvider='guest'; state.authPassed=true; persist(); hide(); refresh(); toast('둘러보기로 시작합니다'); },
    toggleAll:()=>{ const v=!(cons.tos&&cons.privacy&&cons.age&&cons.marketing); cons.tos=cons.privacy=cons.age=cons.marketing=v; render('consent'); },
    toggle:(k)=>{ cons[k]=!cons[k]; render('consent'); },
    viewText:(k)=>{ openText=openText===k?null:k; render('consent'); },
    consentDone:async()=>{
      if(!allReq())return;
      state.consent={version:CONSENT_VERSION,ts:Date.now(),tos:true,privacy:true,age:true,marketing:!!cons.marketing};
      const startOnboard=(provider)=>{ hide(); Onboard.start(()=>completeAuth(provider)); };
      if(pending&&pending.type==='email'){ _interactive=true; try{ await Sync.emailSignUp(pending.email,pending.pw); _interactive=false; pending=null; startOnboard('email'); }catch(e){ _interactive=false; toast(emailErr(e)); } }
      else if(pending&&pending.type==='google'){ pending=null; startOnboard('google'); }
      else { hide(); Onboard.start(()=>completeAuth(state.authProvider||'guest')); }
    },
  };
})();

/* ---------------- Onboarding (signup profile) ---------------- */
const Onboard=(()=>{
  let ob={}, done=null;
  let bdY=2000, bdM=0, bdStep='cal';
  function renderBirthCal(){
    const m=document.getElementById('ympick'); const WDh=['일','월','화','수','목','금','토']; let inner;
    if(bdStep==='year'){
      const base=bdY-6; let cells='';
      for(let i=0;i<12;i++){ const y=base+i; cells+=`<button class="ym-cell ${y===bdY?'on':''}" onclick="Onboard.bdYear(${y})">${y}</button>`; }
      inner=`<div class="ymp-title">연도 선택</div><div class="ym-grid">${cells}</div>`;
    } else if(bdStep==='month'){
      let cells=''; for(let mo=0;mo<12;mo++) cells+=`<button class="ym-cell ${mo===bdM?'on':''}" onclick="Onboard.bdMonth(${mo})">${mo+1}월</button>`;
      inner=`<div class="ymp-title"><button class="ymp-back" onclick="Onboard.bdTo('year')">‹</button><span>${bdY}년 · 월 선택</span></div><div class="ym-grid">${cells}</div>`;
    } else {
      const first=new Date(bdY,bdM,1); const off=first.getDay(); const last=new Date(bdY,bdM+1,0).getDate(); const sel=ob.birth;
      let cells=''; for(let i=0;i<off;i++) cells+=`<span></span>`;
      for(let day=1;day<=last;day++){ const ds=fmt(new Date(bdY,bdM,day)); const dow=(off+day-1)%7; let cls='bcal-cell'; if(ds===sel)cls+=' on'; if(dow===0)cls+=' sun'; if(dow===6)cls+=' sat'; cells+=`<button class="${cls}" onclick="Onboard.bdPick(${day})">${day}</button>`; }
      inner=`<div class="bcal-head"><button class="ymbtn" onclick="Onboard.bdShift(-1)">‹</button><button class="bcal-title" onclick="Onboard.bdTo('year')">${bdY}년 ${bdM+1}월 ▾</button><button class="ymbtn" onclick="Onboard.bdShift(1)">›</button></div>
        <div class="bcal-wd">${WDh.map((w,i)=>`<span class="${i===0?'sun':i===6?'sat':''}">${w}</span>`).join('')}</div>
        <div class="bcal-grid">${cells}</div>
        <div class="bcal-foot"><button onclick="Onboard.bdClear()">지우기</button><button onclick="Onboard.bdToday()">오늘</button></div>`;
    }
    m.innerHTML=`<div class="eqmodal-card" style="max-width:340px"><button class="eqmodal-x" onclick="closeYM()">✕</button>${inner}</div>`;
  }
  const box=()=>document.getElementById('onboard');
  function show(){ box().classList.remove('hidden'); document.body.style.overflow='hidden'; box().scrollTop=0; }
  function hide(){ box().classList.add('hidden'); document.body.style.overflow=''; }
  const GENDERS=[['male','남성'],['female','여성']];
  const GOALS=['다이어트(체중감량)','근육 만들기','체력 향상','자세교정','현 상태 유지'];
  const INJ=['허리 (디스크/수술)','무릎','어깨','발목','손목','목/거북목'];
  const COND=['고혈압','당뇨','심장질환','천식','갑상선','관절염'];
  function chip(label,on,handler){ return `<span class="obchip ${on?'on':''}" onclick="${handler}">${label}</span>`; }
  function v(id){ const el=document.getElementById(id); return el?el.value.trim():''; }
  function numv(id){ const el=document.getElementById(id); if(!el||el.value==='')return null; const n=parseFloat(el.value); return isNaN(n)?null:n; }
  function readStep1(){ ob.name=v('ob-name'); ob.nickname=v('ob-nick'); }
  function readStep2(){ ob.heightCm=numv('ob-h'); ob.weightKg=numv('ob-w'); ob.targetWeightKg=numv('ob-tw'); if(ob.running===true){ const pm=numv('ob-pmin'); if(pm!=null)ob.paceMin=pm; const ps=numv('ob-psec'); if(ps!=null)ob.paceSec=ps; ob.maxKm=numv('ob-maxkm'); } if(ob.goalEtc)ob.goalOther=v('ob-goalother'); if(ob.injEtc)ob.injOther=v('ob-injother'); if(ob.condEtc)ob.condOther=v('ob-condother'); }
  function render(step){ box().innerHTML = step===1?step1():step===2?step2():step3(); }
  function step3(){
    const bw=ob.obBw, fl=ob.obFloor; const wd=ob.workoutDays||[]; const n=wd.length;
    const dayList=[[1,'월'],[2,'화'],[3,'수'],[4,'목'],[5,'금'],[6,'토'],[0,'일']];
    return `<div class="gate-inner">
      <button class="gate-back" onclick="Onboard.back2()">← 뒤로</button>
      <div class="ob-prog">STEP 3 / 3 · 운동 환경·요일</div>
      <div class="ob-title">운동 요일과 환경을 정해요</div>
      <div class="ob-sub">고른 내용에 맞춰 일정과 플랜이 구성돼요.</div>
      <div class="ob-sec">운동 요일 <span class="opt">· 여러 개 선택</span></div>
      <div class="obchips">${dayList.map(([i,d])=>chip(d, wd.includes(i), `Onboard.toggleDay(${i})`)).join('')}</div>
      <div class="ob-freq">${n>0?`<b>${n}일 운동</b> · ${7-n}일 휴식`:'운동할 요일을 눌러 주세요'}</div>
      <p class="ob-hint" style="margin:6px 0 0">고른 요일에 운동이 배치되고 나머지 요일은 휴식이에요. 요일은 나중에 [일정] 탭에서 자유롭게 조정할 수 있어요.</p>
      <div class="ob-sec">하루 운동 가능 시간</div>
      <div class="obchips">${[30,45,60,75,90,120].map(m=>chip(m+'분', ob.sessionMinutes===m, `Onboard.setMin(${m})`)).join('')}</div>
      <p class="ob-hint" style="margin:6px 0 0">이 시간에 맞춰 워밍업·운동·유산소·쿨다운 시간이 자동 배분돼요.</p>
      <div class="toggle-row ${bw?'on':''}" style="margin-top:16px" onclick="Onboard.obBwT()"><div class="tr-ill">${patIcon('사이드 플랭크 (맥길)')}</div><div class="tr-body"><div class="tr-t">맨몸 운동 포함</div><div class="tr-s">${bw?'기구 없이 하는 맨몸 운동 포함':'맨몸 운동 제외'}</div></div><div class="switch"></div></div>
      ${bw?`<div class="toggle-row sub ${fl?'on':''}" onclick="Onboard.obFloorT()"><div class="tr-ill">${POSE_SVG.deadbug}</div><div class="tr-body"><div class="tr-t">바닥 운동 포함</div><div class="tr-s">${fl?'눕거나 엎드려·앉아서 하는 동작 포함':'바닥에서 하는 동작 제외'}</div></div><div class="switch"></div></div>`:''}
      <div class="ob-sec">보유 기구</div>
      <p class="ob-hint" style="margin:0 0 10px">헬스장에 있는 기구를 눌러 주세요. 각 기구의 <b>?</b>로 설명을 볼 수 있어요. <b>기구는 나중에 [설정] 탭에서 얼마든지 변경할 수 있어요.</b></p>
      ${eqGridHTML(ob.equipment,'Onboard.toggleEq')}
      <button class="ob-next" onclick="Onboard.finish()">확인하고 내 플랜 보기</button>
    </div>`;
  }
  function step1(){
    return `<div class="gate-inner">
      <div class="ob-prog">STEP 1 / 3 · 개인정보</div>
      <div class="ob-title">기본 정보를 알려주세요</div>
      <div class="ob-sub">계정과 맞춤 플랜에 사용돼요.</div>
      <div class="field" style="margin-top:16px"><label>이름</label><input id="ob-name" type="text" value="${ob.name||''}" placeholder="이름"></div>
      <div class="field"><label>닉네임 <span class="opt">· 최대 10자</span></label><input id="ob-nick" type="text" maxlength="10" value="${ob.nickname||''}" placeholder="앱에서 표시될 이름"></div>
      <div class="field"><label>생년월일</label><button type="button" class="ob-datebtn ${ob.birth?'':'ph'}" onclick="Onboard.openBirth()">${ob.birth?`${(''+ob.birth).slice(0,4)}년 ${+(''+ob.birth).slice(5,7)}월 ${+(''+ob.birth).slice(8,10)}일`:'생년월일 선택'}<span class="dbi">▾</span></button></div>
      <div class="ob-sec">성별</div>
      <div class="obchips seg">${GENDERS.map(([val,l])=>chip(l,ob.gender===val,`Onboard.set('gender','${val}')`)).join('')}</div>
      <div class="ob-sec">내/외국인</div>
      <div class="obchips seg">${chip('내국인',ob.foreigner===false,'Onboard.setForeigner(false)')}${chip('외국인',ob.foreigner===true,'Onboard.setForeigner(true)')}</div>
      <div class="ob-sec">본인인증</div>
      <div class="obchips seg">${['휴대폰','이메일','간편인증'].map(m=>chip(m,ob.verifyMethod===m,`Onboard.set('verifyMethod','${m}')`)).join('')}</div>
      ${ob.foreigner===true?`<div class="ob-hint">외국인은 여권 / 외국인등록번호 기반 인증이 제공될 예정이에요.</div>`:''}
      <div class="ob-verify"><button class="vbtn" onclick="Onboard.verify()">${ob.verified?'✓ 인증됨':'본인인증 하기'}</button></div>
      <div class="ob-hint">지금은 인증 화면만 준비돼 있어요. 실제 본인인증(휴대폰·간편인증)은 정식 출시 때 연동되며, 지금은 건너뛰고 진행돼요.</div>
      <button class="ob-next" onclick="Onboard.next1()">다음</button>
    </div>`;
  }
  function step2(){
    const r=ob.running===true; const mins=[]; for(let i=2;i<=12;i++)mins.push(i); const secs=[]; for(let i=0;i<60;i++)secs.push(i);
    return `<div class="gate-inner">
      <button class="gate-back" onclick="Onboard.back()">← 뒤로</button>
      <div class="ob-prog">STEP 2 / 3 · 신상정보</div>
      <div class="ob-title">운동 정보를 알려주세요</div>
      <div class="ob-sub">이 정보로 플랜의 난이도·종목·유산소가 조정돼요.</div>
      <div class="ob-half" style="margin-top:14px">
        <div class="field"><label>키 (cm)</label><input id="ob-h" type="number" inputmode="decimal" value="${ob.heightCm||''}" placeholder="170"></div>
        <div class="field"><label>현재 몸무게 (kg)</label><input id="ob-w" type="number" inputmode="decimal" value="${ob.weightKg||''}" placeholder="70"></div>
      </div>
      <div class="field"><label>목표 몸무게 (kg) <span class="opt">· 선택</span></label><input id="ob-tw" type="number" inputmode="decimal" value="${ob.targetWeightKg||''}" placeholder="선택 입력"></div>
      <div class="ob-sec">근력 운동(헬스) 경험</div>
      <div class="obchips seg">${chip('있음',ob.lifting===true,"Onboard.set2('lifting',true)")}${chip('없음',ob.lifting===false,"Onboard.set2('lifting',false)")}</div>
      <div class="ob-sec">러닝 경험</div>
      <div class="obchips seg">${chip('있음',ob.running===true,'Onboard.setRunning(true)')}${chip('없음',ob.running===false,'Onboard.setRunning(false)')}</div>
      ${r?`<div class="ob-inline">
        <label style="display:block;font-size:12.5px;font-weight:700;color:var(--muted);margin-bottom:6px">1km 페이스</label>
        <div class="pace"><select id="ob-pmin">${mins.map(m=>`<option ${ob.paceMin==m?'selected':''}>${m}</option>`).join('')}</select><span class="u">분</span><select id="ob-psec">${secs.map(sX=>`<option ${ob.paceSec==sX?'selected':''}>${String(sX).padStart(2,'0')}</option>`).join('')}</select><span class="u">초</span></div>
        <label style="display:block;font-size:12.5px;font-weight:700;color:var(--muted);margin:12px 0 6px">최장 달린 거리 (km)</label>
        <input id="ob-maxkm" type="number" inputmode="decimal" value="${ob.maxKm||''}" placeholder="예: 5" style="width:130px">
      </div>`:''}
      <div class="ob-sec">운동 목표 <span class="opt">· 여러 개 선택 가능</span></div>
      <div class="obgrid">${GOALS.map(g=>chip(g,ob.goals.includes(g),`Onboard.toggleGoal('${g}')`)).join('')}${chip('기타',!!ob.goalEtc,'Onboard.toggleGoalEtc()')}</div>
      ${ob.goalEtc?`<input class="ob-textin" id="ob-goalother" type="text" value="${ob.goalOther||''}" placeholder="목표를 직접 입력">`:''}
      <div class="ob-sec">부상·수술 이력 <span class="opt">· 선택</span></div>
      <div class="obchips seg">${chip('없음',ob.injHas===false,'Onboard.setInj(false)')}${chip('있음',ob.injHas===true,'Onboard.setInj(true)')}</div>
      ${ob.injHas===true?`<div class="obgrid" style="margin-top:8px">${INJ.map(x=>chip(x,ob.injList.includes(x),`Onboard.toggleInj('${x}')`)).join('')}${chip('기타',!!ob.injEtc,'Onboard.toggleInjEtc()')}</div>${ob.injEtc?`<input class="ob-textin" id="ob-injother" type="text" value="${ob.injOther||''}" placeholder="직접 입력">`:''}`:''}
      <div class="ob-sec">지병 <span class="opt">· 선택</span></div>
      <div class="obchips seg">${chip('없음',ob.condHas===false,'Onboard.setCond(false)')}${chip('있음',ob.condHas===true,'Onboard.setCond(true)')}</div>
      ${ob.condHas===true?`<div class="obgrid" style="margin-top:8px">${COND.map(x=>chip(x,ob.condList.includes(x),`Onboard.toggleCond('${x}')`)).join('')}${chip('기타',!!ob.condEtc,'Onboard.toggleCondEtc()')}</div>${ob.condEtc?`<input class="ob-textin" id="ob-condother" type="text" value="${ob.condOther||''}" placeholder="직접 입력">`:''}`:''}
      <button class="ob-next" onclick="Onboard.next2()">다음 · 운동 환경</button>
    </div>`;
  }
  return {
    hide,
    start:(cb)=>{ done=cb; ob={ nickname:'', gender:null, foreigner:null, verifyMethod:null, verified:false, lifting:null, running:null, goals:[], goalOther:'', injHas:null, injList:[], condHas:null, condList:[], equipment:[...DEFAULT_EQUIP], obBw:true, obFloor:true, workoutDays:[1,3,5,6], sessionMinutes:60 }; render(1); show(); },
    openBirth:()=>{ readStep1(); const b=ob.birth?parse(ob.birth):new Date(2000,0,1); bdY=b.getFullYear(); bdM=b.getMonth(); bdStep='cal'; renderBirthCal(); document.getElementById('ympick').classList.remove('hidden'); },
    bdShift:(n)=>{ bdM+=n; if(bdM<0){bdM=11;bdY--;} else if(bdM>11){bdM=0;bdY++;} renderBirthCal(); },
    bdTo:(step)=>{ bdStep=step; renderBirthCal(); },
    bdYear:(y)=>{ bdY=y; bdStep='month'; renderBirthCal(); },
    bdMonth:(mo)=>{ bdM=mo; bdStep='cal'; renderBirthCal(); },
    bdPick:(day)=>{ ob.birth=fmt(new Date(bdY,bdM,day)); closeYM(); render(1); },
    bdClear:()=>{ ob.birth=''; closeYM(); render(1); },
    bdToday:()=>{ ob.birth=todayStr(); closeYM(); render(1); },
    startEdit:()=>{
      const p=state.profile||{}; let pMin=null,pSec=null; if(p.runPace){ const q=(''+p.runPace).split(':'); pMin=+q[0]; pSec=+q[1]; }
      done=()=>{ if(typeof refresh==='function') refresh(); };
      ob={ name:p.name||'', nickname:p.nickname||'', birth:p.birth||'', gender:p.gender||null, foreigner:(p.foreigner===undefined?null:p.foreigner), verifyMethod:p.verifyMethod||null, verified:!!p.verified,
        heightCm:p.heightCm||'', weightKg:p.weightKg||'', targetWeightKg:p.targetWeightKg||'',
        lifting:(p.liftingExp===undefined?null:p.liftingExp), running:(p.running===undefined?null:p.running), paceMin:pMin, paceSec:pSec, maxKm:p.runMaxKm||'',
        goals:(p.goals||[]).slice(), goalOther:p.goalOther||'', goalEtc:!!(p.goalOther),
        injHas:(p.injuries?p.injuries.has:null), injList:((p.injuries&&p.injuries.list)||[]).slice(), injEtc:!!(p.injuries&&p.injuries.other), injOther:(p.injuries&&p.injuries.other)||'',
        condHas:(p.conditions?p.conditions.has:null), condList:((p.conditions&&p.conditions.list)||[]).slice(), condEtc:!!(p.conditions&&p.conditions.other), condOther:(p.conditions&&p.conditions.other)||'',
        equipment:[...(state.equipment||[])], obBw:!!state.includeBodyweight, obFloor:!!state.includeFloor,
        workoutDays:(state.workoutDays||[1,3,5,6]).slice(), sessionMinutes:state.sessionMinutes||60 };
      render(1); show();
    },
    set:(k,val)=>{ readStep1(); ob[k]=val; render(1); },
    setForeigner:(b)=>{ readStep1(); ob.foreigner=b; render(1); },
    verify:()=>{ if(!ob.verifyMethod){ toast('인증 수단을 먼저 선택해 주세요'); return; } readStep1(); ob.verified=true; toast('본인인증은 정식 출시 때 실제로 연동돼요. 지금은 통과 처리했어요.'); render(1); },
    next1:()=>{ readStep1(); if(!ob.name){toast('이름을 입력해 주세요');return;} if(!ob.birth){toast('생년월일을 선택해 주세요');return;} if(!ob.gender){toast('성별을 선택해 주세요');return;} if(ob.foreigner===null){toast('내/외국인을 선택해 주세요');return;} render(2); box().scrollTop=0; },
    back:()=>{ readStep2(); render(1); box().scrollTop=0; },
    set2:(k,val)=>{ readStep2(); ob[k]=val; render(2); },
    setRunning:(b)=>{ readStep2(); ob.running=b; render(2); },
    toggleGoal:(g)=>{ readStep2(); const i=ob.goals.indexOf(g); if(i>=0)ob.goals.splice(i,1); else ob.goals.push(g); render(2); },
    toggleGoalEtc:()=>{ readStep2(); ob.goalEtc=!ob.goalEtc; render(2); },
    setInj:(b)=>{ readStep2(); ob.injHas=b; render(2); },
    toggleInj:(x)=>{ readStep2(); const i=ob.injList.indexOf(x); if(i>=0)ob.injList.splice(i,1); else ob.injList.push(x); render(2); },
    toggleInjEtc:()=>{ readStep2(); ob.injEtc=!ob.injEtc; render(2); },
    setCond:(b)=>{ readStep2(); ob.condHas=b; render(2); },
    toggleCond:(x)=>{ readStep2(); const i=ob.condList.indexOf(x); if(i>=0)ob.condList.splice(i,1); else ob.condList.push(x); render(2); },
    toggleCondEtc:()=>{ readStep2(); ob.condEtc=!ob.condEtc; render(2); },
    next2:()=>{ readStep2(); if(!ob.heightCm||!ob.weightKg){toast('키와 현재 몸무게를 입력해 주세요');return;} if(ob.lifting===null){toast('근력 운동 경험을 선택해 주세요');return;} if(ob.running===null){toast('러닝 경험을 선택해 주세요');return;} render(3); box().scrollTop=0; },
    back2:()=>{ render(2); box().scrollTop=0; },
    toggleEq:(id)=>{ const i=ob.equipment.indexOf(id); if(i>=0)ob.equipment.splice(i,1); else ob.equipment.push(id); render(3); },
    toggleDay:(i)=>{ const j=ob.workoutDays.indexOf(i); if(j>=0)ob.workoutDays.splice(j,1); else ob.workoutDays.push(i); render(3); },
    setMin:(m)=>{ ob.sessionMinutes=m; render(3); },
    obBwT:()=>{ ob.obBw=!ob.obBw; render(3); },
    obFloorT:()=>{ ob.obFloor=!ob.obFloor; render(3); },
    finish:()=>{
      if(!ob.heightCm||!ob.weightKg||ob.lifting===null||ob.running===null){ toast('이전 단계 정보를 확인해 주세요'); render(2); return; }
      if(!ob.workoutDays||ob.workoutDays.length===0){ toast('운동할 요일을 최소 1개 선택해 주세요'); return; }
      state.profile={
        name:ob.name, nickname:ob.nickname||'', birth:ob.birth, gender:ob.gender, foreigner:ob.foreigner,
        verifyMethod:ob.verifyMethod, verified:!!ob.verified,
        heightCm:ob.heightCm, weightKg:ob.weightKg, targetWeightKg:ob.targetWeightKg,
        liftingExp:ob.lifting, running:ob.running,
        runPace:(ob.running&&ob.paceMin!=null&&ob.paceSec!=null)?(ob.paceMin+':'+String(ob.paceSec).padStart(2,'0')):null,
        runMaxKm:ob.running?ob.maxKm:null,
        goals:ob.goals.slice(), goalOther:ob.goalEtc?(ob.goalOther||''):'',
        injuries:{has:ob.injHas===true, list:ob.injHas===true?ob.injList.slice():[], other:(ob.injHas===true&&ob.injEtc)?(ob.injOther||''):''},
        conditions:{has:ob.condHas===true, list:ob.condHas===true?ob.condList.slice():[], other:(ob.condHas===true&&ob.condEtc)?(ob.condOther||''):''},
        ts:Date.now()
      };
      state.equipment=ob.equipment.slice();
      state.includeBodyweight=!!ob.obBw;
      state.includeFloor=!!ob.obFloor;
      state.workoutDays=ob.workoutDays.slice();
      state.sessionMinutes=ob.sessionMinutes||60;
      touch(); hide(); if(done)done();
      if(typeof switchTab==='function') switchTab('home');
      toast('플랜이 준비됐어요! 아래에서 확인해 보세요');
    }
  };
})();

/* live timers tick */
setInterval(()=>{ document.querySelectorAll('.live-timer').forEach(el=>{ const st=+el.dataset.start; if(st){ const s=Math.floor((Date.now()-st)/1000); el.textContent=Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); } }); },1000);

/* ---------------- Init ---------------- */
(async function(){
  await load();
  if(!state._ts) state._ts=Date.now();
  // guard: startDate should not be after today (would break schedule); if so, reset to today
  if(state.startDate>todayStr()) state.startDate=todayStr();
  renderHome();
  Sync.setOnAuth(u=>{ Auth.onSignedIn(u); });
  if(!state.authPassed) Auth.show(); else Auth.hide();
  // re-init sync if configured before; Google login session restores automatically
  const cfg=await Store.get(CFG_KEY);
  if(cfg){ Sync.init(cfg).then(()=>{ if(activeTab==='setup')renderSetup(); }).catch(()=>{}); }
})();
</script>
</body>
</html>
