<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MATE — 워치앱 프로토타입</title>
<!-- 워치 컴패니언 앱 프로토타입 (NRC 컨셉, 구성안: MATE_워치앱_구성안.md)
     - 실제 앱(index.html)을 숨은 iframe으로 띄워 오늘 세션·운동·지난 무게를 "읽기 전용"으로 가져온다(기록에 일절 쓰지 않음)
     - 제스처: 좌로 쓸기=다음 운동, 우로 쓸기=이전 운동, 위아래=경과/심박 페이지, 탭=세트 완료
     - 햅틱은 화면 펄스로 대체, 심박은 존2 부근 시뮬레이션 -->
<style>
  html,body{margin:0; height:100%;}
  body{background:radial-gradient(1100px 700px at 50% 18%, #2e3138, #17181c 70%);
    display:flex; align-items:center; justify-content:center; overflow:hidden;
    font-family:-apple-system,'SF Pro Text','Pretendard',system-ui,sans-serif; -webkit-user-select:none; user-select:none;}
  .hint{position:fixed; top:16px; left:50%; transform:translateX(-50%); color:rgba(255,255,255,.45); font-size:12.5px; white-space:nowrap;}
  .devseg{position:fixed; top:44px; left:50%; transform:translateX(-50%); z-index:10; display:flex; gap:4px;
    background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.14); border-radius:99px; padding:4px;}
  .devseg button{border:0; background:transparent; color:rgba(255,255,255,.65); font-size:12.5px; font-weight:700;
    padding:6px 13px; border-radius:99px; cursor:pointer; font-family:inherit;}
  .devseg button.on{background:#fff; color:#17181c;}
  .stage{transform-origin:center center;}

  /* ---- Apple Watch(46mm 근사) ---- */
  .watch{position:relative; display:flex; flex-direction:column; align-items:center;}
  .band{width:118px; height:150px; background:linear-gradient(90deg,#23261F,#3A4034 30%,#3A4034 70%,#23261F); z-index:0;}
  .band.top{border-radius:16px 16px 30px 30px; margin-bottom:-24px;}
  .band.bot{border-radius:30px 30px 16px 16px; margin-top:-24px;}
  .case{position:relative; z-index:1; width:233px; height:276px; border-radius:64px; background:#0c0c0d; padding:14px; box-sizing:border-box;
    box-shadow:0 0 0 2px #55565a, 0 0 0 5px #b9b4ac, 0 0 0 6px #83807a,
      0 30px 70px rgba(0,0,0,.65), 0 10px 24px rgba(0,0,0,.5);}
  .crown{position:absolute; right:-9px; top:78px; width:11px; height:34px; border-radius:4px 3px 3px 4px;
    background:repeating-linear-gradient(0deg,#8e8a83 0 2px,#c9c4bb 2px 4px); z-index:0;}
  .crown::after{content:''; position:absolute; inset:2px auto 2px -3px; width:4px; border-radius:2px; background:#2E5E56;}
  .sidebtn{position:absolute; right:-7px; top:128px; width:8px; height:52px; border-radius:0 4px 4px 0; background:linear-gradient(180deg,#8e8a83,#c9c4bb 30%,#c9c4bb 70%,#83807a); z-index:0;}
  .scr{position:relative; width:205px; height:248px; border-radius:52px; overflow:hidden; background:#000; color:#fff;}
  .scr.pulse{animation:pulse .35s ease;}
  @keyframes pulse{0%{box-shadow:inset 0 0 0 0 rgba(155,232,176,0);} 35%{box-shadow:inset 0 0 0 5px rgba(155,232,176,.85);} 100%{box-shadow:inset 0 0 0 0 rgba(155,232,176,0);}}

  /* ---- 갤럭시워치(원형) 오버라이드 ---- */
  body.gx .crown, body.gx .sidebtn{display:none;}
  .gxb{display:none; position:absolute; right:-7px; width:8px; height:26px; border-radius:0 4px 4px 0; background:linear-gradient(180deg,#8e8a83,#c9c4bb 40%,#83807a);}
  body.gx .gxb{display:block;}
  .gxb.b1{top:86px;} .gxb.b2{top:150px;}
  body.gx .band{width:98px;}
  body.gx .band.top{margin-bottom:-30px;} body.gx .band.bot{margin-top:-30px;}
  body.gx .case{width:256px; height:256px; border-radius:50%;
    box-shadow:0 0 0 2px #3f4144, 0 0 0 5px #a9adb4, 0 0 0 6px #75787d,
      0 30px 70px rgba(0,0,0,.65), 0 10px 24px rgba(0,0,0,.5);}
  body.gx .scr{width:228px; height:228px; border-radius:50%;}
  body.gx .app{padding:30px 34px 26px;}
  body.gx .wbtn{width:72%;}
  body.gx .p2-time{font-size:38px;}
  body.gx .p3-bpm{font-size:42px;}
  body.gx #scr-done{padding-top:28px;}
  body.gx .p1-name{margin-top:10px;}
  body.gx .vdots{right:14px;}
  body.gx .hold{width:62%; margin-bottom:8px;}
  body.gx .sum .row{padding:3px 22px;}

  /* ---- 공통 UI (NRC: 검정 + 라이트 그린, 전부 가운데 정렬) ---- */
  .clock{position:absolute; top:9px; left:0; right:0; text-align:center; font-size:12px; font-weight:600; color:#8fa89b; z-index:6; font-variant-numeric:tabular-nums; pointer-events:none;}
  .app{position:absolute; inset:0; padding:26px 18px 15px; box-sizing:border-box; display:flex; flex-direction:column; text-align:center;}
  .app.hidden{display:none;}
  .k{font-size:10.5px; font-weight:800; color:#8fa89b; letter-spacing:.08em; text-transform:uppercase;}
  .grow{flex:1;}
  .wbtn{border:none; border-radius:18px; padding:12px 0; width:100%; font-family:inherit; font-size:14px; font-weight:800; cursor:pointer; background:#9BE8B0; color:#03170c; margin-inline:auto; display:block;}
  .wbtn.ghost{background:#1c1d1f; color:#cfd6d0;}
  .wbtn:active{transform:scale(.97);}

  /* 홈 — 전부 가운데, 넓적한 시작 버튼(둥근 사각형) */
  #scr-home .date{font-size:11px; color:#8fa89b; font-weight:700; margin-top:4px;}
  #scr-home .ttl{font-size:23px; font-weight:850; letter-spacing:-.02em; line-height:1.15; margin-top:4px;}
  #scr-home .sub{font-size:12px; color:#a7b1aa; margin-top:5px;}
  #scr-home .strk{font-size:11.5px; color:#F0B95C; font-weight:800; margin-top:5px;}
  #scr-home .wbtn{font-size:15.5px; padding:13px 0;}

  /* 3·2·1 */
  #scr-cd{align-items:center; justify-content:center;}
  #cd-num{font-size:104px; font-weight:900; color:#9BE8B0; font-variant-numeric:tabular-nums; line-height:1;}
  #cd-num.go{font-size:42px;}

  /* 세션 뷰: 세로 페이지(rp1 할 일 / rp2 경과 / rp3 심박), 우측 세로 점 */
  .rpage{position:absolute; inset:0; padding:26px 20px 14px; box-sizing:border-box; display:flex; flex-direction:column; text-align:center;}
  .rpage.hidden{display:none;}
  .vdots{position:absolute; right:8px; top:50%; transform:translateY(-50%); display:flex; flex-direction:column; gap:5px; z-index:5;}
  .vdots i{width:5px; height:5px; border-radius:50%; background:#2a2c2e;}
  .vdots i.on{background:#9BE8B0;}
  /* rp1: 이름(한 줄 우선) → 운동 N/M → 무게 → 세트 칩 — 세 블록 간격 동일(12px) */
  .p1-name{font-size:21px; font-weight:850; letter-spacing:-.02em; line-height:1.2; margin-top:6px; white-space:nowrap; overflow:hidden;}
  .p1-name.two{font-size:15.5px; white-space:normal; word-break:keep-all;}
  .p1-k{font-size:11px; font-weight:800; color:#8fa89b; letter-spacing:.05em;}
  .p1-w{display:flex; align-items:center; justify-content:center; gap:12px; margin-top:12px;}
  .p1-w button{width:46px; height:46px; border-radius:50%; border:none; background:#1c1d1f; color:#fff; font-size:24px; font-weight:800; cursor:pointer; font-family:inherit; flex:none;}
  .p1-w button:active{transform:scale(.92); background:#2a2c2e;}
  .p1-w .v{font-size:32px; font-weight:850; min-width:82px; text-align:center; font-variant-numeric:tabular-nums;}
  .p1-w .v small{font-size:13px; color:#8fa89b; font-weight:800;}
  .p1-pills{display:flex; gap:5px; justify-content:center; margin-top:12px;}
  .p1-pills .pill{border-radius:9px; padding:5px 8px; font-size:10.5px; font-weight:800; background:#17181a; color:#5f6a63;}
  .p1-pills .pill.done{background:#9BE8B0; color:#03170c;}
  .p1-pills .pill.cur{background:#12291d; color:#9BE8B0; box-shadow:inset 0 0 0 1.5px #2E5E56;}
  .p1-tap{font-size:10.5px; color:#6f7a72; margin-top:4px;}
  /* rp2 경과 */
  .p2-time{font-size:46px; font-weight:900; font-variant-numeric:tabular-nums; letter-spacing:-.02em; margin-top:16px;}
  .p2-bar{display:flex; gap:3px; margin:14px 8px 6px;}
  .p2-bar i{flex:1; height:6px; border-radius:99px; background:#26282a;}
  .p2-bar i.on{background:#9BE8B0;}
  .p2-sub{font-size:12px; color:#a7b1aa;}
  /* rp3 심박 */
  .p3-bpm{font-size:50px; font-weight:900; color:#ff5f6d; font-variant-numeric:tabular-nums; margin-top:12px; line-height:1;}
  .p3-u{font-size:12px; color:#a7b1aa; font-weight:800; margin-top:2px;}
  .zone{display:flex; gap:3px; margin:12px 10px 4px;}
  .zone i{flex:1; height:7px; border-radius:99px; background:#26282a;}
  .zone i.z2{background:#2E5E56;}
  .zone i.cur{background:#9BE8B0;}
  .zlabel{font-size:12.5px; color:#9BE8B0; font-weight:800; margin-top:7px;}

  /* 휴식: 링이 화면 제일 바깥, 모든 내용이 링 안 */
  #scr-rest{padding:0;}
  .ringfull{position:absolute; left:50%; top:50%; transform:translate(-50%,-50%) rotate(-90deg);}
  .rest-in{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:0 36px; box-sizing:border-box;}
  .rest-num{font-size:52px; font-weight:900; font-variant-numeric:tabular-nums; line-height:1; margin:6px 0 10px;}
  .rest-adj{display:flex; gap:8px; justify-content:center;}
  .rest-adj button{border:none; border-radius:14px; padding:8px 13px; background:#2E5E56; color:#EAF4EC; font-family:inherit; font-size:12px; font-weight:800; cursor:pointer;}
  .rest-adj button:active{transform:scale(.95);}
  .rest-go{font-size:10.5px; color:#8fa89b; margin-top:10px; font-weight:700;}

  /* 유산소 */
  #scr-cardio .p2-time{margin-top:6px; font-size:38px;}
  #scr-cardio .p3-bpm{font-size:32px; margin-top:4px;}
  .hold{position:relative; border:none; border-radius:18px; padding:11px 0; width:74%; margin-inline:auto; display:block; font-family:inherit; font-size:13px; font-weight:800; cursor:pointer; background:#1c1d1f; color:#cfd6d0; overflow:hidden;}
  .hold .fill{position:absolute; inset:0; width:0; background:#2E5E56; transition:width .1s linear;}
  .hold span{position:relative; z-index:1;}

  /* 축하 — 링+체크 드로우 애니메이션 */
  #scr-done{padding-top:24px; padding-bottom:18px;}
  .doneart{width:66px; height:66px; margin:0 auto 8px;}
  .doneart svg{display:block; margin:0 auto;}
  .dc-ring{stroke-dasharray:176; stroke-dashoffset:176; animation:draw .7s ease forwards;}
  .dc-check{stroke-dasharray:40; stroke-dashoffset:40; animation:draw .45s ease .5s forwards;}
  @keyframes draw{to{stroke-dashoffset:0;}}
  .done-ttl{font-size:17px; font-weight:850;}
  .sum{margin-top:6px;}
  .sum .row{display:flex; justify-content:space-between; font-size:12px; font-weight:700; padding:3px 12px; color:#cfd6d0;}
  .sum .row b{color:#fff; font-variant-numeric:tabular-nums;}
  #scr-done .wbtn{padding:9px 0; font-size:12.5px; width:70%; background:#1c1d1f; color:#cfd6d0;}
</style>
</head>
<body>
<div class="devseg"><button id="seg-aw" class="on" onclick="setDev('aw')">Apple Watch</button><button id="seg-gx" onclick="setDev('gx')">Galaxy Watch</button></div>
<div class="hint">MATE 워치앱 프로토타입 — 좌우로 쓸면 운동 이동, 위아래로 쓸면 경과와 심박이에요. 기록에는 저장되지 않아요</div>
<div class="stage" id="stage">
  <div class="watch">
    <div class="band top"></div>
    <div class="case">
      <div class="crown"></div><div class="sidebtn"></div><div class="gxb b1"></div><div class="gxb b2"></div>
      <div class="scr" id="scr">
        <div class="clock" id="wclock">--:--</div>

        <!-- 홈 -->
        <div class="app" id="scr-home">
          <div class="date" id="home-date"></div>
          <div class="ttl" id="home-title">오늘의 운동</div>
          <div class="sub" id="home-sub">불러오는 중이에요</div>
          <div class="strk" id="home-strk"></div>
          <div class="grow"></div>
          <button class="wbtn" onclick="startCd()">시작</button>
        </div>

        <!-- 3·2·1 -->
        <div class="app hidden" id="scr-cd"><div id="cd-num">3</div></div>

        <!-- 세션 뷰 -->
        <div class="app hidden" id="scr-run" style="padding:0">
          <div class="vdots" id="vdots"><i class="on"></i><i></i><i></i></div>
          <div class="rpage" id="rp1">
            <div class="p1-name" id="p1-name">운동명</div>
            <div class="grow"></div>
            <div class="p1-k" id="p1-k">운동 1/6</div>
            <div class="p1-w">
              <button data-w="-1">−</button>
              <div class="v"><span id="p1-w">20</span><small>kg</small></div>
              <button data-w="1">+</button>
            </div>
            <div class="p1-pills" id="p1-pills"></div>
            <div class="grow"></div>
            <div class="p1-tap">화면을 탭하면 세트 완료</div>
          </div>
          <div class="rpage hidden" id="rp2">
            <div class="k" style="margin-top:4px">경과</div>
            <div class="p2-time" id="p2-time">00:00</div>
            <div class="p2-bar" id="p2-bar"></div>
            <div class="p2-sub" id="p2-sub">1/8단계</div>
            <div class="grow"></div>
            <div class="p2-sub" id="p2-kcal"></div>
          </div>
          <div class="rpage hidden" id="rp3">
            <div class="k" style="margin-top:4px">심박</div>
            <div class="p3-bpm" id="p3-bpm">128</div>
            <div class="p3-u">BPM</div>
            <div class="zone" id="p3-zone"><i></i><i class="z2"></i><i></i><i></i><i></i></div>
            <div class="zlabel" id="p3-label">존2 유지 중이에요</div>
            <div class="grow"></div>
          </div>
        </div>

        <!-- 휴식: 풀사이즈 링 -->
        <div class="app hidden" id="scr-rest">
          <svg class="ringfull" width="206" height="206" viewBox="0 0 206 206">
            <circle cx="103" cy="103" r="96" stroke="#1e1f21" stroke-width="7" fill="none"/>
            <circle id="rest-arc" cx="103" cy="103" r="96" stroke="#9BE8B0" stroke-width="7" fill="none" stroke-linecap="round" stroke-dasharray="603.2" stroke-dashoffset="0"/>
          </svg>
          <div class="rest-in">
            <div class="k">휴식</div>
            <div class="rest-num" id="rest-num">45</div>
            <div class="rest-adj">
              <button data-r="-15">−15초</button>
              <button data-r="15">+15초</button>
            </div>
            <div class="rest-go">탭하면 바로 다음 세트 GO!</div>
          </div>
        </div>

        <!-- 유산소 -->
        <div class="app hidden" id="scr-cardio">
          <div class="k" id="ca-k" style="margin-top:2px">유산소</div>
          <div class="p2-time" id="ca-time">00:00</div>
          <div class="p3-bpm" id="ca-bpm">128</div>
          <div class="zone" id="ca-zone"><i></i><i class="z2"></i><i></i><i></i><i></i></div>
          <div class="zlabel" id="ca-label">존2 유지 중이에요</div>
          <div class="grow"></div>
          <button class="hold" id="ca-hold"><div class="fill"></div><span>길게 눌러 완료</span></button>
        </div>

        <!-- 축하 -->
        <div class="app hidden" id="scr-done">
          <div class="doneart">
            <svg width="66" height="66" viewBox="0 0 64 64">
              <circle class="dc-ring" cx="32" cy="32" r="28" stroke="#2E5E56" stroke-width="4" fill="none" transform="rotate(-90 32 32)"/>
              <path class="dc-check" d="M20.5 33.5 28.5 41.5 44 25.5" fill="none" stroke="#9BE8B0" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="done-ttl">오늘도 해냈어요!</div>
          <div class="sum">
            <div class="row"><span>시간</span><b id="dn-time">00:00</b></div>
            <div class="row"><span>세트</span><b id="dn-sets">0세트</b></div>
            <div class="row"><span>칼로리</span><b id="dn-kcal">0kcal</b></div>
          </div>
          <div class="grow"></div>
          <button class="wbtn" onclick="resetProto()">처음으로</button>
        </div>
      </div>
    </div>
    <div class="band bot"></div>
  </div>
</div>

<iframe id="core" src="./index.html" style="display:none" title="core"></iframe>
<script>
  const $=id=>document.getElementById(id);
  function fit(){ const s=Math.min(1.7,(innerHeight-90)/620,(innerWidth-40)/280); $('stage').style.transform='scale('+s+')'; }
  fit(); addEventListener('resize',fit);
  /* 실시간 시계 */
  function clock(){ const d=new Date(), h=d.getHours()%12||12; $('wclock').textContent=h+':'+String(d.getMinutes()).padStart(2,'0'); }
  clock(); setInterval(clock,5000);
  function haptic(){ const s=$('scr'); s.classList.remove('pulse'); void s.offsetWidth; s.classList.add('pulse'); }
  /* 기기 토글 */
  function setDev(d){ document.body.className=d==='gx'?'gx':'';
    $('seg-aw').classList.toggle('on', d!=='gx'); $('seg-gx').classList.toggle('on', d==='gx');
    try{ localStorage.setItem('watchproto:device', d); }catch(e){} }
  try{ if(localStorage.getItem('watchproto:device')==='gx') setDev('gx'); }catch(e){}

  /* ---- 상태 (실제 앱 데이터는 읽기 전용) ---- */
  const P={items:[], idx:0, set:0, w:20, page:0, restT:null, restLeft:0, restTotal:45,
           t0:null, elapT:null, hrT:null, setsDone:0, title:'오늘의 운동'};
  function go(name){ ['home','cd','run','rest','cardio','done'].forEach(n=>$('scr-'+n).classList.toggle('hidden', n!==name)); }

  /* 실제 앱에서 오늘 세션 읽기 — iframe 렐름 eval, 실패 시 데모 */
  function loadFromCore(){
    const d=new Date(); $('home-date').textContent=(d.getMonth()+1)+'월 '+d.getDate()+'일 '+['일','월','화','수','목','금','토'][d.getDay()]+'요일';
    try{
      const data=$('core').contentWindow.eval(`(function(){
        const t=todayStr(); const e=sessionFor(t);
        const base={streak:(typeof streak==='function'?streak():0)};
        if(!e||e.rest) return Object.assign(base,{rest:true});
        const s=SESSIONS[e.session];
        const kept=sessionExercises(s, e.session);
        return Object.assign(base,{rest:false, title:s.title, mins:(state.sessionMinutes||60),
          cardio:(s.cardio&&s.cardio.label)||'유산소',
          items:kept.map(x=>{ let wv=null;
            try{ const ll=lastLog(t,x.key); if(ll&&ll.w){ const ns=ll.w.filter(v=>typeof v==='number'&&v>0); if(ns.length) wv=Math.max(...ns); } }catch(e2){}
            return {name:x.r.name, sets:(x.sl.sets||3), w:wv}; })});
      })()`);
      if(data.streak>0) $('home-strk').textContent='🔥 '+data.streak+'일 연속';
      if(data.rest){ $('home-title').textContent='오늘은 회복하는 날'; $('home-sub').textContent='가벼운 스트레칭 어때요?'; demoItems(); return; }
      P.items=data.items.map(x=>({kind:'ex', name:x.name, sets:x.sets, w:(x.w!=null?x.w:20), doneSets:0}));
      P.items.push({kind:'hr', name:data.cardio});
      P.title=(data.title||'오늘의 운동').split('·')[0].trim();
      $('home-title').textContent=P.title;
      $('home-sub').textContent=data.items.length+'개 운동, 약 '+data.mins+'분';
    }catch(err){ demoItems(); }
  }
  function demoItems(){
    if(P.items.length) return;
    P.items=[{kind:'ex',name:'레그프레스',sets:4,w:50,doneSets:0},{kind:'ex',name:'체스트 프레스',sets:3,w:30,doneSets:0},{kind:'hr',name:'유산소'}];
    if($('home-sub').textContent==='불러오는 중이에요'){ $('home-sub').textContent='데모 데이터로 보여드려요'; }
  }
  $('core').addEventListener('load', ()=>setTimeout(loadFromCore,900));
  setTimeout(demoItems, 4000);

  /* 3·2·1 */
  function startCd(){
    go('cd'); const el=$('cd-num'); el.classList.remove('go');
    let n=3; el.textContent=n; haptic();
    const iv=setInterval(()=>{ n--;
      if(n>0){ el.textContent=n; haptic(); }
      else { clearInterval(iv); el.textContent='가자!'; el.classList.add('go'); haptic();
        setTimeout(startSession,700); }
    },800);
  }
  function startSession(){ P.t0=Date.now(); P.idx=0; P.set=0; P.setsDone=0;
    if(P.elapT) clearInterval(P.elapT); P.elapT=setInterval(tickElapsed,500);
    hrStart(); openItem(0); }
  function fmtT(ms){ const s=Math.floor(ms/1000); return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0'); }
  function tickElapsed(){ if(!P.t0) return; const ms=Date.now()-P.t0;
    $('p2-time').textContent=fmtT(ms); $('ca-time').textContent=fmtT(ms);
    $('p2-kcal').textContent='약 '+Math.round(4.5*70*(ms/3600000))+'kcal (추정)'; }

  /* 세션 뷰 */
  function setPage(p){ P.page=Math.max(0, Math.min(2, p));
    ['rp1','rp2','rp3'].forEach((id,i)=>$(id).classList.toggle('hidden', i!==P.page));
    [...$('vdots').children].forEach((el,i)=>el.classList.toggle('on', i===P.page)); }
  function openItem(i){
    if(i>=P.items.length){ finishAll(); return; }
    P.idx=Math.max(0,i); const it=P.items[P.idx];
    if(it.kind==='hr'){ go('cardio'); $('ca-k').textContent=it.name; return; }
    P.set=it.doneSets||0; P.w=it.w;
    $('p1-k').textContent='운동 '+(P.idx+1)+'/'+P.items.length;
    $('p1-name').textContent=it.name;
    $('p1-w').textContent=P.w%1?P.w.toFixed(1):P.w;
    renderPills(it); renderP2(); setPage(0); go('run');
    fitName($('p1-name'));
  }
  /* 이름: 한 줄 우선, 넘치면 작게 두 줄 */
  function fitName(el){ el.classList.remove('two');
    if(el.scrollWidth>el.clientWidth+1) el.classList.add('two'); }
  function renderPills(it){
    const compact=it.sets>=5;
    $('p1-pills').innerHTML=Array.from({length:it.sets},(_,k)=>{
      const cls=k<P.set?' done':(k===P.set?' cur':'');
      return '<span class="pill'+cls+'">'+(compact?(k+1):'세트'+(k+1))+'</span>'; }).join('');
  }
  function renderP2(){
    $('p2-bar').innerHTML=P.items.map((x,k)=>'<i class="'+(k<P.idx?'on':'')+'"></i>').join('');
    $('p2-sub').textContent=(P.idx+1)+'/'+P.items.length+'단계'; }
  function wAdj(dir){ P.w=Math.max(0, Math.round((P.w+dir*2.5)*10)/10); $('p1-w').textContent=P.w%1?P.w.toFixed(1):P.w; }
  function setDoneP(){
    const it=P.items[P.idx]; if(!it||it.kind!=='ex') return;
    it.w=P.w; P.set++; it.doneSets=P.set; P.setsDone++;
    haptic();
    if(P.set>=it.sets){ openItem(P.idx+1); return; }
    renderPills(it); restStart(P.restTotal);
  }
  function nextEx(){ if(P.idx<P.items.length-1){ haptic(); openItem(P.idx+1); } }
  function prevEx(){ if(P.idx>0){ haptic(); openItem(P.idx-1); } }

  /* 휴식 */
  function restStart(sec){
    go('rest'); P.restLeft=sec;
    const arc=$('rest-arc'), C=603.2;
    const tick=()=>{ $('rest-num').textContent=Math.ceil(Math.max(0,P.restLeft));
      arc.style.strokeDashoffset=String(C*(1-Math.max(0,P.restLeft)/Math.max(P.restTotal,1)));
      if(P.restLeft<=0){ haptic(); haptic(); restSkip(); return; } P.restLeft-=0.2; };
    clearInterval(P.restT); tick(); P.restT=setInterval(tick,200);
  }
  function restAdj(d){ P.restTotal=Math.max(15, Math.min(180, P.restTotal+d)); P.restLeft=Math.max(1, P.restLeft+d); }
  function restSkip(){ clearInterval(P.restT); P.restT=null;
    if(P.items[P.idx]&&P.items[P.idx].kind==='hr'){ go('cardio'); return; }
    setPage(0); go('run'); }

  /* 심박 시뮬레이션 */
  let _bpm=124;
  function hrStart(){ hrStop();
    P.hrT=setInterval(()=>{ _bpm=Math.max(96,Math.min(158,_bpm+(Math.random()*8-4)));
      const b=Math.round(_bpm), z=b<109?0:b<118?1:b<143?2:b<156?3:4;
      const lb= z===2?'존2 유지 중이에요': z<2?'조금만 더 올려볼까요':'살짝 여유를 가져요';
      $('p3-bpm').textContent=b; $('ca-bpm').textContent=b;
      [['p3-zone','p3-label'],['ca-zone','ca-label']].forEach(([zi,li])=>{
        [...$(zi).children].forEach((el,i2)=>el.classList.toggle('cur',i2===z)); $(li).textContent=lb; });
    },1000); }
  function hrStop(){ if(P.hrT){ clearInterval(P.hrT); P.hrT=null; } }

  /* 유산소: 길게 눌러 완료 */
  (function(){ const btn=$('ca-hold'), fill=btn.querySelector('.fill'); let hT=null, p=0;
    const down=()=>{ p=0; clearInterval(hT); hT=setInterval(()=>{ p+=0.09; fill.style.width=Math.min(100,p*100)+'%';
      if(p>=1){ clearInterval(hT); fill.style.width='0'; cardioDoneP(); } },60); };
    const up=()=>{ clearInterval(hT); fill.style.width='0'; };
    btn.addEventListener('pointerdown',down); btn.addEventListener('pointerup',up); btn.addEventListener('pointerleave',up);
  })();
  function cardioDoneP(){ haptic(); const it=P.items[P.idx]; if(it&&it.kind==='hr') it.doneSets=1;
    openItem(P.idx+1); }

  /* 축하 */
  function finishAll(){
    hrStop(); if(P.elapT){ clearInterval(P.elapT); P.elapT=null; }
    const ms=P.t0?Date.now()-P.t0:0;
    $('dn-time').textContent=fmtT(ms);
    $('dn-sets').textContent=P.setsDone+'세트';
    $('dn-kcal').textContent=Math.round(4.5*70*(ms/3600000))+'kcal (추정)';
    haptic(); go('done');
  }
  function resetProto(){ P.items.forEach(it=>{ it.doneSets=0; }); P.idx=0; P.set=0; P.setsDone=0; P.t0=null;
    hrStop(); if(P.elapT){clearInterval(P.elapT);P.elapT=null;} go('home'); }

  /* ---- 제스처: 좌로 쓸기=다음 운동, 우로 쓸기=이전 운동, 상하=페이지, 탭=세트 완료 ---- */
  function attachGestures(el, opts){
    let sx=null, sy=0, st=0;
    el.addEventListener('pointerdown', e=>{ if(e.target.closest('button')){ sx=null; return; } sx=e.clientX; sy=e.clientY; st=Date.now(); });
    el.addEventListener('pointerup', e=>{
      if(sx==null) return; const dx=e.clientX-sx, dy=e.clientY-sy; sx=null;
      if(Math.abs(dx)>38 && Math.abs(dx)>Math.abs(dy)*1.2){ const f=dx<0?opts.left:opts.right; if(f) f(); return; }
      if(Math.abs(dy)>38 && Math.abs(dy)>Math.abs(dx)*1.2){ const f=dy<0?opts.up:opts.down; if(f) f(); return; }
      if(Math.abs(dx)<12 && Math.abs(dy)<12 && Date.now()-st<600 && opts.tap) opts.tap(e);
    });
  }
  attachGestures($('scr-run'), {
    left:nextEx, right:prevEx,
    up:()=>setPage(P.page+1), down:()=>setPage(P.page-1),
    tap:()=>{ if(P.page!==0){ setPage(0); return; } setDoneP(); }
  });
  attachGestures($('scr-cardio'), { right:prevEx });
  attachGestures($('scr-rest'), { tap:restSkip });
  /* 버튼 위임(무게 ± / 휴식 ±15초) */
  $('scr-run').addEventListener('click', e=>{ const b=e.target.closest('button[data-w]'); if(b) wAdj(+b.dataset.w); });
  $('scr-rest').addEventListener('click', e=>{ const b=e.target.closest('button[data-r]'); if(b) restAdj(+b.dataset.r); });
</script>
</body>
</html>
